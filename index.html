<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STREET KING — The Underworld Simulator</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👑</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Bebas+Neue&family=Special+Elite&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.96)}to{opacity:1}}
@keyframes flicker{0%,100%{opacity:1}50%{opacity:.85}}
@keyframes citypulse{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.4);opacity:0}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#08090A;font-family:'JetBrains Mono',monospace;color:#C8C5BC;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.crt{position:fixed;inset:0;z-index:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent 0,transparent 2px,rgba(0,255,100,.012) 2px,rgba(0,255,100,.012) 3px)}
.noise{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
.vig{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse at center,transparent 30%,rgba(8,9,10,.8)100%)}
:root{--green:#00FF6B;--green-dim:#1A8E45;--red:#FF3838;--red-dim:#8E2020;--amber:#FFB800;--amber-dim:#8E6000;--cyan:#3EC8FF;--cyan-dim:#1E6E8E;--bg:#08090A;--bg-2:#0E1014;--bg-3:#14171C;--bg-4:#1C2027;--line:rgba(255,255,255,.06);--line-2:rgba(255,255,255,.12);--txt:#C8C5BC;--txt-dim:#6B6962;--txt-faint:#3E3D3A}
.bar{position:sticky;top:0;z-index:100;display:grid;grid-template-columns:auto 1fr auto;gap:24px;align-items:center;padding:10px 22px;background:rgba(8,9,10,.94);backdrop-filter:blur(20px);border-bottom:1px solid var(--line)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:6px;color:var(--green)}.logo .king{color:var(--amber)}
.stats-bar{display:flex;gap:18px;font-size:11px;flex-wrap:wrap;justify-content:center}
.s-item{display:flex;align-items:center;gap:6px}
.s-lbl{color:var(--txt-faint);text-transform:uppercase;letter-spacing:1.5px;font-size:9px;font-weight:600}
.s-val{font-weight:700;font-size:13px}
.s-val.green{color:var(--green)}.s-val.red{color:var(--red)}.s-val.amber{color:var(--amber)}.s-val.cyan{color:var(--cyan)}
.day-display{font-size:11px;color:var(--txt-dim);letter-spacing:1px;display:flex;align-items:center;gap:8px}
.day-display .dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:flicker 2s infinite}
.heat-meter{display:inline-block;width:80px;height:8px;background:rgba(255,56,56,.1);border:1px solid rgba(255,56,56,.2);overflow:hidden}
.heat-fill{height:100%;background:linear-gradient(90deg,#FFB800,#FF3838);transition:width .4s}
.nav{display:flex;background:var(--bg-2);border-bottom:1px solid var(--line);overflow-x:auto;padding:0 22px}
.nav button{padding:14px 22px;font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--txt-faint);cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;letter-spacing:3px;transition:all .25s;white-space:nowrap}
.nav button:hover{color:var(--txt-dim);background:rgba(255,255,255,.02)}
.nav button.on{color:var(--green);border-bottom-color:var(--green);background:rgba(0,255,107,.04)}
.main{max-width:1280px;margin:0 auto;padding:24px 22px 160px;position:relative;z-index:1}
.hdr{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--txt);margin-bottom:2px;letter-spacing:4px}
.sub{font-size:11px;color:var(--txt-faint);margin-bottom:24px;line-height:1.6;text-transform:uppercase;letter-spacing:2px;font-weight:500}
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center}
.hero-warn{font-size:9px;color:var(--red-dim);letter-spacing:4px;margin-bottom:24px;animation:flicker 3s infinite;text-transform:uppercase}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:96px;color:var(--green);letter-spacing:18px;margin-bottom:8px;text-shadow:0 0 40px rgba(0,255,107,.3),0 0 80px rgba(0,255,107,.15);animation:flicker 5s infinite}
.hero-title .king{color:var(--amber);text-shadow:0 0 40px rgba(255,184,0,.4)}
.hero-tag{font-family:'Special Elite',serif;font-size:13px;color:var(--txt-dim);max-width:520px;line-height:1.8;margin:0 auto 12px;font-style:italic}
.hero-meta{font-size:9px;color:var(--txt-faint);letter-spacing:3px;margin-bottom:48px;text-transform:uppercase}
.hero-cta{padding:14px 38px;background:transparent;border:1px solid var(--green);color:var(--green);font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:4px;cursor:pointer;transition:all .25s}
.hero-cta:hover{background:rgba(0,255,107,.08);box-shadow:0 0 30px rgba(0,255,107,.3)}
.intro-step{max-width:1080px;margin:0 auto;animation:fadeIn .5s ease both}
.step-num{font-size:10px;color:var(--green-dim);letter-spacing:3px;margin-bottom:8px}
.step-q{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--txt);letter-spacing:3px;margin-bottom:6px;line-height:1.1}
.step-d{font-size:12px;color:var(--txt-faint);line-height:1.6;margin-bottom:28px;max-width:720px}
.step-d strong{color:var(--cyan)}
.option-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:28px}
.option{background:var(--bg-2);border:1px solid var(--line);padding:20px;cursor:pointer;transition:all .25s;position:relative}
.option:hover{border-color:var(--green-dim);background:var(--bg-3);transform:translateY(-2px)}
.option.selected{border-color:var(--green);background:rgba(0,255,107,.04);box-shadow:0 0 20px rgba(0,255,107,.1)}
.option.selected::before{content:'✓';position:absolute;top:12px;right:12px;color:var(--green);font-weight:700;font-size:14px}
.opt-icon{font-size:28px;margin-bottom:10px;display:block}
.opt-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--txt);margin-bottom:4px}
.opt-tag{display:inline-block;font-size:8px;letter-spacing:2px;color:var(--green-dim);padding:2px 6px;background:rgba(0,255,107,.06);border:1px solid rgba(0,255,107,.15);text-transform:uppercase;margin-bottom:8px;font-weight:600}
.opt-desc{font-size:11px;color:var(--txt-dim);line-height:1.55}
.opt-stats{display:flex;gap:12px;margin-top:10px;padding-top:10px;border-top:1px solid var(--line);font-size:10px;flex-wrap:wrap}
.opt-stats span{color:var(--txt-faint);text-transform:uppercase;letter-spacing:1px}
.opt-stats b{color:var(--txt);font-weight:700}
.opt-expand-btn{position:absolute;top:14px;right:14px;background:rgba(62,200,255,.06);border:1px solid rgba(62,200,255,.25);color:var(--cyan);font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;padding:4px 8px;cursor:pointer;text-transform:uppercase;transition:all .2s}
.opt-expand-btn:hover{background:rgba(62,200,255,.12)}
.opt-intel{margin-top:14px;padding-top:14px;border-top:1px solid var(--line);animation:fadeIn .3s}
.opt-intel-title{font-size:9px;color:var(--cyan);letter-spacing:2px;margin-bottom:10px;text-transform:uppercase;font-weight:600}
.opt-intel ul{list-style:none;padding:0}
.opt-intel li{font-size:11px;color:var(--txt-dim);line-height:1.65;padding:4px 0 4px 14px;position:relative;border-left:1px solid var(--line);margin-left:2px}
.opt-intel li::before{content:'·';position:absolute;left:4px;color:var(--cyan);font-weight:700}
.opt-intel-warn{color:var(--amber);font-style:italic;font-size:10px;margin-top:8px}
.input-field{width:100%;background:var(--bg-2);border:1px solid var(--line);color:var(--green);padding:14px 16px;font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:2px;outline:none;margin-bottom:24px}
.input-field:focus{border-color:var(--green)}
.input-field::placeholder{color:var(--txt-faint)}
.cta-row{display:flex;gap:12px;margin-top:8px}
.btn{padding:12px 28px;background:transparent;border:1px solid var(--green-dim);color:var(--green);font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;cursor:pointer;transition:all .25s}
.btn:hover{background:rgba(0,255,107,.06);border-color:var(--green)}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn-back{border-color:var(--line-2);color:var(--txt-dim)}.btn-back:hover{border-color:var(--txt-dim)}
.btn-danger{border-color:var(--red-dim);color:var(--red)}
.btn-danger:hover{background:rgba(255,56,56,.05);border-color:var(--red)}
.world-wrap{background:linear-gradient(180deg,#050608 0%,#0a0d12 100%);border:1px solid var(--line);position:relative;overflow:hidden;margin-bottom:18px}
.world-svg{width:100%;height:auto;display:block;background:#070a0e}
.world-continent{fill:rgba(40,60,80,.18);stroke:rgba(80,130,180,.25);stroke-width:.6}
.world-cont-label{font-family:'Bebas Neue',sans-serif;font-size:11px;fill:rgba(255,255,255,.1);letter-spacing:6px;pointer-events:none}
.world-water-label{font-family:'JetBrains Mono',monospace;font-size:8px;fill:rgba(80,130,180,.25);letter-spacing:5px;pointer-events:none}
.city-pin{cursor:pointer}
.city-pin-circle.unlocked{fill:rgba(0,255,107,.15);stroke:var(--green);stroke-width:1.5}
.city-pin-circle.locked{fill:rgba(255,56,56,.08);stroke:var(--red-dim);stroke-width:1;stroke-dasharray:2,2}
.city-pin-circle.selected{fill:rgba(0,255,107,.45);stroke:var(--green);stroke-width:2.5}
.city-pin:hover .city-pin-circle{filter:brightness(1.3)}
.city-pin-pulse{fill:rgba(0,255,107,.3);transform-origin:center;animation:citypulse 2s ease-out infinite}
.city-pin-label{font-family:'JetBrains Mono',monospace;font-size:8.5px;font-weight:700;letter-spacing:1.5px;text-anchor:middle;pointer-events:none}
.city-pin-label.unlocked{fill:var(--green)}
.city-pin-label.locked{fill:var(--red-dim)}
.city-pin-label.selected{fill:var(--amber)}
.world-legend{display:flex;gap:14px;flex-wrap:wrap;padding:10px 14px;background:var(--bg-3);border-top:1px solid var(--line);font-size:10px;color:var(--txt-faint);text-transform:uppercase;letter-spacing:1.5px}
.lg-item{display:flex;align-items:center;gap:6px}
.lg-dot{width:10px;height:10px;border:1px solid;border-radius:50%}
.lg-dot.unlocked{background:rgba(0,255,107,.15);border-color:var(--green)}
.lg-dot.locked{background:rgba(255,56,56,.08);border-color:var(--red-dim)}
.city-detail{background:var(--bg-2);border:1px solid var(--line);padding:22px;margin-bottom:14px;animation:fadeIn .35s}
.city-detail.locked{border-color:var(--red-dim);background:rgba(255,56,56,.02)}
.city-detail-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap;gap:10px}
.city-detail-name{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:4px;color:var(--txt);line-height:1}
.city-detail-flag{font-size:28px}
.city-detail-meta{display:flex;gap:14px;flex-wrap:wrap;font-size:10px;color:var(--txt-faint);letter-spacing:1.5px;text-transform:uppercase;margin:8px 0 14px}
.city-detail-meta b{color:var(--txt-dim);font-weight:700}
.city-detail-blurb{font-size:13px;color:var(--txt-dim);line-height:1.7;font-family:'Special Elite',serif;font-style:italic;margin-bottom:14px}
.city-status-banner{display:inline-block;padding:5px 10px;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;font-weight:700}
.city-status-banner.unlocked{background:rgba(0,255,107,.06);color:var(--green);border:1px solid var(--green-dim)}
.city-status-banner.locked{background:rgba(255,56,56,.04);color:var(--red);border:1px solid var(--red-dim)}
.city-detail-product{font-size:11px;color:var(--cyan);letter-spacing:2px;margin-bottom:8px;text-transform:uppercase}
.unlock-req{padding:12px 14px;background:rgba(255,184,0,.04);border-left:2px solid var(--amber);font-size:11px;color:var(--amber);font-style:italic;margin-top:10px;line-height:1.5}
.map-wrap{background:var(--bg-2);border:1px solid var(--line);position:relative;overflow:hidden;margin-bottom:18px}
.map-leaflet{height:560px;width:100%;background:#0a0c0f}
.leaflet-container{background:#0a0c0f!important;font-family:'JetBrains Mono',monospace}
.leaflet-tile-pane{filter:invert(1) hue-rotate(180deg) brightness(.88) contrast(1.05) saturate(.6)}
.leaflet-control-attribution{background:rgba(8,9,10,.85)!important;color:var(--txt-faint)!important;font-size:8px!important;letter-spacing:.5px}
.leaflet-control-attribution a{color:var(--cyan-dim)!important;text-decoration:none}
.leaflet-control-zoom a{background:rgba(8,9,10,.92)!important;color:var(--green)!important;border:1px solid var(--green-dim)!important;width:30px!important;height:30px!important;line-height:28px!important;font-family:'Bebas Neue',sans-serif!important;font-size:18px!important}
.leaflet-control-zoom a:hover{background:rgba(0,255,107,.12)!important;color:var(--green)!important}
.zone-tooltip{background:rgba(8,9,10,.85)!important;border:1px solid rgba(255,255,255,.08)!important;color:var(--txt)!important;font-family:'Bebas Neue',sans-serif!important;font-size:11.5px!important;letter-spacing:2px!important;padding:3px 8px!important;box-shadow:0 2px 8px rgba(0,0,0,.5)!important;backdrop-filter:blur(4px)}
.zone-tooltip::before{display:none!important}
.zone-tooltip.you{color:var(--green)!important;border-color:var(--green-dim)!important}
.zone-tooltip.rival{color:var(--red)!important;border-color:var(--red-dim)!important}
.zone-tooltip.contested{color:var(--amber)!important;border-color:var(--amber-dim)!important}
.zone-tooltip.neutral{color:var(--txt-dim)!important}
.npc-marker{background:transparent!important;border:none!important}
.npc-pin{width:32px;height:32px;background:rgba(20,23,28,.96);border:1.5px solid var(--cyan-dim);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.6),0 0 0 2px rgba(8,9,10,.8);transition:all .15s}
.npc-pin:hover{transform:scale(1.18);border-color:var(--cyan);box-shadow:0 2px 12px rgba(62,200,255,.4)}
.leaflet-tooltip-top.zone-tooltip{margin-top:0!important}
.leaflet-marker-icon.npc-marker{margin-left:-16px!important;margin-top:-16px!important}
.map-legend{display:flex;gap:14px;flex-wrap:wrap;padding:10px 14px;background:var(--bg-3);border-top:1px solid var(--line);font-size:10px;color:var(--txt-faint);text-transform:uppercase;letter-spacing:1.5px}
.lg-dot.you{background:rgba(0,255,107,.18);border-color:var(--green)}
.lg-dot.rival{background:rgba(255,56,56,.12);border-color:var(--red-dim)}
.lg-dot.contested{background:rgba(255,184,0,.1);border-color:var(--amber-dim)}
.lg-dot.neutral{background:rgba(255,255,255,.02);border-color:var(--line-2)}
.ov{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.88);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .15s}
.modal{background:var(--bg-2);border:1px solid var(--line-2);max-width:780px;width:100%;max-height:90vh;overflow-y:auto;animation:scaleIn .2s ease}
.modal-hdr{padding:20px 24px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start;background:var(--bg-3);position:sticky;top:0;z-index:5}
.modal-x{background:none;border:none;color:var(--txt-faint);font-size:24px;cursor:pointer;line-height:1;transition:color .15s}
.modal-x:hover{color:var(--red)}
.modal-body{padding:22px 24px}
.modal-tag{font-size:9px;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;font-weight:700}
.modal-tag.you{color:var(--green)}.modal-tag.rival{color:var(--red)}.modal-tag.contested{color:var(--amber)}.modal-tag.neutral{color:var(--cyan)}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--txt);line-height:1.1}
.modal-sub{font-size:11px;color:var(--txt-faint);margin-top:6px;line-height:1.5;font-family:'Special Elite',serif;font-style:italic}
.dossier-section{margin-bottom:22px;animation:fadeIn .35s}
.dossier-section-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--line)}
.dossier-section-icon{font-size:14px}
.dossier-section-title{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:3px;color:var(--cyan);font-weight:400}
.dossier-section-title.danger{color:var(--red)}.dossier-section-title.amber{color:var(--amber)}.dossier-section-title.green{color:var(--green)}
.dossier-list{list-style:none;padding:0}
.dossier-list li{font-size:12px;color:var(--txt-dim);line-height:1.7;padding:5px 0 5px 16px;position:relative}
.dossier-list li::before{content:'›';position:absolute;left:2px;color:var(--cyan-dim);font-weight:700}
.dossier-list.angle li::before{color:var(--green-dim)}
.dossier-list.danger li::before{color:var(--red-dim)}
.dossier-list li strong{color:var(--txt);font-weight:700}
.dossier-list li em{color:var(--amber);font-style:normal;font-weight:600}
.dossier-fallback{padding:14px;background:rgba(255,184,0,.04);border-left:2px solid var(--amber);font-size:11px;color:var(--amber);font-style:italic;margin-bottom:18px;line-height:1.6}
.dossier-cta{padding:16px 18px;background:rgba(0,255,107,.05);border:1px solid var(--green-dim);border-left:3px solid var(--green);font-size:12px;color:var(--txt-dim);line-height:1.6;font-style:italic;margin-top:18px}
.dossier-cta b{color:var(--green);font-style:normal}
.dialog-portrait{width:60px;height:60px;background:linear-gradient(135deg,var(--bg-4),var(--bg-3));border:1px solid var(--line-2);display:flex;align-items:center;justify-content:center;font-size:28px;float:left;margin-right:14px}
.dialog-line{padding:14px 16px;background:rgba(0,255,107,.04);border-left:2px solid var(--green-dim);font-family:'Special Elite',serif;font-size:13px;color:var(--txt);line-height:1.65;font-style:italic;margin:14px 0}
.action-list{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.action{padding:14px 16px;background:var(--bg-3);border:1px solid var(--line);cursor:pointer;transition:all .2s;text-align:left}
.action:hover:not(:disabled){border-color:var(--green-dim);background:var(--bg-4)}
.action:disabled{opacity:.4;cursor:not-allowed}
.action-name{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--txt);margin-bottom:4px}
.action-cost{display:flex;gap:12px;font-size:10px;color:var(--txt-faint);margin-top:6px;flex-wrap:wrap}
.action-cost .neg{color:var(--red)}.action-cost .pos{color:var(--green)}
.panel{background:var(--bg-2);border:1px solid var(--line);padding:20px;margin-bottom:16px;animation:fadeIn .4s}
.panel-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:3px;color:var(--txt);margin-bottom:14px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:24px}
.kpi{background:var(--bg-2);border:1px solid var(--line);padding:18px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--green),transparent)}
.kpi-l{font-size:9px;color:var(--txt-faint);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;font-weight:600}
.kpi-v{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;line-height:1}
.kpi-d{font-size:10px;color:var(--txt-dim);margin-top:6px}
.front-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:18px}
.front{background:var(--bg-2);border:1px solid var(--line);padding:16px}
.front.over{border-color:var(--red-dim)}
.front-name{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--txt);margin-bottom:4px}
.front-type{font-size:9px;color:var(--green-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.front-bar{height:6px;background:rgba(255,255,255,.04);margin:8px 0;overflow:hidden}
.front-bar-fill{height:100%;background:var(--green);transition:width .4s}
.front-bar-fill.warn{background:var(--amber)}.front-bar-fill.over{background:var(--red);animation:flicker 1s infinite}
.front-stats{display:flex;justify-content:space-between;font-size:10px;color:var(--txt-faint);margin-top:8px;text-transform:uppercase;letter-spacing:1px}
.front-stats b{color:var(--txt)}
.crew-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px;margin-bottom:24px}
/* Horizontal category scroller — used in AVAILABLE TO RECRUIT */
.crew-cat-strip::-webkit-scrollbar{height:8px}
.crew-cat-strip::-webkit-scrollbar-track{background:rgba(255,255,255,.02)}
.crew-cat-strip::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:0}
.crew-cat-strip::-webkit-scrollbar-thumb:hover{background:var(--green-dim)}
.crew-card{background:var(--bg-2);border:1px solid var(--line);padding:18px;cursor:pointer;transition:all .2s;position:relative}
.crew-card:hover{border-color:var(--green-dim);transform:translateY(-2px)}
.crew-card.deployed{border-left:3px solid var(--cyan)}
.crew-card.hired{border-left:3px solid var(--green)}
.crew-icon-lg{font-size:32px;margin-bottom:8px;display:block}
.crew-name{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;color:var(--txt);margin-bottom:2px;line-height:1.1}
.crew-role{font-size:9px;color:var(--cyan);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:8px;font-weight:600}
.crew-desc{font-size:11px;color:var(--txt-dim);line-height:1.55;margin-bottom:10px}
.crew-skills{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:10px 0;padding:8px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.crew-skill{display:flex;flex-direction:column;align-items:center}
.crew-skill-l{font-size:8px;color:var(--txt-faint);letter-spacing:1px;margin-bottom:3px;font-weight:600}
.crew-skill-bar{width:100%;height:4px;background:rgba(255,255,255,.05);position:relative}
.crew-skill-bar-fill{height:100%;background:var(--green)}
.crew-skill-v{font-size:9px;color:var(--txt);font-weight:700;margin-top:2px}
.crew-cost{display:flex;justify-content:space-between;font-size:10px;color:var(--txt-faint);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.crew-cost b{color:var(--amber);font-weight:700}
.crew-trust{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.crew-trust-bar{flex:1;height:5px;background:rgba(255,255,255,.05);overflow:hidden}
.crew-trust-fill{height:100%;background:linear-gradient(90deg,var(--amber),var(--green));transition:width .3s}
.crew-trust-l{font-size:9px;color:var(--txt-faint);letter-spacing:1.5px;text-transform:uppercase}
.crew-trust-v{font-size:11px;color:var(--green);font-weight:700;font-family:'JetBrains Mono',monospace}
.crew-deployed-banner{display:inline-block;font-size:9px;color:var(--cyan);letter-spacing:2px;padding:3px 7px;background:rgba(62,200,255,.06);border:1px solid var(--cyan-dim);text-transform:uppercase;margin-bottom:8px;font-weight:700}
.btn-sm{padding:8px 14px;font-size:11px;letter-spacing:2px}
.zone-select{width:100%;background:var(--bg-3);border:1px solid var(--line);color:var(--txt);padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:12px;outline:none;margin-bottom:10px}
.zone-select:focus{border-color:var(--green)}
.people-section{margin-bottom:24px}
.people-section-title{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:3px;color:var(--cyan);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:baseline}
.people-section-count{font-size:10px;color:var(--txt-faint);letter-spacing:1.5px;font-family:'JetBrains Mono',monospace}
.people-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.people-card{background:var(--bg-2);border:1px solid var(--line);padding:14px 16px;cursor:pointer;transition:all .2s;position:relative;border-left:3px solid var(--line-2)}
.people-card.met{border-left-color:var(--green)}
.people-card.unmet{opacity:.65;border-left-color:var(--txt-faint)}
.people-card.threat{border-left-color:var(--red)}
.people-card.allied{border-left-color:var(--green);background:rgba(0,255,107,.02)}
.people-card:hover{border-color:var(--green-dim);transform:translateY(-2px);opacity:1}
.people-card-hdr{display:flex;gap:10px;align-items:flex-start;margin-bottom:6px}
.people-icon{font-size:24px;flex-shrink:0}
.people-name{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1.5px;color:var(--txt);line-height:1.15;margin-bottom:2px}
.people-role{font-size:9px;color:var(--cyan);letter-spacing:2px;text-transform:uppercase;font-weight:600}
.people-zone{font-size:10px;color:var(--txt-faint);letter-spacing:.5px;margin-top:4px}
.people-zone b{color:var(--txt-dim)}
.people-status-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;align-items:center}
.people-status{display:inline-block;font-size:8px;letter-spacing:1.5px;padding:2px 6px;border:1px solid;text-transform:uppercase;font-weight:700}
.people-status.met{color:var(--green);border-color:var(--green-dim);background:rgba(0,255,107,.05)}
.people-status.unmet{color:var(--txt-faint);border-color:var(--line-2)}
.people-status.threat{color:var(--red);border-color:var(--red-dim);background:rgba(255,56,56,.05)}
.people-status.allied{color:var(--green);border-color:var(--green-dim);background:rgba(0,255,107,.08)}
.people-strength{font-size:10.5px;color:var(--txt-dim);line-height:1.55;margin-top:8px;font-style:italic;padding-top:8px;border-top:1px solid var(--line)}

.candidate-grid{display:grid;gap:10px;margin-bottom:14px}
.candidate-card{background:var(--bg-3);border:1px solid var(--line);padding:14px 16px;cursor:pointer;transition:all .2s;position:relative}
.candidate-card:hover{border-color:var(--green);background:var(--bg-4);transform:translateX(2px)}
.candidate-card.best{border-left:3px solid var(--green);background:rgba(0,255,107,.04)}
.candidate-best-tag{position:absolute;top:10px;right:14px;font-size:8.5px;color:var(--green);letter-spacing:1.5px;font-weight:700;background:rgba(0,255,107,.12);padding:3px 8px;border:1px solid var(--green);text-transform:uppercase}
.candidate-hdr{display:flex;gap:12px;align-items:flex-start}
.candidate-icon{font-size:26px;flex-shrink:0}
.candidate-info{flex:1;min-width:0}
.candidate-name{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--txt);line-height:1.1}
.candidate-role{font-size:9px;color:var(--cyan);letter-spacing:2px;text-transform:uppercase;margin-top:3px}
.candidate-meta{font-size:10px;color:var(--txt-faint);margin-top:3px;letter-spacing:.5px}
.candidate-meta b{color:var(--txt-dim)}
.candidate-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:10px 0 8px;padding:8px 10px;background:rgba(255,255,255,.02)}
.candidate-pitch{font-size:11px;color:var(--txt-dim);line-height:1.55;font-style:italic;padding-left:38px}
.candidate-card.freelance{border-color:var(--amber-dim);background:rgba(255,184,0,.02)}
.candidate-card.freelance:hover{border-color:var(--amber)}

.deal-market{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:rgba(255,184,0,.05);border-left:2px solid var(--amber);font-size:10px;letter-spacing:2px;color:var(--txt-faint);text-transform:uppercase;margin-bottom:14px}
.deal-market b{color:var(--amber);font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1.5px}
.deal-control{margin-bottom:14px}
.deal-control-label{font-size:9.5px;color:var(--txt-faint);letter-spacing:2.5px;margin-bottom:8px;font-weight:700;text-transform:uppercase}
.deal-control-row{display:grid;grid-template-columns:auto auto 1fr auto auto;gap:6px;align-items:center}
.deal-btn{background:var(--bg-3);border:1px solid var(--line-2);color:var(--txt);font-family:'JetBrains Mono',monospace;font-size:11px;padding:9px 12px;cursor:pointer;letter-spacing:1px;font-weight:700;transition:all .15s;min-width:54px}
.deal-btn:hover:not(:disabled){background:var(--bg-4);border-color:var(--green-dim);color:var(--green)}
.deal-btn:disabled{opacity:.3;cursor:not-allowed}
.deal-value{text-align:center;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;color:var(--txt);padding:6px 14px;background:rgba(255,255,255,.02);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.deal-value small{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;font-weight:400;display:block;margin-top:2px}
.deal-total{padding:14px;text-align:center;background:rgba(0,255,107,.04);border:1px solid var(--green-dim);font-size:11px;letter-spacing:3px;color:var(--txt-faint);text-transform:uppercase;margin-bottom:14px}
.deal-total b{display:block;font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;color:var(--green);margin-top:4px}
.deal-reaction{padding:14px 16px;font-style:italic;font-size:13px;line-height:1.55;font-family:'Special Elite',monospace;border-left:3px solid var(--line-2);margin-bottom:16px;background:var(--bg-3)}
.deal-reaction.ok{border-left-color:var(--green);color:var(--green)}
.deal-reaction.warn{border-left-color:var(--amber);color:var(--amber)}
.deal-reaction.bad{border-left-color:var(--red);color:var(--red)}
.deal-reaction-name{font-family:'Bebas Neue',sans-serif;font-style:normal;font-size:11px;letter-spacing:2.5px;margin-bottom:6px;opacity:.8}
.deal-actions{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}

/* Crew bonus chips in CrewModal */
.crew-bonus-list{display:grid;gap:6px;margin-top:10px}
.crew-bonus{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(0,255,107,.04);border-left:2px solid var(--green-dim);font-size:11.5px;color:var(--green);letter-spacing:.3px;line-height:1.4}
.crew-bonus::before{content:"⚡";color:var(--amber);font-size:13px;flex-shrink:0}

/* Strategies tab */
.strategy-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:16px}
.strategy-card{background:var(--bg-2);border:1px solid var(--line);padding:18px 20px;cursor:pointer;transition:all .2s;position:relative;display:flex;flex-direction:column;gap:10px}
.strategy-card:hover{border-color:var(--green);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.5)}
.strategy-card.locked{opacity:.5;cursor:not-allowed}
.strategy-card.locked:hover{transform:none;box-shadow:none}
.strategy-card.active{border-color:var(--cyan);background:rgba(62,200,255,.04)}
.strategy-hdr{display:flex;gap:14px;align-items:flex-start}
.strategy-icon{font-size:32px;flex-shrink:0;line-height:1}
.strategy-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2.5px;color:var(--txt);line-height:1.1;margin-bottom:3px}
.strategy-tagline{font-size:11px;color:var(--cyan);letter-spacing:.5px;line-height:1.4;font-style:italic}
.strategy-meta{display:flex;gap:14px;flex-wrap:wrap;font-size:10px;color:var(--txt-faint);letter-spacing:1.5px;text-transform:uppercase;padding:8px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.strategy-meta b{color:var(--amber);font-family:'JetBrains Mono',monospace}
.strategy-downside{font-size:10.5px;color:var(--red-dim);line-height:1.5;font-style:italic;padding-left:10px;border-left:2px solid var(--red-dim)}
.strategy-downside b{color:var(--red);font-family:'Bebas Neue',sans-serif;font-style:normal;letter-spacing:1.5px}
.strategy-progress{margin-top:8px;display:flex;flex-direction:column;gap:4px}
.strategy-progress-bar{height:6px;background:rgba(255,255,255,.04);position:relative;overflow:hidden}
.strategy-progress-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--cyan-dim));transition:width .3s}
.strategy-progress-meta{display:flex;justify-content:space-between;font-size:10px;color:var(--cyan);letter-spacing:1px;text-transform:uppercase}
.strategy-launch-btn{margin-top:auto;padding:10px;background:rgba(0,255,107,.08);border:1px solid var(--green);color:var(--green);font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;cursor:pointer;text-align:center;transition:all .15s}
.strategy-launch-btn:hover{background:rgba(0,255,107,.18);box-shadow:0 0 16px rgba(0,255,107,.2)}
.strategy-launch-btn:disabled{opacity:.4;cursor:not-allowed;border-color:var(--line);color:var(--txt-faint);background:rgba(255,255,255,.02)}
.strategy-locked-tag{position:absolute;top:14px;right:14px;background:rgba(255,56,56,.08);border:1px solid var(--red-dim);color:var(--red);font-size:9px;letter-spacing:1.5px;padding:3px 8px;text-transform:uppercase}
.strategy-active-tag{position:absolute;top:14px;right:14px;background:rgba(62,200,255,.12);border:1px solid var(--cyan);color:var(--cyan);font-size:9px;letter-spacing:1.5px;padding:3px 8px;text-transform:uppercase;font-weight:700}

/* Strategy launch modal */
.strat-section-label{font-size:9.5px;color:var(--txt-faint);letter-spacing:2.5px;margin-bottom:10px;font-weight:700;text-transform:uppercase}
.directive-input{width:100%;background:var(--bg-3);border:1px solid var(--line);color:var(--txt);font-family:'JetBrains Mono',monospace;font-size:12px;padding:12px 14px;line-height:1.5;resize:vertical;min-height:80px;outline:none;letter-spacing:.3px}
.directive-input:focus{border-color:var(--green-dim)}
.directive-hint{font-size:10px;color:var(--txt-faint);font-style:italic;margin-top:6px;line-height:1.5}

/* Client base — high-value buyers */
.client-card{background:var(--bg-2);border:1px solid var(--line);border-left:3px solid var(--cyan-dim);padding:14px 16px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:8px;position:relative}
.client-card:hover{border-color:var(--cyan);transform:translateY(-2px)}
.client-card.locked{border-left-color:var(--green);background:rgba(0,255,107,.03)}
.client-card.cooldown{opacity:.55;cursor:not-allowed}
.client-card-tag{position:absolute;top:10px;right:14px;font-size:8.5px;letter-spacing:1.5px;padding:3px 8px;border:1px solid;font-weight:700;text-transform:uppercase}
.client-card-tag.locked{color:var(--green);border-color:var(--green);background:rgba(0,255,107,.08)}
.client-card-tag.cooldown{color:var(--red);border-color:var(--red-dim);background:rgba(255,56,56,.06)}
.client-card-tag.unmet{color:var(--cyan);border-color:var(--cyan-dim);background:rgba(62,200,255,.06)}
.client-name{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--txt);line-height:1.15}
.client-prof{font-size:10px;color:var(--cyan);letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-top:2px}
.client-loc{font-size:10.5px;color:var(--txt-faint);margin-top:4px}
.client-loc b{color:var(--txt-dim)}
.client-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px;padding:8px 10px;background:rgba(255,255,255,.02);font-size:10px;color:var(--txt-faint);letter-spacing:1px;text-transform:uppercase}
.client-stats b{color:var(--amber);font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1.5px;display:block}
.client-stats .danger b{color:var(--red)}
.client-stats .smart b{color:var(--cyan)}
.client-supplier{font-size:10px;color:var(--txt-dim);font-style:italic;padding-top:6px;border-top:1px solid var(--line);margin-top:4px}
.client-supplier b{color:var(--amber);font-style:normal}

/* Client dossier modal */
.client-traits{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.client-trait{font-size:9.5px;letter-spacing:1.5px;padding:3px 8px;background:rgba(62,200,255,.06);border:1px solid var(--cyan-dim);color:var(--cyan);text-transform:uppercase;font-weight:600}
.client-danger-warn{padding:10px 14px;background:rgba(255,56,56,.06);border-left:2px solid var(--red);font-size:11px;color:var(--red-dim);line-height:1.5;font-style:italic;margin-top:10px}
.client-danger-warn b{color:var(--red);font-style:normal;font-family:'Bebas Neue',sans-serif;letter-spacing:1.5px}
.client-benefit{padding:10px 14px;background:rgba(0,255,107,.04);border-left:2px solid var(--green);font-size:11px;color:var(--green);line-height:1.5;margin-top:10px}
.client-benefit b{font-family:'Bebas Neue',sans-serif;letter-spacing:1.5px}

/* Conversation modal */
.conv-mood-row{display:flex;align-items:center;gap:14px;padding:12px 14px;background:var(--bg-3);margin-bottom:14px;border-left:2px solid var(--cyan-dim)}
.conv-mood-label{font-size:9.5px;letter-spacing:2px;color:var(--txt-faint);text-transform:uppercase;font-weight:700}
.conv-mood-bar{flex:1;height:8px;background:rgba(255,255,255,.04);position:relative;overflow:hidden}
.conv-mood-fill{height:100%;transition:width .35s,background .35s}
.conv-mood-val{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--txt)}
.conv-step-label{font-size:9.5px;letter-spacing:2.5px;color:var(--txt-faint);text-transform:uppercase;font-weight:700;margin-bottom:8px}
.conv-prompt{font-family:'Special Elite',monospace;font-size:14px;color:var(--txt);line-height:1.7;padding:14px 18px;background:var(--bg-3);border-left:3px solid var(--cyan);margin-bottom:18px;font-style:italic}
.conv-reply{font-family:'Special Elite',monospace;font-size:13px;color:var(--cyan);line-height:1.7;padding:12px 16px;background:rgba(62,200,255,.04);border-left:2px solid var(--cyan-dim);margin-bottom:14px;font-style:italic}
.conv-options{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.conv-option{background:var(--bg-3);border:1px solid var(--line);padding:12px 16px;cursor:pointer;font-size:13px;color:var(--txt-dim);line-height:1.55;transition:all .15s;text-align:left;font-family:'JetBrains Mono',monospace;letter-spacing:.2px}
.conv-option:hover:not(:disabled){background:var(--bg-4);border-color:var(--green-dim);color:var(--txt);transform:translateX(3px)}
.conv-option:disabled{opacity:.4;cursor:not-allowed}
.conv-option-locked{font-size:9px;color:var(--amber);letter-spacing:1.5px;font-style:normal;text-transform:uppercase;margin-left:8px}

/* Conversation final outcome */
.conv-outcome{padding:18px 20px;text-align:center;border:1px solid;margin-bottom:14px}
.conv-outcome.accept{background:rgba(0,255,107,.06);border-color:var(--green)}
.conv-outcome.maybe{background:rgba(255,184,0,.05);border-color:var(--amber)}
.conv-outcome.reject{background:rgba(255,56,56,.05);border-color:var(--red)}
.conv-outcome-tag{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:4px;margin-bottom:8px}
.conv-outcome.accept .conv-outcome-tag{color:var(--green)}
.conv-outcome.maybe .conv-outcome-tag{color:var(--amber)}
.conv-outcome.reject .conv-outcome-tag{color:var(--red)}
.conv-outcome-text{font-size:12px;color:var(--txt-dim);line-height:1.6;font-style:italic}
.pb-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:18px}
.pb-tab{padding:8px 14px;background:transparent;border:1px solid var(--line);color:var(--txt-faint);font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;letter-spacing:1px;transition:all .2s;text-transform:uppercase}
.pb-tab.on{color:var(--green);border-color:var(--green-dim);background:rgba(0,255,107,.04)}
.pb-entry{background:var(--bg-2);border:1px solid var(--line);border-left:2px solid var(--green-dim);padding:18px 22px;margin-bottom:10px}
.pb-entry h4{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2.5px;color:var(--green);margin-bottom:8px}
.pb-entry p{font-size:12px;color:var(--txt-dim);line-height:1.7;margin-bottom:6px}
.pb-entry strong{color:var(--txt);font-weight:700}
.pb-entry .formula{display:block;background:var(--bg-3);border:1px solid var(--line);padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--amber);margin:8px 0}
.pb-entry ul{list-style:none;padding-left:0;margin-top:8px}
.pb-entry li{font-size:12px;color:var(--txt-dim);line-height:1.7;padding-left:14px;position:relative}
.pb-entry li::before{content:'›';position:absolute;left:0;color:var(--green-dim);font-weight:700}
.log{background:var(--bg-2);border:1px solid var(--line);max-height:340px;overflow-y:auto;font-size:11px}
.log-entry{padding:10px 14px;border-bottom:1px solid var(--line);display:grid;grid-template-columns:60px 1fr;gap:10px;align-items:start}
.log-day{color:var(--txt-faint);font-weight:600;font-size:10px}
.log-msg{color:var(--txt-dim);line-height:1.55}

<body>
<div id="root"></div>
<div class="crt"></div>
<div class="noise"></div>
<div class="vig"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<!-- Firebase v9 compat (works with Babel-standalone) -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo}=React;
const SAVE_KEY="street_king_save_v3";
const loadSave=()=>{try{return JSON.parse(localStorage.getItem(SAVE_KEY))}catch(e){return null}};
const writeSave=(d)=>{try{localStorage.setItem(SAVE_KEY,JSON.stringify(d))}catch(e){}};
const fmt=(n)=>n>=1000000?(n/1000000).toFixed(1)+"M":n>=1000?Math.round(n/1000)+"K":Math.round(n).toString();

// ============================================================================
// MULTIPLAYER MODULE — Firebase Firestore integration
// ============================================================================
// To enable: paste your Firebase config below (replace the placeholder values).
// Each player creates/joins a "lobby" via a 6-char code shared with friends.
// All players in a lobby share zone ownership state and see each other on maps.
// ============================================================================

const FIREBASE_CONFIG={
  // PASTE YOUR FIREBASE CONFIG HERE:
  apiKey:"YOUR_API_KEY",
  authDomain:"YOUR_PROJECT.firebaseapp.com",
  projectId:"YOUR_PROJECT_ID",
  storageBucket:"YOUR_PROJECT.appspot.com",
  messagingSenderId:"YOUR_SENDER_ID",
  appId:"YOUR_APP_ID",
};

// MP global state — initialized lazily once config is real
const MP={
  enabled:false,
  app:null,
  db:null,
  lobbyCode:null,
  playerId:null,
  playerHandle:null,
  unsubscribers:[],   // active Firestore listeners
  worldState:null,    // last known shared world state
  onWorldUpdate:null, // callback for React to re-render
};

// Detect if Firebase config is real (not placeholder)
const mpConfigured=()=>FIREBASE_CONFIG.apiKey&&FIREBASE_CONFIG.apiKey!=="YOUR_API_KEY";

// Initialize Firebase once
const mpInit=()=>{
  if(!mpConfigured())return false;
  if(MP.enabled)return true;
  try{
    if(!window.firebase){console.warn("Firebase SDK not loaded");return false}
    MP.app=window.firebase.initializeApp(FIREBASE_CONFIG);
    MP.db=window.firebase.firestore();
    MP.enabled=true;
    return true;
  }catch(e){console.warn("Firebase init failed:",e);return false}
};

// Generate a 6-char lobby code (uppercase letters + digits, no ambiguous chars)
const generateLobbyCode=()=>{
  const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let code="";
  for(let i=0;i<6;i++)code+=chars[Math.floor(Math.random()*chars.length)];
  return code;
};

// Create a new lobby — returns lobby code or null on failure
const mpCreateLobby=async(handle)=>{
  if(!mpInit())return null;
  const code=generateLobbyCode();
  const playerId=Math.random().toString(36).slice(2,11);
  try{
    await MP.db.collection("lobbies").doc(code).set({
      created:Date.now(),
      host:playerId,
      players:{
        [playerId]:{handle,joinedAt:Date.now(),lastSeen:Date.now(),zones:{},city:null,cash:0,clean:0,rep:0,raidsWon:0,raidsLost:0},
      },
      zoneOwnership:{},  // {city: {zoneId: playerId}}
      activityLog:[],     // {ts, msg, actor}
      raids:{},           // active raid attempts {raidId: {attacker, defender, city, zone, startedAt, resolvesAt, attackerMuscle, status}}
    });
    MP.lobbyCode=code;
    MP.playerId=playerId;
    MP.playerHandle=handle;
    return code;
  }catch(e){console.warn("Create lobby failed:",e);return null}
};

// Join an existing lobby
const mpJoinLobby=async(code,handle)=>{
  if(!mpInit())return false;
  const playerId=Math.random().toString(36).slice(2,11);
  try{
    const ref=MP.db.collection("lobbies").doc(code);
    const snap=await ref.get();
    if(!snap.exists)return{error:"Lobby not found"};
    await ref.update({
      [`players.${playerId}`]:{handle,joinedAt:Date.now(),lastSeen:Date.now(),zones:{},city:null,cash:0,clean:0,rep:0,raidsWon:0,raidsLost:0},
    });
    MP.lobbyCode=code;
    MP.playerId=playerId;
    MP.playerHandle=handle;
    return{ok:true};
  }catch(e){console.warn("Join lobby failed:",e);return{error:e.message}}
};

// Subscribe to world state updates — calls callback whenever lobby changes
const mpSubscribe=(callback)=>{
  if(!MP.enabled||!MP.lobbyCode)return;
  MP.onWorldUpdate=callback;
  const ref=MP.db.collection("lobbies").doc(MP.lobbyCode);
  const unsub=ref.onSnapshot(snap=>{
    if(snap.exists){
      MP.worldState=snap.data();
      if(MP.onWorldUpdate)MP.onWorldUpdate(MP.worldState);
    }
  },err=>console.warn("Snapshot error:",err));
  MP.unsubscribers.push(unsub);
};

// Push player's current state to Firestore (call periodically, e.g. on day-advance)
const mpSyncPlayerState=async(g)=>{
  if(!MP.enabled||!MP.lobbyCode||!MP.playerId)return;
  try{
    const playerData={
      handle:MP.playerHandle,
      lastSeen:Date.now(),
      city:g.cityKey,
      zones:g.zones||{},
      cash:g.cash||0,
      clean:g.clean||0,
      rep:g.rep||0,
      day:g.day||0,
      heat:g.heat||0,
    };
    const updates={[`players.${MP.playerId}`]:playerData};
    // Update zone ownership map (city → zoneId → playerId)
    Object.keys(g.zones||{}).forEach(zoneId=>{
      updates[`zoneOwnership.${g.cityKey}.${zoneId}`]=MP.playerId;
    });
    await MP.db.collection("lobbies").doc(MP.lobbyCode).update(updates);
  }catch(e){console.warn("Sync failed:",e)}
};

// Push an activity log entry to the shared feed
const mpLogActivity=async(msg)=>{
  if(!MP.enabled||!MP.lobbyCode)return;
  try{
    const entry={ts:Date.now(),msg,actor:MP.playerHandle||"Unknown"};
    await MP.db.collection("lobbies").doc(MP.lobbyCode).update({
      activityLog:window.firebase.firestore.FieldValue.arrayUnion(entry),
    });
  }catch(e){console.warn("Log failed:",e)}
};

// Disconnect from lobby
const mpLeave=()=>{
  MP.unsubscribers.forEach(u=>{try{u()}catch(e){}});
  MP.unsubscribers=[];
  MP.lobbyCode=null;
  MP.playerId=null;
  MP.playerHandle=null;
  MP.worldState=null;
};

// Get other players in current lobby (excluding self)
const mpOtherPlayers=()=>{
  if(!MP.worldState||!MP.worldState.players)return[];
  return Object.entries(MP.worldState.players)
    .filter(([id])=>id!==MP.playerId)
    .map(([id,p])=>({id,...p}));
};

// ============================================================================
// RAID SYSTEM — PvP attacks on other players' zones
// ============================================================================
// Raid types unlocked by crew composition. Each takes ~24h to resolve.
// Defender can deploy crew to defend during the resolution window.

const RAID_TYPES={
  smash_grab:{
    id:"smash_grab",name:"SMASH & GRAB",icon:"💥",
    desc:"Direct muscle assault. Brawn over brain. Highest heat, fastest resolution.",
    requires:["enforcer"], // any enforcer in hiredCrew
    duration:1, // resolution in days
    heatGenerated:25,
    successFormula:"attacker_muscle * 1.0 vs defender_muscle * 1.2 (defender bonus from being entrenched)",
    rewards:"Take the zone. Take 25% of defender's recent zone revenue.",
    failPenalty:"Lose 30% of attack force's salary as injuries. Heat +25.",
  },
  surgical_strike:{
    id:"surgical_strike",name:"SURGICAL STRIKE",icon:"🎯",
    desc:"Coordinated hit with intel + brains. Lower heat, higher success vs unprepared targets.",
    requires:["enforcer_elite","connect"], // tier check at runtime
    duration:1,
    heatGenerated:12,
    successFormula:"attacker (muscle*0.7 + brain*1.0 + connect*0.8) vs defender_muscle",
    rewards:"Take the zone. Take 40% of defender's recent zone revenue. Quiet — no rep loss for defender.",
    failPenalty:"Heat +15. Defender learns who attacked them (rep -5 with them).",
  },
  hostile_takeover:{
    id:"hostile_takeover",name:"HOSTILE TAKEOVER",icon:"👑",
    desc:"Bishop coordinates a multi-front operation. Zone + stash + intel. Apex tier raid.",
    requires:["negotiator","enforcer_elite"], // need Bishop + elite enforcer
    duration:2,
    heatGenerated:18,
    successFormula:"attacker (muscle + brain + charm) * 1.1 vs defender (muscle + brain) * 1.3",
    rewards:"Take the zone. Take 60% of defender's recent revenue. Take 30% of defender's stash.",
    failPenalty:"Heat +20. Lose -10 rep (failed takeover signals weakness).",
  },
};

// Calculate which raid types a player can launch
const availableRaidTypes=(g)=>{
  const hired=g.hiredCrew||[];
  const hasEnforcer=hired.some(id=>{const c=CREW_ROSTER.find(c=>c.id===id);return c&&c.role==="Enforcer"});
  const hasEliteEnforcer=hired.some(id=>{const c=CREW_ROSTER.find(c=>c.id===id);return c&&c.role==="Enforcer"&&c.tier==="Elite"});
  const hasConnect=hired.some(id=>{const c=CREW_ROSTER.find(c=>c.id===id);return c&&c.role==="Connect"});
  const hasNegotiator=hired.includes("negotiator");
  const out=[];
  if(hasEnforcer)out.push(RAID_TYPES.smash_grab);
  if(hasEliteEnforcer&&hasConnect)out.push(RAID_TYPES.surgical_strike);
  if(hasNegotiator&&hasEliteEnforcer)out.push(RAID_TYPES.hostile_takeover);
  return out;
};

// Calculate attacker's combat power for a given raid type
const raidAttackerPower=(g,raidType)=>{
  const hired=(g.hiredCrew||[]).map(id=>CREW_ROSTER.find(c=>c.id===id)).filter(Boolean);
  const skills=hired.reduce((s,c)=>({muscle:s.muscle+c.skills.muscle,brain:s.brain+c.skills.brain,charm:s.charm+c.skills.charm,connect:s.connect+c.skills.connect}),{muscle:0,brain:0,charm:0,connect:0});
  if(raidType==="smash_grab")return skills.muscle*10;
  if(raidType==="surgical_strike")return skills.muscle*7+skills.brain*10+skills.connect*8;
  if(raidType==="hostile_takeover")return(skills.muscle+skills.brain+skills.charm)*11;
  return 0;
};

// Calculate defender's combat power (from their published state)
const raidDefenderPower=(playerData,raidType)=>{
  // Estimate defender power from their game state — use rep + zones owned as proxy for crew strength
  const baseDefense=(playerData.rep||10)*2+Object.keys(playerData.zones||{}).length*15;
  if(raidType==="smash_grab")return baseDefense*1.2;
  if(raidType==="surgical_strike")return baseDefense*1.0;
  if(raidType==="hostile_takeover")return baseDefense*1.3;
  return baseDefense;
};

// Launch a raid — pushes raid object to lobby's `raids` collection
const mpLaunchRaid=async(raidType,targetPlayerId,targetCity,targetZone,attackerPower)=>{
  if(!MP.enabled||!MP.lobbyCode||!MP.playerId)return{error:"Not in a lobby"};
  const raidId=`raid_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;
  const raid={
    id:raidId,
    type:raidType,
    attacker:MP.playerId,
    attackerHandle:MP.playerHandle,
    defender:targetPlayerId,
    city:targetCity,
    zone:targetZone,
    attackerPower,
    defenderReinforcement:0,
    startedAt:Date.now(),
    resolvesAt:Date.now()+(RAID_TYPES[raidType].duration*10*60*1000), // 10 minutes real-time per "day" of duration — gives defender time to react without being tedious
    status:"pending",
  };
  try{
    await MP.db.collection("lobbies").doc(MP.lobbyCode).update({
      [`raids.${raidId}`]:raid,
      activityLog:window.firebase.firestore.FieldValue.arrayUnion({
        ts:Date.now(),
        msg:`${MP.playerHandle} launched a ${RAID_TYPES[raidType].name} on ${targetZone}`,
        actor:MP.playerHandle,
        type:"raid_launched",
      }),
    });
    return{ok:true,raidId};
  }catch(e){return{error:e.message}}
};

// Defender adds reinforcement power to an active raid
const mpReinforceDefense=async(raidId,reinforcement)=>{
  if(!MP.enabled||!MP.lobbyCode)return;
  try{
    await MP.db.collection("lobbies").doc(MP.lobbyCode).update({
      [`raids.${raidId}.defenderReinforcement`]:window.firebase.firestore.FieldValue.increment(reinforcement),
    });
  }catch(e){console.warn("Reinforce failed:",e)}
};

// Resolve a raid (called when resolvesAt < now). Determines winner + applies effects locally.
const mpResolveRaid=async(raid)=>{
  if(!MP.enabled||!MP.lobbyCode||raid.status!=="pending")return null;
  // Get defender's published power
  const defender=MP.worldState?.players?.[raid.defender];
  if(!defender)return{winner:"attacker",reason:"defender abandoned"};
  let defPower=raidDefenderPower(defender,raid.type)+(raid.defenderReinforcement||0);
  // Random factor ±15%
  const attRoll=raid.attackerPower*(0.85+Math.random()*0.30);
  const defRoll=defPower*(0.85+Math.random()*0.30);
  const winner=attRoll>defRoll?"attacker":"defender";
  try{
    await MP.db.collection("lobbies").doc(MP.lobbyCode).update({
      [`raids.${raid.id}.status`]:"resolved",
      [`raids.${raid.id}.winner`]:winner,
      [`raids.${raid.id}.resolvedAt`]:Date.now(),
      [`raids.${raid.id}.attackerRoll`]:Math.round(attRoll),
      [`raids.${raid.id}.defenderRoll`]:Math.round(defRoll),
      activityLog:window.firebase.firestore.FieldValue.arrayUnion({
        ts:Date.now(),
        msg:winner==="attacker"
          ?`${raid.attackerHandle} took ${raid.zone} from ${defender.handle}!`
          :`${defender.handle} repelled ${raid.attackerHandle}'s raid on ${raid.zone}.`,
        actor:winner==="attacker"?raid.attackerHandle:defender.handle,
        type:"raid_resolved",
      }),
    });
    // If attacker won, transfer zone ownership
    if(winner==="attacker"){
      await MP.db.collection("lobbies").doc(MP.lobbyCode).update({
        [`zoneOwnership.${raid.city}.${raid.zone}`]:raid.attacker,
      });
    }
    return{winner,attRoll,defRoll};
  }catch(e){console.warn("Resolve failed:",e);return null}
};

// Persist lobby info to localStorage so it survives reload
const mpSaveSession=()=>{
  if(MP.lobbyCode&&MP.playerId){
    try{localStorage.setItem("street_king_mp_session",JSON.stringify({lobbyCode:MP.lobbyCode,playerId:MP.playerId,playerHandle:MP.playerHandle}))}catch(e){}
  }
};
const mpLoadSession=()=>{
  try{
    const raw=localStorage.getItem("street_king_mp_session");
    if(!raw)return null;
    return JSON.parse(raw);
  }catch(e){return null}
};
const mpClearSession=()=>{
  try{localStorage.removeItem("street_king_mp_session")}catch(e){}
};
const clamp=(n,lo,hi)=>Math.max(lo,Math.min(hi,n));
const rand=(min,max)=>Math.floor(Math.random()*(max-min+1))+min;
const choose=(arr)=>arr[Math.floor(Math.random()*arr.length)];

const getZoneClients=(cityKey,zoneId)=>CLIENT_BANK[cityKey]?.[zoneId]||[];
const getAllZoneClients=(cityKey)=>{
  const out=[];const c=CLIENT_BANK[cityKey]||{};
  Object.keys(c).forEach(zid=>{out.push(...c[zid])});
  return out;
};
const lockedZoneClientCount=(g,zoneId)=>{
  const cks=getZoneClients(g.cityKey,zoneId);
  return cks.filter(cl=>g.clients?.[cl.id]?.locked).length;
};
const unlockedZoneClientCount=(g,zoneId)=>{
  const cks=getZoneClients(g.cityKey,zoneId);
  return cks.filter(cl=>g.clientUnlocks?.[cl.id]).length;
};

   nodes:[
     {prompt:({client,name})=>`${name} acknowledges you. Business mode. "What is it?"`,
      options:[
        {label:({params})=>`"I'm here for the drop. Cash on hand?"`,
         resolve:({client,gs,rel,name})=>{
           const monthlyValue=Math.round((client.lockBenefits?.cashMonthly||0)+client.monthlySpend*(gs.marketValue||80)*(1+client.pricePremium));
           const r=Math.random()+(rel*0.04);
           if(r>0.55)return{type:"instant_cash",amount:monthlyValue,message:`${name} pulls a stack from the safe. "All here. Counted twice." You leave with $${fmt(monthlyValue)}.`,mood:1};

           else return{type:"partial_cash",amount:Math.round(monthlyValue*0.5),message:`"Half this cycle. Rough month." You take it without arguing — relationship matters more than cash.`,mood:-1};
         }},
        {label:({params})=>`"Need to scale up. Can you take ${params.pct}% more this month?"`,
         editable:[{key:"pct",label:"INCREASE",unit:"%",min:5,max:50,step:5,default:25}],

           else return{type:"reject",message:`"Not this month. Maybe next quarter." They'll remember you asked.`,mood:0};

// Score a candidate's fit for a typed action
// Compute a realistic SELL POWER % for a candidate that incorporates skills, role, trust, deployment, and bonuses.
// This is what replaces the naive (charm+connect)/18 calculation.
const computeSellPower=(c,inOwnedZone)=>{
  // Base from skills (0-100)
  let base=((c.skills.charm+c.skills.connect)/18)*100;
  // Role multipliers — specialists at sales get a real edge over generalists
  if(c.specialty==="network")base*=1.25;        // Tito the Connect: born in the game
  else if(c.specialty==="diplomacy")base*=1.30; // Bishop: 6 languages, premium tier closer
  else if(c.specialty==="transport")base*=1.15; // Lil' Pez: knows every alley
  else if(c.specialty==="planning")base*=1.10;  // Elena: reads markets
  else if(c.id==="self")base*=0.90;             // Boss handling personally — busy, distracted
  // Trust modulation (only applies to crew, not freelancers/self)
  if(c.type==="crew"&&typeof c.trust==="number"){
    // Trust 0 = -20%, trust 5 = baseline, trust 10 = +20%
    base*=(0.80+(c.trust/10)*0.40);
  }
  // Deployment status — deployed crew are sharper than standby
  if(c.type==="crew"&&c.location&&c.location.includes("Deployed"))base*=1.05;
  // Lil' Pez: +15% in owned zones
  if(c.id==="runner"&&inOwnedZone)base*=1.15;
  // Tito: +25% sell-through
  if(c.id==="connect")base*=1.25;
  // Bishop: +30% sell-through
  if(c.id==="negotiator")base*=1.30;
  return Math.max(5,Math.min(100,Math.round(base)));
};

const scoreCandidate=(skills,actionLower)=>{
  let s=0;
  if(/intimidat|threat|hit|attack|muscle|enforce|collect|kill|shoot|beat|jump|whack|murder|eliminate|remove/.test(actionLower))s+=skills.muscle*3;
  if(/negotiat|talk|sit.?down|diplom|approach|relationship|build|cultivate|introduce|propose|charm|convince|persuade/.test(actionLower))s+=skills.charm*2.5+skills.connect*1.5;
  if(/plant|frame|set.?up|investigate|surveill|scrub|hack|leak|forge|forensic|trace|track/.test(actionLower))s+=skills.brain*2.5;
  if(/recruit|find|introduce|connect|scout|locate|sniff|cultivate/.test(actionLower))s+=skills.connect*3+skills.charm*1;
  if(/launder|clean|wash|move money|offshore|account|book|shell|tax/.test(actionLower))s+=skills.brain*2.5+skills.connect*1;
  if(/sell|deal|push|move.+product|distribut|unload|run/.test(actionLower))s+=skills.charm*1.5+skills.connect*1.5;
  if(/protect|guard|defend|escort|cover/.test(actionLower))s+=skills.muscle*2.5;
  if(s===0)s=(skills.brain+skills.charm+skills.connect)*0.6;
  return s;
};

// Predict 0-100 effectiveness for a typed action — used for FIT% display
// Takes the FULL candidate object so we can factor in role, trust, deployment, and bonuses.
const predictFitPct=(candidate,actionLower,inOwnedZone)=>{
  const skills=candidate.skills||{muscle:5,brain:5,charm:5,connect:5};
  // SELL ORDERS — use the realistic sell-power computation
  if(/sell|deal|push|move.+product|distribut|unload/.test(actionLower)){
    const sellPower=computeSellPower(candidate,inOwnedZone)/100;
    let priceAdj=0;
    const pctMatch=actionLower.match(/(\d+(?:\.\d+)?)\s*%\s*(above|over|premium|markup|more|below|under|less|off)?/);
    if(pctMatch){
      const pct=parseFloat(pctMatch[1])/100;
      const dirWord=pctMatch[2]||"";
      const isAbove=/(above|over|premium|markup|more)/.test(dirWord)||(/premium|markup|above|over/.test(actionLower)&&!/(below|under|off)/.test(dirWord));
      const isBelow=/(below|under|less|off)/.test(dirWord)||(/below|under|discount|cheap/.test(actionLower)&&!/(above|over)/.test(dirWord));
      if(isAbove)priceAdj=-pct*3;
      else if(isBelow)priceAdj=pct*0.8;
      else priceAdj=pct*0.8;
    }
    const qtyMatch=actionLower.match(/(\d+)\s*(unit|kg|gram|brick|key|oz)/)||actionLower.match(/(?:sell|move|push|deal|unload|distribut)\s+(\d+)(?!\s*%)/);
    let qtyPenalty=0;
    if(qtyMatch){const q=parseInt(qtyMatch[1]);if(q>10)qtyPenalty=-(q-10)*0.02}
    if(pctMatch&&/(above|over|premium|markup|more)/.test(actionLower)){
      const pct=parseFloat(pctMatch[1])/100;
      // Premium HARD-rejection: charm <8 + asking >15% above market
      // BUT Bishop (negotiator) bypasses this even at charm 9
      if(pct>0.15&&skills.charm<8&&candidate.id!=="negotiator")return Math.max(5,Math.round((sellPower+priceAdj+qtyPenalty)*100*0.4));
    }
    return Math.max(3,Math.min(100,Math.round((sellPower+priceAdj+qtyPenalty)*100)));
  }
  // MUSCLE ORDERS
  if(/intimidat|threat|hit|attack|muscle|enforce|collect|kill|shoot|beat|jump|whack|murder|eliminate|remove/.test(actionLower)){
    let pct=skills.muscle*10;
    if(candidate.id==="enforcer")pct*=1.5; // Stone: +50% intimidation
    if(candidate.type==="crew"&&typeof candidate.trust==="number")pct*=(0.85+(candidate.trust/10)*0.30);
    return Math.min(100,Math.round(pct));
  }
  // NEGOTIATION
  if(/negotiat|talk|sit.?down|diplom|approach|relationship|build|cultivate|propose|charm|convince|persuade/.test(actionLower)){
    let pct=(skills.charm*0.65+skills.connect*0.35)*10;
    if(candidate.id==="negotiator")pct*=1.30;
    if(candidate.type==="crew"&&typeof candidate.trust==="number")pct*=(0.85+(candidate.trust/10)*0.30);
    return Math.min(100,Math.round(pct));
  }
  // RECRUIT
  if(/recruit|find|introduce|connect|scout|locate|sniff/.test(actionLower)){
    let pct=(skills.connect*0.7+skills.charm*0.3)*10;
    if(candidate.id==="connect")pct*=1.25;
    if(candidate.type==="crew"&&typeof candidate.trust==="number")pct*=(0.85+(candidate.trust/10)*0.30);
    return Math.min(100,Math.round(pct));
  }
  // BRAIN WORK
  if(/plant|frame|set.?up|investigate|surveill|scrub|hack|leak|forge|forensic|trace|track/.test(actionLower)){
    let pct=skills.brain*10;
    if(candidate.id==="hacker"||candidate.id==="fixer")pct*=1.20;
    if(candidate.type==="crew"&&typeof candidate.trust==="number")pct*=(0.85+(candidate.trust/10)*0.30);
    return Math.min(100,Math.round(pct));
  }
  // LAUNDERING
  if(/launder|clean|wash|move money|offshore|account|book|shell|tax/.test(actionLower)){
    let pct=(skills.brain*0.7+skills.connect*0.3)*10;
    if(candidate.id==="fixer")pct*=1.20;
    if(candidate.type==="crew"&&typeof candidate.trust==="number")pct*=(0.85+(candidate.trust/10)*0.30);
    return Math.min(100,Math.round(pct));
  }
  // PROTECTION
  if(/protect|guard|defend|escort|cover/.test(actionLower)){
    let pct=skills.muscle*10;
    if(candidate.id==="enforcer")pct*=1.20;
    return Math.min(100,Math.round(pct));
  }
  // GENERIC
  let pct=(skills.brain+skills.charm+skills.connect)/3*10;
  if(candidate.id==="self")pct*=0.95;
  return Math.min(100,Math.round(pct));
};

const getZoneStatus=(g,zoneId)=>{
  if(g.zones[zoneId])return"you";

  if(g.rivals[zoneId])return"rival";
  return"neutral";
};
const meetsReq=(req,g,crewSkill)=>{
  if(!req)return true;
  if(req.cash&&g.cash<req.cash)return false;
  if(req.rel!=null){const id=g.currentNpcId;const r=g.npcRel[id]||0;if(r<req.rel)return false}
  if(req.rep&&g.rep<req.rep)return false;
  if(req.muscle&&(crewSkill?.muscle||0)<req.muscle)return false;
  if(req.brain&&(crewSkill?.brain||0)<req.brain)return false;
  if(req.charm&&(crewSkill?.charm||0)<req.charm)return false;
  return true;
};
const reqLabel=(req)=>{
  if(!req)return"";
  const parts=[];
  if(req.cash)parts.push("$"+fmt(req.cash));
  if(req.rel)parts.push("Rel "+req.rel+"+");
  if(req.rep)parts.push("Rep "+req.rep);
  if(req.muscle)parts.push("Muscle "+req.muscle);
  if(req.brain)parts.push("Brain "+req.brain);
  if(req.charm)parts.push("Charm "+req.charm);
  return parts.join(" · ");
};

// REAL-WORLD INTERACTIVE MAP via Leaflet + dark-filtered OSM tiles
function RegionMap({regionKey,zones,npcs,zoneStatuses,onZoneClick,onNpcClick,focusedZone,onUnfocus,g,onWhaleClick,enemyZones,onEnemyZoneClick}){
  const containerRef=useRef(null);
  const mapRef=useRef(null);
  const layersRef=useRef([]);
  const lastRegion=useRef(null);

  // Initialize / reset map when region changes
  useEffect(()=>{
    if(!containerRef.current||!window.L)return;
    const cfg=CITY_GEO[regionKey];if(!cfg)return;
    if(mapRef.current&&lastRegion.current!==regionKey){
      mapRef.current.remove();
      mapRef.current=null;
      layersRef.current=[];
    }
    if(!mapRef.current){
      const map=window.L.map(containerRef.current,{
        center:cfg.center,zoom:cfg.zoom,zoomControl:true,attributionControl:true,scrollWheelZoom:true,
      });
      // Tile loading with fallback chain — try Carto, fall back to alternate providers if blocked
      const tileUrls=[
        'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',
        'https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png',
        'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
      ];
      let tileLayerIdx=0;
      const tryTileLayer=(idx)=>{
        if(idx>=tileUrls.length)return;
        const layer=window.L.tileLayer(tileUrls[idx],{
          attribution:'&copy; OpenStreetMap contributors',
          subdomains:idx===0?'abcd':'abc',
          maxZoom:19,
          crossOrigin:true,
        });
        let errorCount=0;
        layer.on('tileerror',()=>{
          errorCount++;
          if(errorCount>=3&&idx<tileUrls.length-1){
            map.removeLayer(layer);
            tryTileLayer(idx+1);
          }
        });
        layer.addTo(map);
      };
      tryTileLayer(0);
      mapRef.current=map;
      lastRegion.current=regionKey;
      setTimeout(()=>{if(mapRef.current)mapRef.current.invalidateSize()},80);
    }
    return()=>{};
  },[regionKey]);

  // Cleanup on unmount
  useEffect(()=>()=>{
    if(mapRef.current){mapRef.current.remove();mapRef.current=null}
  },[]);

  // Auto-zoom to focused zone OR back to city view
  useEffect(()=>{
    if(!mapRef.current||!window.L)return;
    const cfg=CITY_GEO[regionKey];if(!cfg)return;
    if(focusedZone&&cfg.zones[focusedZone]){
      mapRef.current.flyTo(cfg.zones[focusedZone].center,14,{duration:0.9});
    }else{
      mapRef.current.flyTo(cfg.center,cfg.zoom,{duration:0.9});
    }
  },[focusedZone,regionKey]);

  // Update overlays when state changes
  useEffect(()=>{
    if(!mapRef.current||!window.L)return;
    const map=mapRef.current;
    const cfg=CITY_GEO[regionKey];if(!cfg)return;
    layersRef.current.forEach(l=>{try{map.removeLayer(l)}catch(e){}});
    layersRef.current=[];
    const palette={
      you:{fill:"#00FF6B",stroke:"#00FF6B",op:0.22,wt:2.5},
      rival:{fill:"#FF3838",stroke:"#FF3838",op:0.18,wt:2},
      contested:{fill:"#FFB800",stroke:"#FFB800",op:0.15,wt:2},
      neutral:{fill:"#3EC8FF",stroke:"#3EC8FF",op:0.06,wt:1.5},
    };
    zones.forEach(z=>{
      const zcfg=cfg.zones[z.id];if(!zcfg)return;
      // Enemy player owns this zone? Special handling
      const enemy=enemyZones?.[z.id];
      const status=enemy?"enemy":(zoneStatuses[z.id]||"neutral");
      const c=enemy?{fill:"#FF3838",stroke:"#FF3838",op:0.18,wt:2}:(palette[status]||palette.neutral);
      const isFocused=focusedZone===z.id;
      const poly=window.L.polygon(zcfg.polygon,{
        color:c.stroke,fillColor:c.fill,fillOpacity:isFocused?Math.min(c.op*2,0.45):c.op,weight:isFocused?c.wt+1.5:c.wt,opacity:isFocused?1:0.85,
      }).addTo(map);
      poly.on("click",()=>{enemy?onEnemyZoneClick&&onEnemyZoneClick(z,enemy):onZoneClick(z)});
      poly.on("mouseover",function(){this.setStyle({fillOpacity:Math.min(c.op*2.5,0.5),weight:c.wt+1.5})});
      poly.on("mouseout",function(){this.setStyle({fillOpacity:isFocused?Math.min(c.op*2,0.45):c.op,weight:isFocused?c.wt+1.5:c.wt})});
      const tooltipText=enemy?`${z.name.toUpperCase()} · ⚔ ${enemy.handle.toUpperCase()}`:z.name.toUpperCase();
      poly.bindTooltip(tooltipText,{permanent:true,direction:"center",className:"zone-tooltip "+status});
      layersRef.current.push(poly);
    });
    npcs.forEach(n=>{
      const zcfg=cfg.zones[n.zone];if(!zcfg)return;
      const sameZoneNpcs=npcs.filter(x=>x.zone===n.zone);
      const idx=sameZoneNpcs.indexOf(n);
      const offsetLat=(idx-(sameZoneNpcs.length-1)/2)*0.0015;
      const marker=window.L.marker([zcfg.center[0]+offsetLat,zcfg.center[1]],{
        icon:window.L.divIcon({
          className:"npc-marker",
          html:`<div class="npc-pin">${n.icon}</div>`,
          iconSize:[32,32],iconAnchor:[16,16],
        }),
      }).addTo(map);
      marker.on("click",()=>onNpcClick(n));
      marker.bindTooltip(n.name+" · "+n.role,{direction:"top",offset:[0,-14]});
      layersRef.current.push(marker);
    });
  },[regionKey,zones,npcs,zoneStatuses,onZoneClick,onNpcClick,focusedZone,enemyZones]);

  const focusedZoneObj=focusedZone?zones.find(z=>z.id===focusedZone):null;

  return(
    <div className="map-wrap">
      <div ref={containerRef} className="map-leaflet"></div>
      {focusedZoneObj&&(
        <>
          <div className="focus-indicator">FOCUSED ON<b>{focusedZoneObj.name}</b></div>
          <button className="map-back-btn" onClick={onUnfocus}>✕ BACK TO FULL VIEW</button>
          {/* Zone takeover progress */}
          {g&&(()=>{
            const owned=g.zones?.[focusedZoneObj.id]?true:false;
            const sales=g.zoneSales?.[focusedZoneObj.id]||0;
            const salesGoal=120; // sell 120u in zone for full sales credit
            const zoneClients=getZoneClients?(getZoneClients(g.cityKey,focusedZoneObj.id)||[]):[];
            const lockedHere=zoneClients.filter(cl=>g.clients?.[cl.id]?.locked).length;
            const salesPct=Math.min(100,(sales/salesGoal)*100);
            const clientsPct=Math.min(100,(lockedHere/Math.max(1,zoneClients.length))*100);
            const eligible=lockedHere>=3&&sales>=salesGoal*0.5;
            const allDone=lockedHere>=Math.min(4,zoneClients.length)&&sales>=salesGoal;
            return(
              <div style={{position:"absolute",top:14,left:14,zIndex:1000,padding:"12px 14px",background:"rgba(8,9,10,.95)",border:"1px solid "+(owned?"var(--green)":eligible?"var(--amber)":"var(--cyan-dim)"),borderLeft:"3px solid "+(owned?"var(--green)":eligible?"var(--amber)":"var(--cyan)"),width:340,backdropFilter:"blur(6px)",boxShadow:"0 4px 18px rgba(0,0,0,.5)",maxHeight:"calc(100vh - 200px)",overflowY:"auto"}}>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:13,letterSpacing:2.5,color:owned?"var(--green)":"var(--cyan)",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span>{owned?"✓ TERRITORY OWNED":eligible?"⚡ TAKEOVER ELIGIBLE":"TAKEOVER PROGRESS"}</span>
                  {allDone&&!owned&&<span style={{fontSize:9,color:"var(--amber)",letterSpacing:1.5}}>READY!</span>}
                </div>

                {/* Sales progress bar */}
                <div style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:9.5,color:"var(--txt-faint)",letterSpacing:1,marginBottom:3,fontFamily:"'JetBrains Mono',monospace"}}>
                    <span>UNITS SOLD</span><span>{sales}/{salesGoal}u</span>
                  </div>
                  <div style={{height:6,background:"rgba(255,255,255,.05)",overflow:"hidden",position:"relative"}}>
                    <div style={{height:"100%",width:salesPct+"%",background:salesPct>=100?"var(--green)":"var(--cyan)",transition:"width .4s"}}></div>
                  </div>
                </div>

                {/* Whale client locks */}
                <div style={{marginBottom:zoneClients.length>0?6:0}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:9.5,color:"var(--txt-faint)",letterSpacing:1,marginBottom:6,fontFamily:"'JetBrains Mono',monospace"}}>
                    <span>WHALE CLIENTS · {lockedHere}/{zoneClients.length||4} LOCKED</span>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:4}}>
                    {zoneClients.length===0?(
                      <div style={{fontSize:10,color:"var(--txt-faint)",fontStyle:"italic",padding:"4px 0"}}>No territorial clients mapped for this zone yet.</div>
                    ):zoneClients.map((cl,i)=>{
                      const cs=g.clients?.[cl.id];
                      const isLocked=cs?.locked;
                      const isUnlocked=g.clientUnlocks?.[cl.id]; // contactable
                      const threshold=ZONE_UNLOCK_THRESHOLDS?.[i]||120;
                      const unitsToUnlock=Math.max(0,threshold-sales);
                      const status=isLocked?"locked":isUnlocked?"unlocked":"contacts_locked";
                      const statusColor=isLocked?"var(--green)":isUnlocked?"var(--cyan)":"var(--txt-faint)";
                      const monthly=Math.round((cl.lockBenefits?.cashMonthly||0)+(cl.monthlySpend||0)*((g.marketValue||80))*(1+(cl.pricePremium||0)));
                      return(
                        <div key={cl.id} onClick={()=>onWhaleClick&&onWhaleClick(cl)} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 8px",background:isLocked?"rgba(0,255,107,.06)":isUnlocked?"rgba(62,200,255,.04)":"rgba(255,255,255,.02)",border:"1px solid "+(isLocked?"rgba(0,255,107,.3)":isUnlocked?"rgba(62,200,255,.2)":"var(--line)"),cursor:"pointer",transition:"all .15s"}} onMouseOver={e=>{e.currentTarget.style.background=isLocked?"rgba(0,255,107,.10)":isUnlocked?"rgba(62,200,255,.08)":"rgba(255,255,255,.05)"}} onMouseOut={e=>{e.currentTarget.style.background=isLocked?"rgba(0,255,107,.06)":isUnlocked?"rgba(62,200,255,.04)":"rgba(255,255,255,.02)"}}>
                          <span style={{fontSize:14,opacity:status==="contacts_locked"?0.4:1,filter:status==="contacts_locked"?"grayscale(.5)":"none"}}>{cl.icon}</span>
                          <div style={{flex:1,minWidth:0,overflow:"hidden"}}>
                            <div style={{fontSize:10.5,color:"var(--txt)",fontFamily:"'Bebas Neue',sans-serif",letterSpacing:1.2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",lineHeight:1.2}}>
                              {isLocked?cl.name.toUpperCase():isUnlocked?cl.name.toUpperCase():"???"}
                            </div>
                            <div style={{fontSize:8.5,letterSpacing:.5,color:statusColor,fontFamily:"'JetBrains Mono',monospace",lineHeight:1.3}}>
                              {isLocked?`✓ LOCKED · +$${fmt(monthly)}/mo`:isUnlocked?`◆ AVAILABLE · request meeting`:`◇ +${unitsToUnlock}u to unlock`}
                            </div>
                          </div>
                          <span style={{fontSize:8,color:statusColor,letterSpacing:.5,fontFamily:"'JetBrains Mono',monospace"}}>›</span>
                        </div>
                      );
                    })}
                  </div>
                </div>

                {!owned&&<div style={{fontSize:10,color:"var(--txt-faint)",letterSpacing:.5,fontStyle:"italic",lineHeight:1.4,marginTop:8,paddingTop:8,borderTop:"1px solid var(--line)"}}>{eligible?"Click ⚡ CLAIM TERRITORY in People tab.":lockedHere<3?`Lock ${3-lockedHere} more whale${3-lockedHere===1?"":"s"} + sell ${Math.max(0,Math.round(salesGoal*0.5)-sales)}u more.`:`Sell ${Math.max(0,Math.round(salesGoal*0.5)-sales)}u more to be eligible.`}</div>}
              </div>
            );
          })()}
        </>
      )}
      <div className="map-legend">
        <div className="lg-item"><span className="lg-dot you"></span><span>Yours</span></div>
        <div className="lg-item"><span className="lg-dot rival"></span><span>Rival</span></div>
        <div className="lg-item"><span className="lg-dot contested"></span><span>Contested</span></div>
        <div className="lg-item"><span className="lg-dot neutral"></span><span>Neutral · click to focus</span></div>
        <div className="lg-item" style={{marginLeft:"auto",color:"var(--cyan-dim)"}}>📍 NPCs · 🖱 scroll to zoom</div>
