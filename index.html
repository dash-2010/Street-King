// Detect profession archetype based on profession + bio fields
const detectArchetype=(client)=>{
  const text=((client.profession||"")+" "+(client.bio||"")).toLowerCase();
  for(const key of Object.keys(PROFESSION_ARCHETYPES)){
    if(PROFESSION_ARCHETYPES[key].match.test(text))return PROFESSION_ARCHETYPES[key];
  }
  return null;
};

const generateConv=(client)=>{
  if(!client||!client.name)return[];
  const first=client.name.split(" ")[0]||"They";
  const traits=client.personality||[];
  const prefersDiscretion=traits.some(t=>/discre|quiet|caref|status|valued|paranoid|secret/i.test(t));
  const tests=traits.some(t=>/test|calculat|formidable|sharp|sophisticat/i.test(t));
  const dangerHigh=(client.danger||0)>=7;
  const dangerLow=(client.danger||0)<=4;
  const cheapBuyer=(client.pricePremium||0)<=0;
  const premiumBuyer=(client.pricePremium||0)>=0.20;
  const product=client.preferred||"product";
  const productClean=String(product).split(",")[0].trim()||"product";
  const supplierClean=client.currentSupplier&&client.currentSupplier!=="None"?String(client.currentSupplier).split(" — ")[0].split(" (")[0]:"your current supplier";

  // Try to match a profession archetype for richly-flavored prompts
  const arch=detectArchetype(client);

  // Helper: process a prompt/options pair, replacing {first} in all strings
  const processPrompt=(s)=>String(s||"").replace(/\{first\}/g,first);
  const processOptions=(opts)=>(opts||[]).map(o=>({
    label:processPrompt(o.label),
    mood:o.m!=null?o.m:(o.mood||0),
    reply:processPrompt(o.reply),
    ...(o.requires?{requires:o.requires}:{})
  }));

  // CLIENT-SPECIFIC PERSONALIZATION — extracts a defining detail from the client's bio + data
  // and injects it into the opener and close so each conversation references THIS client uniquely.
  const personalize=(()=>{
    const bio=String(client.bio||"");
    const supplier=client.currentSupplier||"";
    // Try to extract a short defining phrase from the bio (first 15-25 chars of the most concrete sentence)
    let bioHook="";
    const bioParts=bio.split(/[.·]/).map(s=>s.trim()).filter(s=>s.length>15&&s.length<120);
    if(bioParts.length>0)bioHook=bioParts[Math.floor(Math.random()*bioParts.length)];
    // Build a unique opener tag — references their specific work/situation/supplier
    const openerTag=(()=>{
      const tags=[];
      if(bioHook)tags.push(`"You looked into me. You know ${bioHook.toLowerCase().replace(/^(the|a|an) /,"")}. So skip the introductions."`);
      if(supplier&&supplier!=="None"&&!supplier.toLowerCase().includes("none"))tags.push(`"I assume you know about ${supplier.split(" — ")[0].split(" (")[0]}. So get to the part where you're better."`);
      if(client.monthlySpend>=15)tags.push(`"My monthly take is ${client.monthlySpend} units. Whoever supplies me handles serious volume. Don't waste my time if you can't."`);
      else if(client.pricePremium>=0.30)tags.push(`"I pay ${Math.round(client.pricePremium*100)}% above market for quality. So your pitch had better start with quality, not price."`);
      if(client.danger>=8)tags.push(`"Before you speak — understand the room. The cost of insulting me is not financial. We clear?"`);
      else if(client.smart>=9)tags.push(`"I will be testing your answers against three different frameworks. So think carefully before each one."`);
      if(client.area)tags.push(`"${client.area} is a small world. By tomorrow morning everyone I respect will know we met. So make it count."`);
      return tags.length>0?tags[Math.floor(Math.random()*tags.length)]:"";
    })();
    // Build a unique close question using their specific situation
    const closeTag=(()=>{
      const tags=[];
      if(client.monthlySpend>=15)tags.push(`So convince me — when I'm spending ${client.monthlySpend} units a month with you, what stops you taking me for granted in year three?`);
      if(supplier&&supplier!=="None"&&!supplier.toLowerCase().includes("none"))tags.push(`I have a relationship with ${supplier.split(" — ")[0].split(" (")[0]} that took years to build. What makes the rebuild worth it?`);
      if(client.danger>=8)tags.push(`The last operator who failed me is buried somewhere they will not be found. So tell me — what makes you different?`);
      if(client.smart>=9)tags.push(`I can run this analysis from your side. The math doesn't favor switching suppliers. Give me a non-mathematical reason.`);
      if(bioHook)tags.push(`Knowing what you know about me — ${bioHook.toLowerCase()} — why do you think THIS is the right meeting?`);
      return tags.length>0?tags[Math.floor(Math.random()*tags.length)]:"";
    })();
    return{openerTag,closeTag};
  })();

  // STEP 1 — Opening
  const openerSetting=arch?processPrompt(arch.setting({h:client.hangout})):`${first} is here. Watching.`;
  const openerLine=arch?arch.openerHook:`"You have my attention. Say something useful or leave."`;
  // Splice in the client-specific tag if available
  const finalOpenerLine=personalize.openerTag?`${openerLine} ${personalize.openerTag}`:openerLine;
  const step1={
    prompt:`${openerSetting} ${finalOpenerLine}`,
    options:arch?processOptions(arch.pitches):[
      {label:`"I was sent your way by someone who said you were a serious operator. I'd like to discuss an arrangement."`,mood:prefersDiscretion?3:2,reply:`${first} nods slowly. "Serious. Vague. Continue."`},
      {label:`"I know your supplier. I think I can do better. Cleaner product, on time, every time."`,mood:premiumBuyer?-2:3,reply:premiumBuyer?`${first}'s expression flattens. "My supplier is none of your business — yet."`:`${first}: "Better is the only word that matters. Prove it."`},
      {label:`"Direct: ${client.area||"this area"} talks. ${first} buys quality. I sell quality. Let's talk."`,mood:tests?2:4,reply:tests?`${first}: "Bold. We'll see if you can back it up."`:`${first}: "Direct works. I'm listening."`},
      {label:`"Look — I'll give you a discount no one else will. Beat me if you can."`,mood:premiumBuyer?-4:cheapBuyer?3:-1,reply:premiumBuyer?`${first} laughs without warmth. "Price-cutters chase volume because they have nothing else. We're done with the wrong opener."`:`${first}: "Numbers. Now. Or you're talking yourself out of the meeting."`},
    ],
  };

  // STEP 2 — Probe (NEW): they push you on a specific concern
  const probePromptSrc=arch?.probePrompt||SHARED_BEATS.probePrompt;
  const probeOptionsSrc=arch?.probeOptions||SHARED_BEATS.probeOptions;
  const step2={
    prompt:processPrompt(probePromptSrc),
    options:processOptions(probeOptionsSrc),
  };

  // STEP 3 — Operational pitch
  const step3={
    prompt:`${first} considers. "Now — operations. I want to know HOW you run this. Specifics."`,
    options:[
      {label:`"Monthly delivery via dedicated runner. ${productClean}. Encrypted comms. Cash on delivery, no paper."`,mood:prefersDiscretion?5:3,reply:`${first}: "Operational discipline. I respect that. Continue."`},
      {label:`"One-off sample first. You judge product, then we discuss volume."`,mood:tests?5:3,reply:`${first}: "Audition. Acceptable. I prefer evidence to claims."`},
      {label:`"My fixer handles any noise. My runner network covers eight zones. My chemist tests every batch."`,mood:5,reply:`${first}: "A whole operation. Not a one-man hustle. Now I'm interested."`},
      {label:`"Whatever you currently buy, I can guarantee zero supply gaps. Continuity is my pitch."`,mood:4,reply:`${first}: "Continuity matters more than people realise. Continue."`},
      ...(dangerHigh?[{label:`"I respect what you've built. I'm not here to compete with your operation — I'm here to support it."`,mood:-2,reply:`${first}: "Flattery is the opener of someone with nothing else."`}]:[]),
    ],
  };

  // STEP 4 — Counter (NEW): they raise a hard objection
  const counterPromptSrc=arch?.counterPrompt||SHARED_BEATS.counterPrompt;
  const counterOptionsSrc=arch?.counterOptions||SHARED_BEATS.counterOptions;
  const step4={
    prompt:processPrompt(counterPromptSrc),
    options:processOptions(counterOptionsSrc),
  };

  // STEP 5 — Stakes / close question (the original step 3)
  const closeQ=arch?arch.closeQ:`"Why should I take the risk of switching to you${supplierClean!=="your current supplier"?` from ${supplierClean}`:""}?"`;
  // Splice in the client-specific close tag if available — makes the close feel personal to THIS client
  const finalCloseQ=personalize.closeTag?`${processPrompt(closeQ)} "${personalize.closeTag}"`:processPrompt(closeQ);
  const step5={
    prompt:`${first} pauses, watching you carefully. ${finalCloseQ}`,
    options:[
      {label:`"Because reliability isn't a feature, it's the whole product. Let me prove it on a small run first."`,mood:5,reply:`${first}: "Sensible. We can start small."`},
      {label:`"Because Bishop will vouch for me — and you know what his word means."`,mood:6,reply:`${first}: "Bishop. That changes the conversation."`,requires:"negotiator"},
      {label:`"Because Park can clean any noise this generates. Discretion is built in."`,mood:5,reply:`${first}: "A fixer. Smart. That tells me you've thought about the back-end."`,requires:"fixer"},
      {label:`"Because if you don't like the arrangement, you walk. No bridges burned."`,mood:prefersDiscretion?5:3,reply:`${first}: "Optionality. I value that. Most operators trap you."`},
      {label:`"Because I'm hungry and they're not. Hungry operators move faster."`,mood:tests?-3:2,reply:tests?`${first}: "Hunger is for amateurs. Discipline beats hunger every day."`:`${first}: "Hunger. Maybe. Maybe."`},
      ...(dangerLow?[{label:`"Because I won't bring drama to your life. That's a feature for someone like you."`,mood:5,reply:`${first}: "Drama-free. The most underrated quality in this trade."`}]:[]),
    ],
  };

  // STEP 6 — Final ask (NEW): what they want from YOU specifically
  const finalPromptSrc=arch?.finalPrompt||SHARED_BEATS.finalPrompt;
  const finalOptionsSrc=arch?.finalOptions||SHARED_BEATS.finalOptions;
  const step6={
    prompt:processPrompt(finalPromptSrc),
    options:processOptions(finalOptionsSrc),
  };

  return[step1,step2,step3,step4,step5,step6];
};

function ConversationModal({client,hiredCrew,onConclude,onWalk}){
  const [step,setStep]=useState(0);
  const [mood,setMood]=useState(0);
  const [history,setHistory]=useState([]); // {prompt, picked, reply}
  const [showReply,setShowReply]=useState(null);

  // Defensive: bail out gracefully if no client
  if(!client||!client.name){
    return(<div className="ov" onClick={onWalk}><div className="modal" onClick={e=>e.stopPropagation()}><div className="modal-hdr"><div><div className="modal-tag bad">ERROR</div><div className="modal-title">No client data</div></div><button className="modal-x" onClick={onWalk}>×</button></div><div className="modal-body"><p style={{color:"var(--red)",padding:14}}>Could not load client. Close and try again.</p></div></div></div>);
  }

  // Use hand-written conv if available, otherwise generate one from client data
  // Priority: client.conv (legacy inline) → CONV_OVERRIDES[client.id] (per-client bespoke) → generateConv (archetype-driven fallback)
  let conv;
  try{
    if(client.conv&&Array.isArray(client.conv)&&client.conv.length>0)conv=client.conv;
    else if(typeof CONV_OVERRIDES!=="undefined"&&CONV_OVERRIDES[client.id])conv=CONV_OVERRIDES[client.id];
    else conv=generateConv(client);
  }catch(e){
    console.error("[ConversationModal] generateConv failed:",e);
    // Hard fallback so we never blank out
    conv=[
      {prompt:`${client.name.split(" ")[0]} meets you. "Make your case."`,
       options:[
         {label:`"I want to be your supplier. I'll match what you've got and improve reliability."`,mood:2,reply:`"Reasonable opener. Continue."`},
         {label:`"Heard your name. Wanted to meet. I sell quality."`,mood:1,reply:`"Brief. I'll allow it."`},
         {label:`"I'll undercut whoever you use now. By how much, name your price."`,mood:-1,reply:`"Pricing-led pitches make me suspicious."`},
       ]},
      {prompt:`"What's your operation actually like? Specifics."`,
       options:[
         {label:`"Discreet runners, clean product, on-time delivery — every cycle."`,mood:2,reply:`"Exactly the words I needed to hear."`},
         {label:`"Sample run first, no commitment. You judge."`,mood:2,reply:`"A sample. Acceptable."`},
         {label:`"Whatever you need, when you need it. Flexibility's my edge."`,mood:0,reply:`"Vague answers don't get past my front door."`},
       ]},
      {prompt:`"Last question. Why you?"`,
       options:[
         {label:`"Because I'll earn this slowly. Reliability over volume."`,mood:2,reply:`"That's the right answer."`},
         {label:`"Because I'm hungry. I'll outwork your current supplier."`,mood:1,reply:`"Hunger's only useful with discipline."`},
         {label:`"Because if it doesn't work, you walk. No bridges burned."`,mood:2,reply:`"Optionality. I value that."`},
       ]},
    ];
  }
  // Sensible defaults if accept/maybe missing for bank clients
  // Scale thresholds with conversation length: 3-step convos use raw values; 6-step needs ~1.8x.
  const stepCount=conv.length||3;
  const stepScale=stepCount>=5?1.8:1;
  const baseAccept=client.accept!=null?client.accept:Math.max(5,Math.round((client.smart||5)*0.8+(client.danger||5)*0.5));
  const baseMaybe=client.maybe!=null?client.maybe:Math.max(2,Math.round(baseAccept*0.5));
  const acceptThreshold=Math.round(baseAccept*stepScale);
  const maybeThreshold=Math.round(baseMaybe*stepScale);
  const isComplete=step>=conv.length;
  const pct=Math.max(0,Math.min(100,((mood+5)/(acceptThreshold+5))*100));
  const moodColor=mood>=acceptThreshold?"var(--green)":mood>=maybeThreshold?"var(--amber)":mood<-2?"var(--red)":"var(--cyan)";

  const pickOption=(opt)=>{
    if(opt.requires&&!hiredCrew.includes(opt.requires))return; // disabled, shouldn't fire
    const newMood=mood+opt.mood;
    setMood(newMood);
    setHistory([...history,{prompt:conv[step].prompt,picked:opt.label,reply:opt.reply,mood:opt.mood}]);
    setShowReply({reply:opt.reply,delta:opt.mood});
    setTimeout(()=>{setShowReply(null);setStep(step+1)},1900);
  };

  if(isComplete){
    const outcome=mood>=acceptThreshold?"accept":mood>=maybeThreshold?"maybe":"reject";
    const tag=outcome==="accept"?"✓ DEAL — CLIENT LOCKED":outcome==="maybe"?"~ COUNTER-OFFER":"✗ REJECTED";
    const text=outcome==="accept"?`${client.name.split(" ")[0]} extends a hand. "We have an arrangement. My terms will be sent to you by week's end."`:outcome==="maybe"?`${client.name.split(" ")[0]} pauses. "Not today. But not never. Come back when you've grown into yourself a little more."`:`${client.name.split(" ")[0]} is already standing. The conversation is over. The door is behind you.`;
    return(
      <div className="ov">
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <div className="modal-hdr">
            <div>
              <div className="modal-tag good">CONVERSATION RESULT</div>
              <div className="modal-title">{client.icon} {client.name.split(" ")[0]}</div>
              <div className="modal-sub">Final mood: {mood} · Threshold: {acceptThreshold}</div>
            </div>
          </div>
          <div className="modal-body">
            <div className={"conv-outcome "+outcome}>
              <div className="conv-outcome-tag">{tag}</div>
              <div className="conv-outcome-text">{text}</div>
            </div>
            {outcome==="accept"&&(<div className="client-benefit"><b>BENEFITS UNLOCKED</b><br/>{client.lockBenefit}</div>)}
            <div style={{marginTop:14,fontSize:11,color:"var(--txt-faint)",textAlign:"center",letterSpacing:1.5}}>{outcome==="accept"?"Recurring revenue begins next monthly cycle. Re-engage anytime.":outcome==="maybe"?"Cooldown: 7 days. Then you can try again.":"Cooldown: 14 days. They've added you to a list. Be more careful next time."}</div>
            <button className="btn" style={{width:"100%",marginTop:18,padding:12}} onClick={()=>onConclude(outcome,mood)}>► CLOSE</button>
          </div>
        </div>
      </div>
    );
  }

  const current=conv[step];
  return(
    <div className="ov">
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-hdr">
          <div>
            <div className="modal-tag neutral">MEETING · STEP {step+1} OF {conv.length}</div>
            <div className="modal-title">{client.icon} {client.name}</div>
            <div className="modal-sub">{client.hangout}</div>
          </div>
          <button className="modal-x" onClick={onWalk}>×</button>
        </div>
        <div className="modal-body">
          <div className="conv-mood-row">
            <span className="conv-mood-label">THEIR MOOD</span>
            <div className="conv-mood-bar"><div className="conv-mood-fill" style={{width:pct+"%",background:moodColor}}/></div>
            <span className="conv-mood-val" style={{color:moodColor}}>{mood>0?"+":""}{mood}</span>
          </div>
          {history.length>0&&(
            <div style={{marginBottom:14,padding:"10px 14px",background:"rgba(255,255,255,.02)",fontSize:11,color:"var(--txt-faint)",letterSpacing:.3,fontStyle:"italic",lineHeight:1.6}}>
              <div style={{fontWeight:700,letterSpacing:1.5,fontStyle:"normal",marginBottom:4,fontSize:9.5}}>SO FAR</div>
              {history.map((h,i)=>(<div key={i} style={{marginBottom:3}}>· You: {h.picked.replace(/^"|"$/g,"").slice(0,50)}{h.picked.length>52?"…":""} ({h.mood>0?"+":""}{h.mood})</div>))}
            </div>
          )}
          <div className="conv-step-label">► {client.name.split(" ")[0].toUpperCase()} SAYS</div>
          <div className="conv-prompt">{current.prompt}</div>
          {showReply?(
            <div className="conv-reply">{showReply.reply} <span style={{color:showReply.delta>0?"var(--green)":showReply.delta<0?"var(--red)":"var(--txt-faint)",fontStyle:"normal",fontWeight:700,marginLeft:8,letterSpacing:1}}>[{showReply.delta>0?"+":""}{showReply.delta} mood]</span></div>
          ):(
            <>
              <div className="conv-step-label">► YOUR RESPONSE</div>
              <div className="conv-options">
                {current.options.map((opt,i)=>{
                  const lockedOpt=opt.requires&&!hiredCrew.includes(opt.requires);
                  return(
                    <button key={i} className="conv-option" disabled={lockedOpt} onClick={()=>pickOption(opt)}>
                      {opt.label}
                      {lockedOpt&&<span className="conv-option-locked">🔒 REQUIRES {opt.requires.toUpperCase()} HIRED</span>}
                    </button>
                  );
                })}
              </div>
              <button className="btn btn-back btn-sm" onClick={onWalk} style={{width:"100%"}}>✕ WALK OUT (mood preserved)</button>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

function PeoplePage({g,region,onCrewClick,onNpcClick,onClientClick,onClaimZone}){
  const hiredIds=g.hiredCrew||[];
  const hired=CREW_ROSTER.filter(c=>hiredIds.includes(c.id));
  // Source of truth: CLIENT_BANK (32 territorial clients). Show those unlocked OR locked.
  const bankClients=getAllZoneClients(g.cityKey);
  const visibleBank=bankClients.filter(cl=>g.clientUnlocks?.[cl.id]||g.clients?.[cl.id]?.locked);
  // Introduced secondaries (from old SECONDARY_CLIENTS pool, via primary intros)
  const introducedIds=Object.keys(g.introducedClients||{});
  const introducedSecondaries=[];
  (CLIENT_ROSTER[g.cityKey]||[]).forEach(pp=>{
    const pool=SECONDARY_CLIENTS[g.cityKey]?.[pp.id]||[];
    pool.forEach(s=>{if(introducedIds.includes(s.id))introducedSecondaries.push(s)});
  });
  // Legacy CLIENT_ROSTER clients only if user has previously locked them (existing saves)
  const legacyLocked=(CLIENT_ROSTER[g.cityKey]||[]).filter(cl=>g.clients?.[cl.id]?.locked&&!bankClients.find(b=>b.id===cl.id));
  const allMap={};
  [...visibleBank,...introducedSecondaries,...legacyLocked].forEach(c=>{allMap[c.id]=c});
  const cityClients=Object.values(allMap);
  const lockedClients=cityClients.filter(cl=>g.clients?.[cl.id]?.locked);
  const otherClients=cityClients.filter(cl=>!g.clients?.[cl.id]?.locked);
  // Categorise NPCs
  const npcsWithStatus=region.npcs.map(n=>{
    const met=g.npcs?.[n.id]?.met||false;
    const rel=g.npcRel?.[n.id]||0;
    const archetype=n.archetype||"wildcard";
    const isThreat=archetype==="clean_fed"||archetype==="rival";
    let status="unmet";
    if(met){
      if(rel>=2)status="allied";
      else if(isThreat)status="threat";
      else status="met";
    }else if(isThreat)status="threat";
    return{...n,met,rel,status,archetype};
  });
  const allies=npcsWithStatus.filter(n=>n.status==="allied");
  const contacts=npcsWithStatus.filter(n=>n.status==="met");
  const threats=npcsWithStatus.filter(n=>n.status==="threat");
  const unmet=npcsWithStatus.filter(n=>n.status==="unmet");

  const npcCard=(n)=>(
    <div key={n.id} className={"people-card "+n.status} onClick={()=>onNpcClick(n)}>
      <div className="people-card-hdr">
        <span className="people-icon">{n.icon}</span>
        <div style={{flex:1,minWidth:0}}>
          <div className="people-name">{n.name}</div>
          <div className="people-role">{n.role}</div>
          <div className="people-zone">📍 <b>{region.zones.find(z=>z.id===n.zone)?.name||n.zone}</b></div>
        </div>
      </div>
      <div className="people-status-row">
        <span className={"people-status "+n.status}>{n.status==="allied"?`ALLIED · REL ${n.rel}`:n.status==="met"?`MET · REL ${n.rel}`:n.status==="threat"?(n.met?"HOSTILE":"THREAT — UNMET"):"UNMET"}</span>
      </div>
      <div className="people-strength">{NPC_STRENGTH[n.archetype]||"Unknown role."}</div>
    </div>
  );

  return(
    <>
      <h1 className="hdr">PEOPLE</h1>
      <div className="sub">YOUR NETWORK · CLICK ANY PROFILE FOR FULL DETAIL OR DIALOGUE</div>

      <div className="kpi-grid">
        <div className="kpi"><div className="kpi-l">Your Crew</div><div className="kpi-v" style={{color:"var(--green)"}}>{hired.length}</div><div className="kpi-d">on the books</div></div>
        <div className="kpi"><div className="kpi-l">Locked Clients</div><div className="kpi-v" style={{color:"var(--green)"}}>{lockedClients.length}</div><div className="kpi-d">/ {cityClients.length} whales</div></div>
        <div className="kpi"><div className="kpi-l">Recurring Revenue</div><div className="kpi-v" style={{color:"var(--amber)"}}>${fmt(lockedClients.reduce((s,cl)=>{const lb=cl.lockBenefits||{};const productRev=Math.round(cl.monthlySpend*(g.marketValue||baseMVFor(g.cityKey))*(1+cl.pricePremium));return s+productRev+(lb.cashMonthly||0)+(lb.cleanMonthly||0)},0))}</div><div className="kpi-d">/ month from clients</div></div>
        <div className="kpi"><div className="kpi-l">Threats</div><div className="kpi-v" style={{color:"var(--red)"}}>{threats.length}</div><div className="kpi-d">rivals + feds</div></div>
      </div>

      {/* Territorial progress — sales tracking per zone unlocks new clients */}
      <div className="people-section">
        <div className="people-section-title"><span>► TERRITORIAL PROGRESS — UNLOCK CLIENTS BY SELLING IN AREAS</span><span className="people-section-count">{Object.keys(g.clientUnlocks||{}).length}/{getAllZoneClients(g.cityKey).length} UNLOCKED</span></div>
        <div className="people-grid">
          {Object.keys(CLIENT_BANK[g.cityKey]||{}).map(zid=>{
            const z=region.zones.find(zz=>zz.id===zid);
            if(!z)return null;
            const sales=g.zoneSales?.[zid]||0;
            const zClients=getZoneClients(g.cityKey,zid);
            const unlocked=zClients.filter(cl=>g.clientUnlocks?.[cl.id]).length;
            const locked=zClients.filter(cl=>g.clients?.[cl.id]?.locked).length;
            const owned=g.zones[zid]?true:false;
            const nextThreshold=ZONE_UNLOCK_THRESHOLDS.find((t,i)=>!g.clientUnlocks?.[zClients[i]?.id]&&sales<t);
            const nextNeeded=nextThreshold?nextThreshold-sales:0;
            const nextClient=nextThreshold?zClients[ZONE_UNLOCK_THRESHOLDS.indexOf(nextThreshold)]:null;
            const takeover=locked>=3&&!owned;
            return(
              <div key={zid} className="people-card" style={takeover?{borderLeftColor:"var(--amber)",background:"rgba(255,184,0,.04)"}:{}}>
                <div className="people-card-hdr">
                  <span className="people-icon">📍</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div className="people-name">{z.name.toUpperCase()}{owned?<span style={{color:"var(--green)",fontSize:9,letterSpacing:1.5,marginLeft:6}}>● OWNED</span>:""}</div>
                    <div className="people-role">{z.landmark}</div>
                    <div style={{fontSize:10,color:"var(--txt-faint)",marginTop:4,fontFamily:"'JetBrains Mono',monospace"}}>{sales}u sold · {unlocked}/{zClients.length} unlocked · {locked}/{zClients.length} locked</div>
                  </div>
                </div>
                {/* Progress bar to next unlock */}
                {nextClient?(
                  <>
                    <div style={{height:6,background:"rgba(255,255,255,.04)",overflow:"hidden",margin:"10px 0 4px"}}>
                      <div style={{height:"100%",width:Math.min(100,(sales/nextThreshold)*100)+"%",background:"var(--cyan)"}}></div>
                    </div>
                    <div style={{fontSize:10,color:"var(--cyan-dim)",letterSpacing:.5}}>{nextNeeded}u more → unlock <b style={{color:"var(--cyan)"}}>{nextClient.name}</b></div>
                  </>
                ):unlocked===zClients.length?(
                  <div style={{fontSize:10,color:"var(--green)",letterSpacing:.5,marginTop:8,fontStyle:"italic"}}>✓ All {zClients.length} clients in this zone unlocked.</div>
                ):null}
                {takeover&&(
                  <button onClick={(e)=>{e.stopPropagation();onClaimZone&&onClaimZone(zid)}} style={{marginTop:10,padding:"10px 14px",background:"rgba(255,184,0,.15)",border:"1px solid var(--amber)",borderLeft:"3px solid var(--amber)",fontSize:11,color:"var(--amber)",letterSpacing:1.5,fontFamily:"'Bebas Neue',sans-serif",cursor:"pointer",width:"100%",textAlign:"left",fontWeight:700,transition:"all .15s"}} onMouseOver={e=>{e.currentTarget.style.background="rgba(255,184,0,.25)"}} onMouseOut={e=>{e.currentTarget.style.background="rgba(255,184,0,.15)"}}>⚡ CLAIM TERRITORY · $15,000 · {locked}/4 INFLUENCE</button>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {/* Client base — high-value buyers */}
      <div className="people-section">
        <div className="people-section-title"><span>► CLIENT BASE — HIGH-VALUE BUYERS</span><span className="people-section-count">{lockedClients.length} LOCKED · {otherClients.length} PROSPECTIVE</span></div>
        {cityClients.length===0?(
          <div className="panel" style={{color:"var(--txt-faint)",textAlign:"center",fontStyle:"italic"}}>No clients available yet — sell product in zones to attract them.</div>
        ):(
          <div className="people-grid">
            {[...lockedClients,...otherClients].map(cl=>{
              const cs={...g.clients?.[cl.id],currentDay:g.day};
              return<ClientCard key={cl.id} client={cl} clientState={cs} alias={g.alias} onClick={()=>onClientClick(cl)}/>;
            })}
          </div>
        )}
      </div>

      {/* Crew section */}
      <div className="people-section">
        <div className="people-section-title"><span>► YOUR CREW</span><span className="people-section-count">{hired.length} ACTIVE</span></div>
        {hired.length===0?<div className="panel" style={{color:"var(--txt-faint)",textAlign:"center"}}>No hired crew yet. Visit the Crew tab to recruit.</div>:(
          <div className="people-grid">
            {hired.map(c=>{
              const cs=g.crewState?.[c.id]||{};
              const dz=cs.deployedTo?region.zones.find(z=>z.id===cs.deployedTo):null;
              return(
                <div key={c.id} className="people-card allied" onClick={()=>onCrewClick(c)}>
                  <div className="people-card-hdr">
                    <span className="people-icon">{c.icon}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div className="people-name">{c.name}</div>
                      <div className="people-role">{c.role} · CREW</div>
                      <div className="people-zone">📍 <b>{dz?dz.name+" (deployed)":"On standby"}</b></div>
                    </div>
                  </div>
                  <div className="people-status-row">
                    <span className="people-status allied">TRUST {cs.trust||0}/10</span>
                    <span className="people-status met">${fmt(c.weekly)}/wk</span>
                  </div>
                  <div className="people-strength">{c.desc}</div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {allies.length>0&&(
        <div className="people-section">
          <div className="people-section-title"><span>► ALLIED CONTACTS</span><span className="people-section-count">{allies.length}</span></div>
          <div className="people-grid">{allies.map(npcCard)}</div>
        </div>
      )}

      {contacts.length>0&&(
        <div className="people-section">
          <div className="people-section-title"><span>► MET — NEUTRAL</span><span className="people-section-count">{contacts.length}</span></div>
          <div className="people-grid">{contacts.map(npcCard)}</div>
        </div>
      )}

      {threats.length>0&&(
        <div className="people-section">
          <div className="people-section-title" style={{color:"var(--red)"}}><span>► THREATS</span><span className="people-section-count">{threats.length}</span></div>
          <div className="people-grid">{threats.map(npcCard)}</div>
        </div>
      )}

      {unmet.length>0&&(
        <div className="people-section">
          <div className="people-section-title"><span>► UNMET — IN THE CITY</span><span className="people-section-count">{unmet.length}</span></div>
          <div className="people-grid">{unmet.map(npcCard)}</div>
        </div>
      )}
    </>
  );
}

// ─── ERROR BOUNDARY ─────────────────────────────────────────────────────────
class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={err:null,info:null}}
  static getDerivedStateFromError(err){return{err}}
  componentDidCatch(err,info){console.error("[StreetKing] crashed:",err,info);this.setState({info})}
  render(){
    if(this.state.err){
      return(<div style={{padding:"40px 30px",fontFamily:"'JetBrains Mono',monospace",background:"#08090A",color:"#FF3838",minHeight:"100vh"}}>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:32,letterSpacing:4,marginBottom:14}}>⚠ STREET KING — RUNTIME CRASH</div>
        <div style={{color:"#FFB800",fontSize:13,letterSpacing:1,marginBottom:18,lineHeight:1.6}}>The app hit an error and the screen went blank. Your save is on disk — refresh to recover.</div>
        <div style={{padding:"14px 18px",background:"rgba(255,56,56,.06)",borderLeft:"3px solid #FF3838",fontSize:12,color:"#FF8585",fontFamily:"monospace",whiteSpace:"pre-wrap",lineHeight:1.5,maxHeight:300,overflow:"auto"}}>{String(this.state.err?.message||this.state.err)}{"\n\n"}{this.state.info?.componentStack||""}</div>
        <div style={{marginTop:20,display:"flex",gap:12}}>
          <button onClick={()=>{this.setState({err:null,info:null});location.reload()}} style={{background:"rgba(0,255,107,.10)",border:"1px solid #00FF6B",color:"#00FF6B",padding:"10px 20px",fontFamily:"'Bebas Neue',sans-serif",fontSize:13,letterSpacing:2.5,cursor:"pointer"}}>↻ RELOAD</button>
          <button onClick={()=>{try{localStorage.removeItem("street_king_save_v3")}catch(e){};location.reload()}} style={{background:"rgba(255,56,56,.10)",border:"1px solid #FF3838",color:"#FF3838",padding:"10px 20px",fontFamily:"'Bebas Neue',sans-serif",fontSize:13,letterSpacing:2.5,cursor:"pointer"}}>↺ HARD RESET (deletes save)</button>
        </div>
      </div>);
    }
    return this.props.children;
  }
}

function RaidLaunchModal({target,zone,city,gameState,onResolve,onCancel}){
  // target = {id, handle, ...} other player
  const available=availableRaidTypes(gameState);
  const [chosen,setChosen]=useState(null);
  const [submitting,setSubmitting]=useState(false);

  const launch=async(raidType)=>{
    setSubmitting(true);
    const power=raidAttackerPower(gameState,raidType);
    const result=await mpLaunchRaid(raidType,target.id,city,zone,power);
    if(result.ok){
      onResolve({type:raidType,heat:RAID_TYPES[raidType].heatGenerated});
    }else{
      alert("Raid failed: "+result.error);
      setSubmitting(false);
    }
  };

  if(available.length===0){
    return(
      <div className="ov">
        <div className="modal" style={{maxWidth:480}}>
          <div className="modal-hdr" style={{borderColor:"var(--amber)"}}>
            <div>
              <div className="modal-tag" style={{color:"var(--amber)",borderColor:"var(--amber)"}}>NO RAID OPTIONS</div>
              <div className="modal-title">CREW NOT READY</div>
            </div>
          </div>
          <div className="modal-body">
            <p style={{fontSize:13,color:"var(--txt-dim)",lineHeight:1.7,marginBottom:14}}>You don't have the crew to launch a raid yet. Hire crew to unlock raid types:</p>
            <ul style={{fontSize:12,color:"var(--txt-dim)",lineHeight:1.8,paddingLeft:20}}>
              <li>Any <b style={{color:"var(--amber)"}}>Enforcer</b> → unlocks <b>SMASH & GRAB</b></li>
              <li><b style={{color:"var(--amber)"}}>Elite Enforcer + Connect</b> → unlocks <b>SURGICAL STRIKE</b></li>
              <li><b style={{color:"var(--amber)"}}>Bishop (Negotiator) + Elite Enforcer</b> → unlocks <b>HOSTILE TAKEOVER</b></li>
            </ul>
            <button className="btn" onClick={onCancel} style={{width:"100%",marginTop:18}}>► UNDERSTOOD</button>
          </div>
        </div>
      </div>
    );
  }

  return(
    <div className="ov">
      <div className="modal" style={{maxWidth:680}}>
        <div className="modal-hdr" style={{borderColor:"var(--red)"}}>
          <div>
            <div className="modal-tag" style={{color:"var(--red)",borderColor:"var(--red)",background:"rgba(255,56,56,.1)"}}>⚠ HOSTILE ACTION</div>
            <div className="modal-title">RAID {target.handle.toUpperCase()}</div>
            <div className="modal-sub">Target zone: {zone} · Defender power est: {Math.round(raidDefenderPower(target,"smash_grab"))}</div>
          </div>
        </div>
        <div className="modal-body">
          <p style={{fontSize:13,color:"var(--txt-dim)",lineHeight:1.7,marginBottom:18}}>Pick your raid type. Each takes 1-2 days to resolve. The defender will be notified and can deploy crew to reinforce. Heat applies regardless of outcome.</p>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {available.map(rt=>{
              const power=raidAttackerPower(gameState,rt.id);
              const defPower=raidDefenderPower(target,rt.id);
              const oddsRaw=power/(power+defPower);
              const oddsPct=Math.round(oddsRaw*100);
              return(
                <div key={rt.id} onClick={()=>setChosen(rt.id)} style={{padding:"14px 16px",border:"1px solid "+(chosen===rt.id?"var(--red)":"var(--line)"),background:chosen===rt.id?"rgba(255,56,56,.06)":"rgba(0,0,0,.20)",cursor:"pointer",transition:"all .15s"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                    <div>
                      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:16,letterSpacing:2.5,color:"var(--red)"}}>{rt.icon} {rt.name}</div>
                      <div style={{fontSize:11,color:"var(--txt-dim)",lineHeight:1.5,marginTop:4}}>{rt.desc}</div>
                    </div>
                    <div style={{textAlign:"right",marginLeft:14,minWidth:90}}>
                      <div style={{fontSize:18,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:2,color:oddsPct>=60?"var(--green)":oddsPct>=40?"var(--amber)":"var(--red)"}}>{oddsPct}%</div>
                      <div style={{fontSize:9,color:"var(--txt-faint)",letterSpacing:.5,fontFamily:"'JetBrains Mono',monospace"}}>est. odds</div>
                    </div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginTop:10,paddingTop:10,borderTop:"1px solid var(--line)",fontSize:10,fontFamily:"'JetBrains Mono',monospace",color:"var(--txt-faint)"}}>
                    <span>Power: <b style={{color:"var(--cyan)"}}>{Math.round(power)}</b></span>
                    <span>Heat: <b style={{color:"var(--red)"}}>+{rt.heatGenerated}</b></span>
                    <span>Resolves: <b style={{color:"var(--amber)"}}>{rt.duration}d</b></span>
                  </div>
                  {chosen===rt.id&&(
                    <div style={{fontSize:10.5,color:"var(--txt-dim)",marginTop:10,paddingTop:10,borderTop:"1px solid var(--line)",lineHeight:1.6}}>
                      <b style={{color:"var(--green)"}}>If you win:</b> {rt.rewards}<br/>
                      <b style={{color:"var(--red)"}}>If you lose:</b> {rt.failPenalty}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          <div style={{display:"flex",gap:10,marginTop:18}}>
            <button className="btn" onClick={onCancel} style={{flex:1,background:"transparent",borderColor:"var(--txt-faint)",color:"var(--txt-faint)"}}>CANCEL</button>
            <button className="btn" disabled={!chosen||submitting} onClick={()=>launch(chosen)} style={{flex:2,borderColor:"var(--red)",color:"var(--red)"}}>{submitting?"LAUNCHING...":"► LAUNCH RAID"}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function IncomingRaidModal({raid,gameState,onDefend,onSurrender}){
  const raidType=RAID_TYPES[raid.type];
  const myDefense=Math.round(raidDefenderPower(gameState,raid.type));
  const reinforcementCost=15000; // pay $15K to reinforce defense by +50%
  const canReinforce=gameState.cash>=reinforcementCost;

  return(
    <div className="ov">
      <div className="modal" style={{maxWidth:560}}>
        <div className="modal-hdr" style={{borderColor:"var(--red)"}}>
          <div>
            <div className="modal-tag" style={{color:"var(--red)",borderColor:"var(--red)",background:"rgba(255,56,56,.10)"}}>🚨 INCOMING RAID</div>
            <div className="modal-title">{raid.attackerHandle.toUpperCase()} IS HITTING YOU</div>
            <div className="modal-sub">Type: {raidType.name} · Zone: {raid.zone} · Resolves in ~1 day</div>
          </div>
        </div>
        <div className="modal-body">
          <div style={{padding:"16px 18px",background:"rgba(255,56,56,.06)",borderLeft:"3px solid var(--red)",fontStyle:"italic",fontFamily:"'Special Elite',monospace",fontSize:13,lineHeight:1.7,color:"var(--red)",marginBottom:18}}>
            {raid.attackerHandle} just launched a {raidType.name} against your {raid.zone} territory. They've committed crew and resources. You have time to reinforce defense before resolution.
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14,padding:"12px 14px",background:"rgba(0,0,0,.25)",border:"1px solid var(--line)"}}>
            <div>
              <div style={{fontSize:9,color:"var(--txt-faint)",letterSpacing:1,fontFamily:"'JetBrains Mono',monospace",marginBottom:2}}>THEIR ATTACK</div>
              <div style={{fontSize:18,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:2,color:"var(--red)"}}>{raid.attackerPower}</div>
            </div>
            <div>
              <div style={{fontSize:9,color:"var(--txt-faint)",letterSpacing:1,fontFamily:"'JetBrains Mono',monospace",marginBottom:2}}>YOUR DEFENSE</div>
              <div style={{fontSize:18,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:2,color:"var(--green)"}}>{myDefense+(raid.defenderReinforcement||0)}</div>
            </div>
          </div>
          <button className="btn" disabled={!canReinforce} onClick={()=>onDefend(reinforcementCost,Math.round(myDefense*0.5))} style={{width:"100%",marginBottom:8,padding:12,borderColor:"var(--green)",color:"var(--green)"}}>{canReinforce?`💪 REINFORCE DEFENSE · $${fmt(reinforcementCost)} · +${Math.round(myDefense*0.5)} power`:"NO CASH FOR REINFORCEMENT"}</button>
          <button className="btn" onClick={onSurrender} style={{width:"100%",padding:10,background:"transparent",borderColor:"var(--txt-faint)",color:"var(--txt-faint)"}}>ACCEPT RAID · LET IT RESOLVE</button>
        </div>
      </div>
    </div>
  );
}

function MultiplayerLobby({onJoinedLobby,onSkip}){
  const [mode,setMode]=useState("menu"); // menu | create | join | connecting
  const [handle,setHandle]=useState("");
  const [joinCode,setJoinCode]=useState("");
  const [error,setError]=useState("");
  const configReady=mpConfigured();

  if(!configReady){
    return(
      <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
        <div style={{maxWidth:520,padding:32,border:"1px solid var(--line)",background:"rgba(0,0,0,.4)"}}>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,letterSpacing:4,color:"var(--amber)",marginBottom:8}}>⚠ MULTIPLAYER NOT CONFIGURED</div>
          <p style={{fontSize:13,color:"var(--txt-dim)",lineHeight:1.7,marginBottom:14}}>To enable multiplayer, paste your Firebase config into the <code style={{color:"var(--cyan)",background:"rgba(0,0,0,.4)",padding:"2px 6px"}}>FIREBASE_CONFIG</code> object near the top of this file.</p>
          <p style={{fontSize:12,color:"var(--txt-faint)",lineHeight:1.6,marginBottom:18}}>Setup steps:<br/>1. Go to console.firebase.google.com<br/>2. Create a project (skip Analytics)<br/>3. Add a Web App (the &lt;/&gt; icon)<br/>4. Copy the firebaseConfig object<br/>5. Paste it into this file, replacing the placeholder<br/>6. Enable Firestore Database in test mode<br/>7. Refresh this page</p>
          <button className="btn" onClick={onSkip} style={{width:"100%"}}>► PLAY SOLO INSTEAD</button>
        </div>
      </div>
    );
  }

  const submitCreate=async()=>{
    if(!handle||handle.length<2){setError("Handle must be at least 2 characters");return}
    setMode("connecting");setError("");
    const code=await mpCreateLobby(handle.trim());
    if(!code){setError("Failed to create lobby. Check Firebase config + Firestore permissions.");setMode("create");return}
    mpSaveSession();
    onJoinedLobby({lobbyCode:code,handle:handle.trim(),isHost:true});
  };

  const submitJoin=async()=>{
    if(!handle||handle.length<2){setError("Handle must be at least 2 characters");return}
    if(!joinCode||joinCode.length!==6){setError("Lobby code must be 6 characters");return}
    setMode("connecting");setError("");
    const result=await mpJoinLobby(joinCode.toUpperCase().trim(),handle.trim());
    if(!result.ok){setError(result.error||"Failed to join");setMode("join");return}
    mpSaveSession();
    onJoinedLobby({lobbyCode:joinCode.toUpperCase().trim(),handle:handle.trim(),isHost:false});
  };

  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{maxWidth:480,width:"100%",padding:32,border:"1px solid var(--cyan-dim)",background:"rgba(0,0,0,.5)"}}>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:34,letterSpacing:5,color:"var(--green)",marginBottom:4}}>STREET KING</div>
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,letterSpacing:2,color:"var(--cyan)",marginBottom:24}}>► CREW MODE · MULTIPLAYER</div>

        {mode==="menu"&&(
          <>
            <p style={{fontSize:13,color:"var(--txt-dim)",lineHeight:1.7,marginBottom:20}}>Take territory, raid your friends, climb the leaderboard. Up to 10 players per lobby. Share a lobby code to play together.</p>
            <button className="btn" onClick={()=>setMode("create")} style={{width:"100%",marginBottom:10,padding:14}}>► CREATE LOBBY (host)</button>
            <button className="btn" onClick={()=>setMode("join")} style={{width:"100%",marginBottom:10,padding:14,background:"transparent",borderColor:"var(--cyan)",color:"var(--cyan)"}}>► JOIN A FRIEND'S LOBBY</button>
            <button className="btn" onClick={onSkip} style={{width:"100%",padding:14,background:"transparent",borderColor:"var(--txt-faint)",color:"var(--txt-faint)"}}>► PLAY SOLO (no multiplayer)</button>
          </>
        )}

        {mode==="create"&&(
          <>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:3,color:"var(--green)",marginBottom:14}}>HOST A LOBBY</div>
            <p style={{fontSize:12,color:"var(--txt-dim)",lineHeight:1.6,marginBottom:14}}>Pick a handle. We'll generate a 6-character lobby code you can share with up to 9 friends.</p>
            <input value={handle} onChange={e=>setHandle(e.target.value.slice(0,16))} placeholder="Your handle (e.g. Dash)" style={{width:"100%",padding:12,background:"transparent",border:"1px solid var(--line)",color:"var(--txt)",fontFamily:"'JetBrains Mono',monospace",fontSize:14,marginBottom:14}}/>
            {error&&<div style={{fontSize:11,color:"var(--red)",marginBottom:12}}>{error}</div>}
            <button className="btn" onClick={submitCreate} style={{width:"100%",padding:12,marginBottom:8}}>► CREATE LOBBY</button>
            <button onClick={()=>{setMode("menu");setError("")}} style={{width:"100%",padding:8,background:"transparent",border:"none",color:"var(--txt-faint)",fontSize:11,cursor:"pointer"}}>← Back</button>
          </>
        )}

        {mode==="join"&&(
          <>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:3,color:"var(--cyan)",marginBottom:14}}>JOIN A LOBBY</div>
            <p style={{fontSize:12,color:"var(--txt-dim)",lineHeight:1.6,marginBottom:14}}>Get the 6-character lobby code from your friend and pick your handle.</p>
            <input value={handle} onChange={e=>setHandle(e.target.value.slice(0,16))} placeholder="Your handle" style={{width:"100%",padding:12,background:"transparent",border:"1px solid var(--line)",color:"var(--txt)",fontFamily:"'JetBrains Mono',monospace",fontSize:14,marginBottom:10}}/>
            <input value={joinCode} onChange={e=>setJoinCode(e.target.value.toUpperCase().slice(0,6))} placeholder="LOBBY CODE" maxLength="6" style={{width:"100%",padding:12,background:"transparent",border:"1px solid var(--line)",color:"var(--cyan)",fontFamily:"'JetBrains Mono',monospace",fontSize:18,letterSpacing:6,marginBottom:14,textAlign:"center"}}/>
            {error&&<div style={{fontSize:11,color:"var(--red)",marginBottom:12}}>{error}</div>}
            <button className="btn" onClick={submitJoin} style={{width:"100%",padding:12,marginBottom:8}}>► JOIN LOBBY</button>
            <button onClick={()=>{setMode("menu");setError("")}} style={{width:"100%",padding:8,background:"transparent",border:"none",color:"var(--txt-faint)",fontSize:11,cursor:"pointer"}}>← Back</button>
          </>
        )}

        {mode==="connecting"&&(
          <div style={{textAlign:"center",padding:"24px 0"}}>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,letterSpacing:3,color:"var(--cyan)",marginBottom:8}}>CONNECTING...</div>
            <div style={{fontSize:11,color:"var(--txt-faint)"}}>Establishing crew link via Firestore</div>
          </div>
        )}
      </div>
    </div>
  );
}

function App(){
  // MP session restoration — check for existing lobby session
  const [mpSession,setMpSession]=useState(()=>{
    if(mpConfigured()){
      const saved=mpLoadSession();
      if(saved){
        // Reconnect to existing lobby
        mpInit();
        MP.lobbyCode=saved.lobbyCode;
        MP.playerId=saved.playerId;
        MP.playerHandle=saved.playerHandle;
        return saved;
      }
    }
    return null;
  });
  const [mpDeclined,setMpDeclined]=useState(false);

  const [initData,setInitData]=useState(()=>{
    const s=loadSave();
    if(s&&s.alias&&s.cityKey)return{alias:s.alias,cityKey:s.cityKey,zoneId:Object.keys(s.zones||{})[0],crew:s.crew?.[0],transport:s.transport,supply:s.supply};
    return null;
  });
  const reset=()=>{
    try{localStorage.removeItem(SAVE_KEY)}catch(e){}
    setInitData(null);
  };
  const leaveMp=()=>{
    mpLeave();
    mpClearSession();
    setMpSession(null);
    setMpDeclined(true);
  };

  // Show multiplayer lobby first if Firebase is configured AND no session exists AND user hasn't declined
  if(mpConfigured()&&!mpSession&&!mpDeclined){
    return<MultiplayerLobby onJoinedLobby={(s)=>setMpSession(s)} onSkip={()=>setMpDeclined(true)}/>;
  }

  if(!initData)return<Intro onComplete={(d)=>setInitData(d)} mpSession={mpSession}/>;
  return<Game initData={initData} onReset={reset} mpSession={mpSession} onLeaveMp={leaveMp}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
