function DealNegotiationModal({deal,marketValue,maxAvail,relationship,onConfirm,onWalk}){
  const {npc,side,initialPctOffset}=deal;
  const [qty,setQty]=useState(Math.min(deal.qty,maxAvail||999));
  const [pctOffset,setPctOffset]=useState(initialPctOffset||0);
  // NPC archetype determines their target price + walk threshold
  const archetype=npc.archetype||"wildcard";
  let npcTargetOffset,npcWalkOffset;
  if(side==="we_sell"){
    // Buyer (NPC) wants LOW. Walks if WE want too HIGH.
    if(archetype==="client"){npcTargetOffset=-0.05;npcWalkOffset=0.12}
    else if(archetype==="rival"){npcTargetOffset=-0.10;npcWalkOffset=0.0}
    else if(archetype==="supplier"){npcTargetOffset=-0.10;npcWalkOffset=0.05}
    else{npcTargetOffset=-0.08;npcWalkOffset=0.08}
  }else{
    // Seller (NPC) wants HIGH. Walks if WE want too LOW.
    if(archetype==="supplier"){npcTargetOffset=0.10;npcWalkOffset=-0.05}
    else if(archetype==="rival"){npcTargetOffset=0.20;npcWalkOffset=0.05}
    else{npcTargetOffset=0.05;npcWalkOffset=-0.05}
  }
  // Relationship boost: warm contacts give you ±2% leeway per rel point
  const relAdj=relationship*0.02;
  if(side==="we_sell")npcWalkOffset+=relAdj;else npcWalkOffset-=relAdj;
  const pricePerUnit=Math.max(1,Math.round(marketValue*(1+pctOffset)));
  const total=pricePerUnit*qty;
  const offsetLabel=Math.abs(pctOffset)<0.005?"at market":`${pctOffset>0?"+":""}${(pctOffset*100).toFixed(1)}% vs market`;
  // NPC reaction
  let reaction,reactionTone,dealOK;
  if(side==="we_sell"){
    const margin=pctOffset-npcTargetOffset;
    if(pctOffset<=npcTargetOffset){reaction=`"That's a fair number. Done."`;reactionTone="ok";dealOK=true}
    else if(pctOffset<=npcTargetOffset+0.04){reaction=`"Decent terms. We have a deal."`;reactionTone="ok";dealOK=true}
    else if(pctOffset<=npcWalkOffset){reaction=`"Tight, but I'll take it. This time."`;reactionTone="warn";dealOK=true}
    else if(pctOffset<=npcWalkOffset+0.05){reaction=`"You're pushing it. Drop the price or this falls apart."`;reactionTone="bad";dealOK=false}
    else{reaction=`"Get out of here. Find another buyer."`;reactionTone="bad";dealOK=false}
  }else{
    const margin=npcTargetOffset-pctOffset;
    if(pctOffset>=npcTargetOffset){reaction=`"That's a fair number. Done."`;reactionTone="ok";dealOK=true}
    else if(pctOffset>=npcTargetOffset-0.04){reaction=`"Tight, but okay. We move."`;reactionTone="ok";dealOK=true}
    else if(pctOffset>=npcWalkOffset){reaction=`"Margins are razor thin. Last time at this price."`;reactionTone="warn";dealOK=true}
    else{reaction=`"You're insulting me. I have other buyers."`;reactionTone="bad";dealOK=false}
  }
  const adjQty=(d)=>setQty(q=>Math.max(1,Math.min(maxAvail,q+d)));
  const adjPct=(d)=>setPctOffset(p=>p+d);
  return(
    <div className="ov" onClick={onWalk}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-hdr">
          <div>
            <div className={"modal-tag "+(side==="we_sell"?"good":"warn")}>{side==="we_sell"?"DEAL · YOU SELL":"DEAL · YOU BUY"}</div>
            <div className="modal-title">{npc.icon} {npc.name}</div>
            <div className="modal-sub">{npc.role} · Rel {relationship}/10 · negotiate price + quantity</div>
          </div>
          <button className="modal-x" onClick={onWalk}>×</button>
        </div>
        <div className="modal-body">
          <div className="deal-market"><span>MARKET VALUE</span><b>${marketValue}/unit</b></div>
          <div className="deal-control">
            <div className="deal-control-label">QUANTITY <span style={{color:"var(--txt-faint)",fontWeight:400}}>(max {maxAvail})</span></div>
            <div className="deal-control-row">
              <button className="deal-btn" onClick={()=>adjQty(-10)} disabled={qty<=1}>− 10</button>
              <button className="deal-btn" onClick={()=>adjQty(-1)} disabled={qty<=1}>− 1</button>
              <span className="deal-value">{qty}<small> units</small></span>
              <button className="deal-btn" onClick={()=>adjQty(1)} disabled={qty>=maxAvail}>+ 1</button>
              <button className="deal-btn" onClick={()=>adjQty(10)} disabled={qty>=maxAvail}>+ 10</button>
            </div>
          </div>
          <div className="deal-control">
            <div className="deal-control-label">PRICE PER UNIT</div>
            <div className="deal-control-row">
              <button className="deal-btn" onClick={()=>adjPct(-0.05)}>− 5%</button>
              <button className="deal-btn" onClick={()=>adjPct(-0.01)}>− 1%</button>
              <span className="deal-value">${pricePerUnit}<small style={{color:Math.abs(pctOffset)<0.005?"var(--txt-faint)":pctOffset>0?"var(--green)":"var(--red)"}}> · {offsetLabel}</small></span>
              <button className="deal-btn" onClick={()=>adjPct(0.01)}>+ 1%</button>
              <button className="deal-btn" onClick={()=>adjPct(0.05)}>+ 5%</button>
            </div>
          </div>
          <div className="deal-total">TOTAL · <b>${fmt(total)}</b></div>
          <div className={"deal-reaction "+reactionTone}>
            <div className="deal-reaction-name">{npc.name.split(" ")[0].toUpperCase()}:</div>
            {reaction}
          </div>
          <div className="deal-actions">
            <button className="btn btn-back btn-sm" onClick={onWalk}>✕ WALK AWAY</button>
            <button className="btn btn-sm" disabled={!dealOK} onClick={()=>onConfirm({qty,pricePerUnit,total,offsetLabel})} style={{background:dealOK?"rgba(0,255,107,.12)":"rgba(255,255,255,.03)",borderColor:dealOK?"var(--green)":"var(--line)",color:dealOK?"var(--green)":"var(--txt-faint)"}}>✓ CLOSE DEAL · ${fmt(total)}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

        <div className="kpi"><div className="kpi-l">Strategy Slots</div><div className="kpi-v" style={{color:slotsUsed>=strategySlots?"var(--red)":"var(--green)"}}>{slotsUsed}/{strategySlots}</div><div className="kpi-d">in flight · hire to expand</div></div>
        <div className="kpi"><div className="kpi-l">Available</div><div className="kpi-v" style={{color:"var(--cyan)"}}>{STRATEGIES.filter(s=>!s.unlockedBy||hiredIds.includes(s.unlockedBy)).length}</div><div className="kpi-d">/ {STRATEGIES.length} unlocked</div></div>

      </div>

      {/* Active strategies — IN FLIGHT (prep cycle) */}

        <div className="panel">
          <div className="panel-title">► IN FLIGHT · PREP CYCLE</div>
          <div className="strategy-grid">
            {g.activeStrategies.map(as=>{
              const strat=STRATEGIES.find(s=>s.id===as.stratId);

              const exec=as.execId==="self"?{name:"YOU"}:CREW_ROSTER.find(c=>c.id===as.execId);

  const [topicId,setTopicId]=useState(null);

    return{...defaults,...(optParams[idx]||{})};

function SupplierNegotiationModal({product,baseCost,marketValue,playerCash,stashRemaining,onConfirm,onCancel}){
  // Player negotiates: pick quantity (5/10/25/50/100/200) AND haggle price (slider).
  // Supplier floor = baseCost × 0.85 (15% discount cap).
  // Supplier ceiling = baseCost × 1.20 (premium for big orders).
  // Larger qty = more leverage to push price DOWN, but also stash heat.
  const [qty,setQty]=useState(25);
  const [offsetPct,setOffsetPct]=useState(0); // 0 = base, negative = discount, positive = paying premium
  const [stage,setStage]=useState("negotiate"); // "negotiate" | "supplier_response"
  const [response,setResponse]=useState(null); // {action: "accept"|"counter"|"walk", text, finalPrice}

  // Quantity tier discounts (volume buyer perks)
  const volumeDiscount=qty>=200?0.18:qty>=100?0.12:qty>=50?0.06:qty>=25?0.02:0;
  // Effective ask = baseCost adjusted by offset and volume
  const finalPricePerUnit=Math.max(1,Math.round(baseCost*(1+offsetPct/100)*(1-volumeDiscount)));
  const total=finalPricePerUnit*qty;
  const profitMargin=Math.round((1-finalPricePerUnit/marketValue)*100);

  // How likely supplier accepts based on offset & qty
  // Pushing them too far below cost = walk. Volume offsets rudeness.
  const aggressionScore=offsetPct*-1+(volumeDiscount*100*0.5); // higher = more aggressive ask
  let acceptChance;
  if(offsetPct>=0)acceptChance=0.95;                                            // paying market or premium
  else if(offsetPct>=-5)acceptChance=0.85;                                      // mild discount
  else if(offsetPct>=-10)acceptChance=0.70-(qty<25?0.20:0);                     // moderate, qty matters
  else if(offsetPct>=-15)acceptChance=0.50-(qty<50?0.25:0);                     // aggressive
  else acceptChance=Math.max(0.10,0.30-(qty<100?0.20:0));                       // hostile
  // Big volume orders boost acceptance
  if(qty>=100)acceptChance+=0.10;
  if(qty>=200)acceptChance+=0.05;
  acceptChance=Math.max(0.05,Math.min(0.98,acceptChance));

  let mood,moodColor,moodText;
  if(acceptChance>=0.80){mood="HAPPY TO DEAL";moodColor="var(--green)";moodText="Supplier is comfortable with this offer."}
  else if(acceptChance>=0.55){mood="HESITANT";moodColor="var(--amber)";moodText="They're considering it. Could go either way."}
  else if(acceptChance>=0.30){mood="OFFENDED";moodColor="var(--red)";moodText="They're insulted. Likely to walk or counter."}
  else{mood="HOSTILE";moodColor="var(--red)";moodText="This offer is dead on arrival."}

  const cantAfford=playerCash<total;
  const overCap=qty>stashRemaining;

  const submitOffer=()=>{
    const r=Math.random();
    if(r<acceptChance){
      setResponse({action:"accept",text:`The supplier nods. "Acceptable. ${qty} units of ${product.name.toLowerCase()} at $${finalPricePerUnit}/u. Total $${fmt(total)}. Cash now."`,finalPrice:finalPricePerUnit,finalQty:qty});
      setStage("supplier_response");
    }else if(offsetPct<-12&&qty<50){
      setResponse({action:"walk",text:`The supplier scoffs. "You're insulting me with that offer at that volume. Get out. Come back when you're serious."`});
      setStage("supplier_response");
    }else{
      // Counter: supplier offers somewhere between your offer and base
      const counterOffset=Math.round(offsetPct/2); // meet in the middle
      const counterPrice=Math.max(1,Math.round(baseCost*(1+counterOffset/100)*(1-volumeDiscount)));
      setResponse({action:"counter",text:`The supplier shakes their head. "I can't move at $${finalPricePerUnit}/u for ${qty} units. Best I'll do is $${counterPrice}/u. Take it or leave it."`,finalPrice:counterPrice,finalQty:qty,counterTotal:counterPrice*qty});
      setStage("supplier_response");
    }
  };

  return(
    <div className="ov" onClick={onCancel}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-hdr">
          <div>
            <div className="modal-tag good">SUPPLIER NEGOTIATION</div>
            <div className="modal-title">{product.icon} {product.name.toUpperCase()}</div>
            <div className="modal-sub">Market value: ${marketValue}/u · Supplier base ask: ${baseCost}/u</div>
          </div>
          <button className="modal-x" onClick={onCancel}>×</button>
        </div>
        <div className="modal-body">
          {stage==="negotiate"&&(
            <>
              <div style={{padding:"14px 16px",background:"rgba(62,200,255,.04)",borderLeft:"3px solid var(--cyan-dim)",fontStyle:"italic",fontFamily:"'Special Elite',monospace",fontSize:13,color:"var(--txt-dim)",lineHeight:1.6,marginBottom:18}}>
                The supplier sets down a sample of {product.name.toLowerCase()}. "Standard rate is ${baseCost}/u for small orders. How much you taking, and what's your offer?"
              </div>

              {/* Quantity selector */}
              <div className="deal-control" style={{marginBottom:14}}>
                <div className="deal-control-label">QUANTITY · VOLUME GETS YOU LEVERAGE</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:6}}>
                  {[5,10,25,50,100,200].map(q=>{
                    const isSelected=qty===q;
                    const tooMuchStash=q>stashRemaining;
                    return(
                      <button key={q} disabled={tooMuchStash} onClick={()=>setQty(q)} style={{padding:"10px 4px",background:isSelected?"rgba(0,255,107,.14)":"transparent",border:"1px solid "+(isSelected?"var(--green)":"var(--line)"),color:isSelected?"var(--green)":tooMuchStash?"var(--txt-faint)":"var(--txt-dim)",fontFamily:"'Bebas Neue',sans-serif",fontSize:14,letterSpacing:1.5,cursor:tooMuchStash?"not-allowed":"pointer",opacity:tooMuchStash?0.4:1}}>{q}u</button>
                    );
                  })}
                </div>
                {qty>=50&&<div style={{fontSize:10.5,color:"var(--green)",letterSpacing:.5,marginTop:6,fontStyle:"italic"}}>Volume bonus: -{Math.round(volumeDiscount*100)}% baseline price</div>}
              </div>

              {/* Price negotiation slider */}
              <div className="deal-control" style={{marginBottom:14}}>
                <div className="deal-control-label">PRICE OFFER · NEGOTIATE FROM BASE</div>
                <div className="deal-control-row">
                  <button className="deal-btn" onClick={()=>setOffsetPct(o=>Math.max(-25,o-5))}>− 5%</button>
                  <button className="deal-btn" onClick={()=>setOffsetPct(o=>Math.max(-25,o-1))}>− 1%</button>
                  <span className="deal-value">{offsetPct>=0?"+":""}{offsetPct}%<small style={{color:offsetPct<-10?"var(--red)":offsetPct<0?"var(--amber)":"var(--green)"}}> · {offsetPct<-10?"AGGRESSIVE":offsetPct<0?"DISCOUNT":offsetPct===0?"BASE":"PREMIUM"}</small></span>
                  <button className="deal-btn" onClick={()=>setOffsetPct(o=>Math.min(20,o+1))}>+ 1%</button>
                  <button className="deal-btn" onClick={()=>setOffsetPct(o=>Math.min(20,o+5))}>+ 5%</button>
                </div>
                <div style={{fontSize:10,color:"var(--txt-faint)",marginTop:6,letterSpacing:.5,fontStyle:"italic"}}>Pushing too far below cost on small orders insults the supplier. Volume orders give you real leverage.</div>
              </div>

              {/* Live calculation */}
              <div style={{padding:14,background:"rgba(0,0,0,.25)",border:"1px solid var(--line)",margin:"14px 0",fontSize:11.5,color:"var(--txt-dim)",letterSpacing:.3,lineHeight:1.7,fontFamily:"'JetBrains Mono',monospace"}}>
                Final ask: <b style={{color:"var(--cyan)"}}>${finalPricePerUnit}/u × {qty}u = ${fmt(total)}</b><br/>
                Margin if sold at MV: <b style={{color:profitMargin>=50?"var(--green)":profitMargin>=25?"var(--amber)":"var(--red)"}}>{profitMargin}%</b> · Profit potential: <b style={{color:"var(--green)"}}>${fmt((marketValue-finalPricePerUnit)*qty)}</b><br/>
                {cantAfford&&<span style={{color:"var(--red)"}}>⚠ Can't afford — short ${fmt(total-playerCash)}<br/></span>}
                {overCap&&<span style={{color:"var(--red)"}}>⚠ Over stash capacity — only {stashRemaining}u space available<br/></span>}
              </div>

              {/* Mood indicator */}
              <div style={{padding:"14px 16px",fontSize:14,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:3,color:moodColor,textAlign:"center",border:"1px solid "+moodColor,marginBottom:16,background:"rgba(0,0,0,.2)"}}>
                {mood} · {Math.round(acceptChance*100)}% CHANCE OF ACCEPTANCE
                <div style={{fontSize:10,marginTop:4,letterSpacing:1,fontFamily:"'JetBrains Mono',monospace",color:"var(--txt-dim)",fontStyle:"italic"}}>{moodText}</div>
              </div>

              <div className="deal-actions">
                <button className="btn btn-back btn-sm" onClick={onCancel}>✕ WALK AWAY</button>
                <button className="btn btn-sm" disabled={cantAfford||overCap} onClick={submitOffer} style={{background:"rgba(0,255,107,.12)",borderColor:"var(--green)",color:"var(--green)"}}>► MAKE OFFER · ${fmt(total)}</button>
              </div>
            </>
          )}
          {stage==="supplier_response"&&response&&(
            <>
              <div style={{padding:"14px 16px",background:response.action==="walk"?"rgba(255,56,56,.05)":response.action==="counter"?"rgba(255,184,0,.05)":"rgba(0,255,107,.05)",borderLeft:"3px solid "+(response.action==="walk"?"var(--red)":response.action==="counter"?"var(--amber)":"var(--green)"),fontStyle:"italic",fontFamily:"'Special Elite',monospace",fontSize:13.5,lineHeight:1.6,color:response.action==="walk"?"var(--red)":response.action==="counter"?"var(--amber)":"var(--green)",marginBottom:16}}>
                {response.text}
              </div>

              {response.action==="accept"&&(
                <div className="deal-actions">
                  <button className="btn btn-back btn-sm" onClick={()=>setStage("negotiate")}>◄ KEEP NEGOTIATING</button>
                  <button className="btn btn-sm" onClick={()=>onConfirm({qty:response.finalQty,pricePerUnit:response.finalPrice,total:response.finalPrice*response.finalQty,product})} style={{background:"rgba(0,255,107,.12)",borderColor:"var(--green)",color:"var(--green)"}}>✓ CLOSE DEAL · ${fmt(response.finalPrice*response.finalQty)}</button>
                </div>
              )}

              {response.action==="counter"&&(
                <>
                  <div style={{padding:"10px 14px",background:"rgba(255,184,0,.06)",border:"1px solid var(--amber-dim)",fontSize:12,color:"var(--amber)",letterSpacing:.5,fontFamily:"'JetBrains Mono',monospace",marginBottom:14}}>
                    Counter-offer: <b>${response.finalPrice}/u × {response.finalQty}u = ${fmt(response.counterTotal)}</b>
                  </div>
                  <div className="deal-actions">
                    <button className="btn btn-back btn-sm" onClick={()=>setStage("negotiate")}>◄ COUNTER BACK</button>
                    <button className="btn btn-sm" disabled={playerCash<response.counterTotal} onClick={()=>onConfirm({qty:response.finalQty,pricePerUnit:response.finalPrice,total:response.counterTotal,product})} style={{background:"rgba(255,184,0,.12)",borderColor:"var(--amber)",color:"var(--amber)"}}>✓ ACCEPT COUNTER · ${fmt(response.counterTotal)}</button>
                  </div>
                </>
              )}

              {response.action==="walk"&&(
                <div className="deal-actions">
                  <button className="btn btn-back btn-sm" onClick={()=>setStage("negotiate")}>◄ TRY DIFFERENT TERMS</button>
                  <button className="btn btn-sm" onClick={onCancel}>✕ END NEGOTIATION</button>
                </div>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

function CopRaidModal({raid,gameState,onResolve}){
  // Single high-stakes roll modified by skills, lawyer, fixer, heat.
  const [stage,setStage]=useState("decide"); // "decide" | "interrogation" | "result"
  const [choice,setChoice]=useState(null); // "run" | "stay"
  const [interrogationChoice,setInterrogationChoice]=useState(null); // index of player's selected response
  const [result,setResult]=useState(null);

  const hasLawyer=gameState.lawyerHired;
  const hasFixer=(gameState.hiredCrew||[]).includes("fixer");
  const hasNegotiator=(gameState.hiredCrew||[]).includes("negotiator");
  const heatPenalty=Math.min(0.30,(gameState.heat||0)/100*0.30); // up to -30%
  const dirtyPenalty=Math.min(0.20,(gameState.dirty||0)/200000*0.20); // dirty cash visible = bad

  // Pre-compute success probability for the STAY interrogation
  const baseSuccess=0.40; // 40% baseline
  const lawyerBonus=hasLawyer?0.30:0;
  const fixerBonus=hasFixer?0.15:0;
  const negotiatorBonus=hasNegotiator?0.10:0;
  let totalSuccess=baseSuccess+lawyerBonus+fixerBonus+negotiatorBonus-heatPenalty-dirtyPenalty;
  totalSuccess=Math.max(0.05,Math.min(0.95,totalSuccess));

  const submitRun=()=>{
    // Lose 55% of progress randomly
    const lostPct=0.55;
    const newCash=Math.round(gameState.cash*(1-lostPct));
    const newDirty=0; // dump it all running
    const newClean=Math.round(gameState.clean*(1-lostPct));
    // Lose ~55% of zones (random)
    const ownedZones=Object.keys(gameState.zones||{});
    const zonesToLose=Math.floor(ownedZones.length*lostPct);
    const lostZones=[];
    const remainingZones={...gameState.zones};
    for(let i=0;i<zonesToLose;i++){
      const pick=ownedZones[Math.floor(Math.random()*ownedZones.length)];
      if(remainingZones[pick]){delete remainingZones[pick];lostZones.push(pick)}
    }
    // Lose ~55% of locked clients (random)
    const lockedIds=Object.keys(gameState.clients||{}).filter(cid=>gameState.clients[cid]?.locked);
    const clientsToLose=Math.floor(lockedIds.length*lostPct);
    const lostClients=[];
    const remainingClients={...gameState.clients};
    for(let i=0;i<clientsToLose;i++){
      const pick=lockedIds[Math.floor(Math.random()*lockedIds.length)];
      if(remainingClients[pick]?.locked){remainingClients[pick]={...remainingClients[pick],locked:false,unlockedDay:gameState.day};lostClients.push(pick)}
    }
    setResult({
      action:"run",
      success:true,
      narrative:`You run. Out the back, through the alley, into a black cab before the warrant team breaches the front door. They sweep the safehouse for evidence — find dirty cash, ledgers, half a stash. You lose ${zonesToLose} zones, ${clientsToLose} clients, and 55% of your money. But you're free. Heat drops to 60. You have time to rebuild.`,
      changes:{
        cash:newCash,dirty:newDirty,clean:newClean,
        zones:remainingZones,clients:remainingClients,
        heat:60,
        zonePressure:Object.fromEntries(Object.keys(gameState.zonePressure||{}).map(zid=>[zid,30])),
        inventory:0,stash:Object.fromEntries(Object.keys(gameState.stash||{cocaine:0}).map(k=>[k,0])),
        log:[{day:gameState.day,msg:`🏃 RAN FROM RAID. Lost ${zonesToLose} zones, ${clientsToLose} clients, 55% cash. Heat reset to 60. Operation crippled but free.`,cls:"warn"},...(gameState.log||[])].slice(0,80),
        pendingRaid:null,
      },
    });
    setStage("result");
  };

  const submitStay=(playerChoice)=>{
    // Player picks a response; their choice modifies the roll
    const responses=[
      {label:`"I have nothing to hide. You're welcome to look around. I run a legitimate business."`,modifier:hasLawyer?+0.15:-0.05,style:"calm"},
      {label:`"I want my lawyer present before I answer any questions."`,modifier:hasLawyer?+0.20:-0.10,style:"legal"},
      {label:`"I don't know what you're talking about. There must be some mistake."`,modifier:-0.05,style:"deny"},
      {label:`"You don't have a warrant for this. Show me your warrant or leave."`,modifier:hasLawyer?+0.10:-0.15,style:"defiant"},
    ];
    const pick=responses[playerChoice];
    const finalSuccess=Math.max(0.05,Math.min(0.95,totalSuccess+pick.modifier));
    const roll=Math.random();
    const success=roll<finalSuccess;

    if(success){
      setResult({
        action:"stay_success",
        success:true,
        narrative:`The lead detective searches the property for forty-five minutes. Your bookkeeping is plausible. ${hasLawyer?"Your lawyer pushes back on every question, citing privilege and improper procedure. ":""}${hasFixer?"Your fixer's contacts at the precinct have already softened their approach. ":""}They take photos, demand documents, threaten charges. But they leave empty-handed. You've bought yourself time — but they'll be back, with a warrant next time.`,
        changes:{
          heat:Math.max(0,(gameState.heat||0)-15),
          zonePressure:Object.fromEntries(Object.entries(gameState.zonePressure||{}).map(([k,v])=>[k,Math.max(0,v-25)])),
          log:[{day:gameState.day,msg:`✓ Survived cop raid. Heat -15. Pressure cooled.`,cls:"good"},...(gameState.log||[])].slice(0,80),
          pendingRaid:null,
        },
      });
    }else{
      // ARRESTED — escalating consequences based on heat at time of arrest
      const heatAtArrest=gameState.heat||0;
      const baseSentence=heatAtArrest>=95?20:heatAtArrest>=90?15:heatAtArrest>=85?10:7;
      const sentence=baseSentence+Math.floor(Math.random()*5);
      const releaseDay=gameState.day+sentence;
      // Lose dirty cash, half the stash, all in-flight strategies
      setResult({
        action:"stay_fail",
        success:false,
        narrative:`The detective produces a sealed envelope — surveillance photos, bank records, a confidential informant statement. ${hasLawyer?"Your lawyer fights for an hour but the evidence is stacked. ":""}You're arrested on the spot. Read your rights. Fingerprinted. Booked. Sentence: ${sentence} days remand pending trial. Every day you're inside, your operation bleeds — territories slip, clients drift, crew gets restless. The longer you're away, the worse the rebuild.`,
        sentence,
        changes:{
          arrestState:{day:gameState.day,releaseDay,sentence,zonesAtArrest:Object.keys(gameState.zones||{}).length,clientsAtArrest:Object.keys(gameState.clients||{}).filter(cid=>gameState.clients[cid]?.locked).length},
          heat:75, // resets-ish but high
          dirty:0, // confiscated
          log:[{day:gameState.day,msg:`🚔 ARRESTED. Sentence: ${sentence} days. Operation freezes. Every day you're away costs you.`,cls:"bad"},...(gameState.log||[])].slice(0,80),
          pendingRaid:null,
        },
      });
    }
    setStage("result");
  };

  if(stage==="decide"){
    return(
      <div className="ov">
        <div className="modal" style={{maxWidth:560}}>
          <div className="modal-hdr" style={{borderColor:"var(--red)"}}>
            <div>
              <div className="modal-tag" style={{color:"var(--red)",borderColor:"var(--red)",background:"rgba(255,56,56,.10)"}}>🚨 COP RAID INCOMING</div>
              <div className="modal-title" style={{color:"var(--red)"}}>POLICE AT THE DOOR</div>
              <div className="modal-sub">Pressure: {raid.maxPressure}% · Trigger: {raid.triggerReason}</div>
            </div>
          </div>
          <div className="modal-body">
            <div style={{padding:"16px 18px",background:"rgba(255,56,56,.06)",borderLeft:"3px solid var(--red)",fontStyle:"italic",fontFamily:"'Special Elite',monospace",fontSize:13.5,lineHeight:1.7,color:"var(--red)",marginBottom:18}}>
              Boots in the hallway. Radios crackling. They've been watching — you sold or collected too fast at the wrong heat level. Your fixer texts: "front door breach in 90 seconds. RUN or STAY?"
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
              <div onClick={submitRun} style={{padding:"18px 16px",border:"1px solid var(--amber)",background:"rgba(255,184,0,.05)",cursor:"pointer",transition:"all .2s"}} onMouseOver={e=>{e.currentTarget.style.background="rgba(255,184,0,.12)"}} onMouseOut={e=>{e.currentTarget.style.background="rgba(255,184,0,.05)"}}>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:3,color:"var(--amber)",marginBottom:8}}>🏃 RUN</div>
                <div style={{fontSize:11.5,color:"var(--txt-dim)",lineHeight:1.6}}>Out the back. Lose <b style={{color:"var(--red)"}}>~55% of cash, zones, clients</b> — randomly. Stash dumped. But you're free, heat resets to 60.</div>
              </div>
              <div onClick={()=>{setChoice("stay");setStage("interrogation")}} style={{padding:"18px 16px",border:"1px solid var(--cyan)",background:"rgba(62,200,255,.05)",cursor:"pointer",transition:"all .2s"}} onMouseOver={e=>{e.currentTarget.style.background="rgba(62,200,255,.12)"}} onMouseOut={e=>{e.currentTarget.style.background="rgba(62,200,255,.05)"}}>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:3,color:"var(--cyan)",marginBottom:8}}>🛑 STAY</div>
                <div style={{fontSize:11.5,color:"var(--txt-dim)",lineHeight:1.6}}>Face the interrogation. <b style={{color:hasLawyer?"var(--green)":"var(--red)"}}>{Math.round(totalSuccess*100)}% success.</b> Win = heat drops, pressure cools. <b style={{color:"var(--red)"}}>Lose = arrest</b> with escalating sentence.</div>
              </div>
            </div>

            <div style={{padding:"10px 14px",background:"rgba(0,0,0,.25)",border:"1px solid var(--line)",fontSize:11,color:"var(--txt-dim)",letterSpacing:.3,lineHeight:1.7,fontFamily:"'JetBrains Mono',monospace"}}>
              Your modifiers: {hasLawyer?<span style={{color:"var(--green)"}}>Lawyer +30% · </span>:<span style={{color:"var(--red)"}}>NO LAWYER · </span>}
              {hasFixer?<span style={{color:"var(--green)"}}>Fixer +15% · </span>:""}
              {hasNegotiator?<span style={{color:"var(--green)"}}>Bishop +10% · </span>:""}
              <span style={{color:"var(--red)"}}>Heat -{Math.round(heatPenalty*100)}%</span>
              {dirtyPenalty>0?<span style={{color:"var(--red)"}}> · Dirty cash visible -{Math.round(dirtyPenalty*100)}%</span>:""}
            </div>
          </div>
        </div>
      </div>
    );
  }

  if(stage==="interrogation"){
    const responses=[
      {label:`"I have nothing to hide. You're welcome to look around. I run a legitimate business."`,modifier:hasLawyer?+0.15:-0.05,desc:hasLawyer?"With a lawyer: shows confidence":"Without lawyer: looks suspicious"},
      {label:`"I want my lawyer present before I answer any questions."`,modifier:hasLawyer?+0.20:-0.10,desc:hasLawyer?"Plays to your strength":"You don't have one — they know"},
      {label:`"I don't know what you're talking about. There must be some mistake."`,modifier:-0.05,desc:"Plays dumb. Sometimes works"},
      {label:`"You don't have a warrant for this. Show me your warrant or leave."`,modifier:hasLawyer?+0.10:-0.15,desc:hasLawyer?"Legally defensible":"They DO have a warrant"},
    ];
    return(
      <div className="ov">
        <div className="modal" style={{maxWidth:600}}>
          <div className="modal-hdr" style={{borderColor:"var(--red)"}}>
            <div>
              <div className="modal-tag" style={{color:"var(--red)",borderColor:"var(--red)",background:"rgba(255,56,56,.10)"}}>INTERROGATION · ROLL ON RESPONSE</div>
              <div className="modal-title">FACE THE COPS</div>
            </div>
          </div>
          <div className="modal-body">
            <div style={{padding:"16px 18px",background:"rgba(0,0,0,.30)",borderLeft:"3px solid var(--red)",fontStyle:"italic",fontFamily:"'Special Elite',monospace",fontSize:13.5,lineHeight:1.7,color:"var(--txt-dim)",marginBottom:18}}>
              Three plainclothes detectives. Lead is a woman, mid-50s, eyes that miss nothing. She places a folder on your kitchen table. "We've been watching for six weeks. You know why we're here. Help yourself — talk now, or this gets harder."
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:14}}>
              {responses.map((r,i)=>{
                const finalChance=Math.max(5,Math.min(95,Math.round((totalSuccess+r.modifier)*100)));
                return(
                  <div key={i} onClick={()=>submitStay(i)} style={{padding:"14px 16px",border:"1px solid var(--line)",background:"rgba(0,0,0,.25)",cursor:"pointer",transition:"all .15s"}} onMouseOver={e=>{e.currentTarget.style.borderColor="var(--cyan)";e.currentTarget.style.background="rgba(62,200,255,.06)"}} onMouseOut={e=>{e.currentTarget.style.borderColor="var(--line)";e.currentTarget.style.background="rgba(0,0,0,.25)"}}>
                    <div style={{fontSize:13,color:"var(--txt)",lineHeight:1.5,marginBottom:6,fontStyle:"italic"}}>{r.label}</div>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:10.5,fontFamily:"'JetBrains Mono',monospace",letterSpacing:.5}}>
                      <span style={{color:"var(--txt-faint)"}}>{r.desc}</span>
                      <span style={{color:finalChance>=60?"var(--green)":finalChance>=40?"var(--amber)":"var(--red)",fontWeight:700}}>{finalChance}% SUCCESS</span>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>
    );
  }

  if(stage==="result"&&result){
    return(
      <div className="ov">
        <div className="modal" style={{maxWidth:560}}>
          <div className="modal-hdr" style={{borderColor:result.success?"var(--green)":"var(--red)"}}>
            <div>
              <div className="modal-tag" style={{color:result.success?"var(--green)":"var(--red)",borderColor:result.success?"var(--green)":"var(--red)",background:result.success?"rgba(0,255,107,.10)":"rgba(255,56,56,.10)"}}>{result.action==="run"?"🏃 ESCAPED":result.success?"✓ INTERROGATION SURVIVED":"🚔 ARRESTED"}</div>
              <div className="modal-title">{result.action==="run"?"YOU RAN":result.success?"THEY LEFT":"YOU'RE INSIDE"}</div>
            </div>
          </div>
          <div className="modal-body">
            <div style={{padding:"16px 18px",background:result.success?"rgba(0,255,107,.05)":"rgba(255,56,56,.05)",borderLeft:"3px solid "+(result.success?"var(--green)":"var(--red)"),fontStyle:"italic",fontFamily:"'Special Elite',monospace",fontSize:13.5,lineHeight:1.7,color:"var(--txt-dim)",marginBottom:16}}>
              {result.narrative}
            </div>
            <button className="btn" onClick={()=>onResolve(result.changes)} style={{width:"100%",padding:14,fontSize:13,letterSpacing:3}}>► CONTINUE</button>
          </div>
        </div>
      </div>
    );
  }
  return null;
}

function PoachOfferModal({client,poach,onResolve,onCancel}){
  // Counter-offer: choose new pricePremium (must be lower than current), can also throw in a one-off "loyalty bonus" cash
  const currentPremium=Math.round((client.pricePremium||0)*100);
  const rivalPremium=Math.round((poach.rivalPremium||0)*100);
  // Default: match the rival exactly
  const [newPremium,setNewPremium]=useState(rivalPremium);
  const [loyaltyBonus,setLoyaltyBonus]=useState(0);
  // Computed acceptance: how good is your counter vs the rival?
  // If you match or beat, base acceptance ~85%. Each 1% above rival = -10% acceptance.
  // Loyalty bonus adds +1% acceptance per $500.
  const gapVsRival=newPremium-rivalPremium;
  let acceptChance=0.85-gapVsRival*0.10+(loyaltyBonus/500)*0.01;
  acceptChance=Math.max(0.05,Math.min(0.98,acceptChance));
  const monthlyValueAtNew=Math.round(client.monthlySpend*80*(1+newPremium/100));
  const monthlyValueAtCurrent=Math.round(client.monthlySpend*80*(1+(currentPremium/100)));
  const monthlyLoss=monthlyValueAtCurrent-monthlyValueAtNew;
  let mood,moodColor;
  if(acceptChance>=0.75){mood="LIKELY ACCEPT";moodColor="var(--green)"}
  else if(acceptChance>=0.45){mood="UNCERTAIN";moodColor="var(--amber)"}
  else{mood="LIKELY WALK";moodColor="var(--red)"}
  return(
    <div className="ov" onClick={onCancel}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-hdr">
          <div>
            <div className="modal-tag warn">POACH NEGOTIATION</div>
            <div className="modal-title">{client.icon} {client.name}</div>
            <div className="modal-sub">{poach.rivalName} is offering them −{(poach.rivalDiscountPct*100).toFixed(0)}% pricing</div>
          </div>
          <button className="modal-x" onClick={onCancel}>×</button>
        </div>
        <div className="modal-body">
          <div style={{padding:"14px 16px",background:"rgba(255,184,0,.06)",borderLeft:"3px solid var(--amber-dim)",fontStyle:"italic",fontFamily:"'Special Elite',monospace",fontSize:13,color:"var(--txt-dim)",lineHeight:1.6,marginBottom:18}}>
            "Listen, ${client.name.split(" ")[0]} here. ${poach.rivalName} pinged me, quoting {(poach.rivalDiscountPct*100).toFixed(0)}% under what you charge. I want to stay with you — you've been reliable — but you know I'll take a deal when I see one. What can you do?"
          </div>

          <div className="deal-market"><span>RIVAL OFFER</span><b>{rivalPremium>=0?"+":""}{rivalPremium}% vs market</b></div>
          <div className="deal-market" style={{marginTop:6}}><span>YOUR CURRENT PRICING</span><b>+{currentPremium}% vs market</b></div>

          <div className="deal-control" style={{marginTop:14}}>
            <div className="deal-control-label">YOUR COUNTER-OFFER PRICING</div>
            <div className="deal-control-row">
              <button className="deal-btn" onClick={()=>setNewPremium(p=>p-5)} disabled={newPremium<=-20}>− 5%</button>
              <button className="deal-btn" onClick={()=>setNewPremium(p=>p-1)} disabled={newPremium<=-20}>− 1%</button>
              <span className="deal-value">{newPremium>=0?"+":""}{newPremium}%<small style={{color:newPremium<currentPremium?"var(--red)":"var(--green)"}}> · {newPremium<rivalPremium?"BEATS RIVAL":newPremium===rivalPremium?"MATCHES":"ABOVE"}</small></span>
              <button className="deal-btn" onClick={()=>setNewPremium(p=>p+1)} disabled={newPremium>=currentPremium}>+ 1%</button>
              <button className="deal-btn" onClick={()=>setNewPremium(p=>Math.min(currentPremium,p+5))} disabled={newPremium>=currentPremium}>+ 5%</button>
            </div>
          </div>

          <div className="deal-control" style={{marginTop:14}}>
            <div className="deal-control-label">ONE-OFF LOYALTY BONUS</div>
            <div className="deal-control-row">
              <button className="deal-btn" onClick={()=>setLoyaltyBonus(p=>Math.max(0,p-1000))} disabled={loyaltyBonus<=0}>− $1K</button>
              <button className="deal-btn" onClick={()=>setLoyaltyBonus(0)}>NONE</button>
              <span className="deal-value">${fmt(loyaltyBonus)}</span>
              <button className="deal-btn" onClick={()=>setLoyaltyBonus(p=>p+1000)}>+ $1K</button>
              <button className="deal-btn" onClick={()=>setLoyaltyBonus(p=>p+5000)}>+ $5K</button>
            </div>
          </div>

          <div style={{padding:14,background:"rgba(0,0,0,.25)",border:"1px solid var(--line)",margin:"14px 0",fontSize:11.5,color:"var(--txt-dim)",letterSpacing:.3,lineHeight:1.6,fontFamily:"'JetBrains Mono',monospace"}}>
            New monthly recurring: <b style={{color:"var(--amber)"}}>${fmt(monthlyValueAtNew)}</b> (was ${fmt(monthlyValueAtCurrent)})<br/>
            Loss vs current: <b style={{color:monthlyLoss>0?"var(--red)":"var(--txt-dim)"}}>${fmt(monthlyLoss)}/mo</b><br/>
            One-off cost: <b style={{color:"var(--red)"}}>${fmt(loyaltyBonus)}</b>
          </div>

          <div style={{padding:"14px 16px",fontSize:14,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:3,color:moodColor,textAlign:"center",border:"1px solid "+moodColor,marginBottom:16,background:"rgba(0,0,0,.2)"}}>
            {mood} · {Math.round(acceptChance*100)}% CHANCE OF KEEPING THEM
          </div>

          <div className="deal-actions">
            <button className="btn btn-back btn-sm" onClick={()=>onResolve("walk_away",{newPremium,loyaltyBonus,acceptChance})}>✕ LET THEM WALK</button>
            <button className="btn btn-sm" onClick={()=>onResolve("counter",{newPremium,loyaltyBonus,acceptChance})} style={{background:"rgba(0,255,107,.12)",borderColor:"var(--green)",color:"var(--green)"}}>► MAKE COUNTER-OFFER</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function ClientDossier({client,clientState,alias,onClose,onContact,onTalk,onPoachOpen,pendingPoach,unlockInfo}){
  const cs=clientState||{};
  const locked=!!cs.locked;
  const lockedDay=cs.lockedDay;
  const currentDay=cs.currentDay||0;
  const daysRunning=lockedDay?Math.max(0,currentDay-lockedDay):0;
  const lb=client.lockBenefits||{};
  const monthlyTotal=(lb.cashMonthly||0)+Math.round(client.monthlySpend*(80*(1+client.pricePremium))); // approximation
  // Territorial intel — is this client locked behind sales threshold?
  const needsMoreUnits=unlockInfo&&!unlockInfo.contactable&&unlockInfo.unitsToGo>0;
  return(
    <div className="ov" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-hdr">
          <div>
            <div className={"modal-tag "+(locked?"good":"neutral")}>{locked?"✓ LOCKED CLIENT · YOURS":"PROSPECTIVE CLIENT"}</div>
            <div className="modal-title">{client.icon} {client.name}</div>
            <div className="modal-sub">{client.profession} · {client.area}</div>
          </div>

            <div style={{background:"linear-gradient(135deg, rgba(0,255,107,.10), rgba(0,255,107,.04))",border:"1px solid var(--green)",borderLeft:"4px solid var(--green)",padding:"16px 18px",marginBottom:18}}>

                {lb.cleanMonthly>0&&<div><div style={{fontSize:8.5,color:"var(--txt-faint)",letterSpacing:1.5,marginBottom:2}}>CLEAN BOOST</div><div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:14,color:"var(--cyan)"}}>+${fmt(lb.cleanMonthly)}/mo</div></div>}

            </div>

          <div className="dossier-section">

          </div>
          <div className="client-stats" style={{marginTop:14}}>
            <div className="smart">SMART<b>{client.smart}/10</b></div>
            <div className="danger">DANGER<b>{client.danger}/10</b></div>
            <div>SPEND<b>{client.monthlySpend}u/mo</b></div>

          <div className="dossier-section" style={{marginTop:14}}>
            <div className="dossier-section-hdr"><span className="dossier-section-icon">📍</span><span className="dossier-section-title">WHERE TO FIND THEM</span></div>

          </div>
          {/* SUPPLIER section — different content based on lock state */}
          <div className="dossier-section" style={{marginTop:14}}>
            <div className="dossier-section-hdr"><span className="dossier-section-icon">🍷</span><span className="dossier-section-title">{locked?"WHAT THEY BUY FROM YOU":"CURRENT SUPPLIER"}</span></div>
            <p style={{fontSize:12,color:"var(--txt-dim)",lineHeight:1.6,paddingLeft:16}}>
              {locked?(
                <><b style={{color:"var(--cyan)"}}>{client.preferred}</b><br/><span style={{color:"var(--txt-faint)",fontSize:10.5,fontStyle:"italic"}}>Switched from: {client.currentSupplier}</span></>

          </div>
          <div className="dossier-section" style={{marginTop:14}}>
            <div className="dossier-section-hdr"><span className="dossier-section-icon">🧠</span><span className="dossier-section-title">PERSONALITY</span></div>
            <div className="client-traits">{client.personality.map((p,i)=>(<span key={i} className="client-trait">{p}</span>))}</div>
          </div>
          <div className="client-danger-warn"><b>DANGER ASSESSMENT</b><br/>{client.dangerNote}</div>
          {locked?(
            <div className="client-benefit"><b>✓ ACTIVE BENEFITS</b><br/>{client.lockBenefit}</div>
          ):(
            <div className="client-benefit"><b>IF LOCKED</b><br/>{client.lockBenefit}</div>
          )}
          {locked?(
            <>
              {pendingPoach&&pendingPoach.clientId===client.id&&(
                <div style={{marginTop:14,padding:"14px 16px",background:"rgba(255,184,0,.10)",borderLeft:"3px solid var(--amber)",borderTop:"1px solid var(--amber)",borderRight:"1px solid var(--amber)",borderBottom:"1px solid var(--amber)"}}>
                  <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:13,letterSpacing:2,color:"var(--amber)",marginBottom:6}}>⚠ POACH ATTEMPT IN PROGRESS</div>
                  <div style={{fontSize:11.5,color:"var(--txt-dim)",lineHeight:1.6,fontStyle:"italic",marginBottom:10}}>{pendingPoach.rivalName} approached {client.name.split(" ")[0]} with a {(pendingPoach.rivalDiscountPct*100).toFixed(0)}% discount offer. They want to stay with you — but they expect a counter.</div>
                  <button className="btn" onClick={()=>onPoachOpen(client,pendingPoach)} style={{width:"100%",padding:12,fontSize:13,letterSpacing:2.5,background:"rgba(255,184,0,.20)",borderColor:"var(--amber)",color:"var(--amber)"}}>► NEGOTIATE COUNTER-OFFER</button>
                </div>
              )}
              <div style={{marginTop:14,padding:"12px 16px",background:"rgba(0,255,107,.05)",borderLeft:"2px solid var(--green)",color:"var(--green)",fontSize:12,letterSpacing:1}}>✓ Recurring revenue active. Stash drains {client.monthlySpend}u/mo for this client.</div>
              <button className="btn" onClick={()=>onTalk(client)} style={{width:"100%",padding:14,fontSize:13,letterSpacing:3,marginTop:14,background:"rgba(0,255,107,.10)",borderColor:"var(--green)",color:"var(--green)"}}>► TALK TO {client.name.split(" ")[0].toUpperCase()}</button>
            </>
          ):needsMoreUnits?(
            <div style={{marginTop:18}}>
              <div style={{padding:"16px 18px",background:"linear-gradient(135deg, rgba(62,200,255,.06), rgba(62,200,255,.02))",border:"1px solid var(--cyan-dim)",borderLeft:"3px solid var(--cyan)",marginBottom:12}}>
                <div style={{fontSize:9.5,color:"var(--cyan)",letterSpacing:2.5,marginBottom:8,fontWeight:700}}>► CONTACT LOCKED · BUILD REPUTATION FIRST</div>
                <div style={{fontSize:12.5,color:"var(--txt-dim)",lineHeight:1.6,marginBottom:14}}>
                  {client.name.split(" ")[0]} won't take a meeting yet. {unlockInfo.tierIndex===0?"They're a known operator — but you haven't proven yourself in their area.":unlockInfo.tierIndex===1?"They've heard whispers about you. Not enough to risk a meeting.":unlockInfo.tierIndex===2?"They're particular. Reputation in the area is the only thing that gets their attention.":"They're the apex client — they only take meetings with operators who own the streets. Earn it."}
                </div>
                {/* Sales progress */}
                <div style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:9.5,color:"var(--txt-faint)",letterSpacing:1.2,marginBottom:4,fontFamily:"'JetBrains Mono',monospace"}}>
                    <span>UNITS SOLD IN {unlockInfo.zoneName.toUpperCase()}</span><span>{unlockInfo.currentSales} / {unlockInfo.threshold}u</span>
                  </div>
                  <div style={{height:7,background:"rgba(255,255,255,.04)",overflow:"hidden"}}>
                    <div style={{height:"100%",width:Math.min(100,(unlockInfo.currentSales/unlockInfo.threshold)*100)+"%",background:"var(--cyan)",transition:"width .4s"}}></div>
                  </div>
                </div>
                <div style={{fontSize:11,color:"var(--cyan)",letterSpacing:.5,fontFamily:"'JetBrains Mono',monospace",fontWeight:700}}>
                  → Sell {unlockInfo.unitsToGo} more units in {unlockInfo.zoneName} to unlock contact.
                </div>
                <div style={{fontSize:10,color:"var(--txt-faint)",letterSpacing:.4,marginTop:8,fontStyle:"italic",lineHeight:1.5,paddingTop:8,borderTop:"1px dashed var(--line)"}}>
                  Tip: Move stash through {unlockInfo.zoneName} via crew sells. Bigger orders + better runners build reputation faster. Once unlocked, you can REQUEST MEETING and pitch them.
                </div>
              </div>
              {cs.attempts>0&&(<div style={{fontSize:10,color:"var(--txt-faint)",textAlign:"center",marginTop:8,letterSpacing:1}}>{cs.attempts} previous attempt{cs.attempts===1?"":"s"} · Last mood: {cs.lastMood||"—"}</div>)}
            </div>
          ):(
            <div style={{marginTop:18}}>
              <button className="btn" onClick={()=>onContact(client)} style={{width:"100%",padding:14,fontSize:13,letterSpacing:3}}>► CONTACT · REQUEST MEETING</button>
              {cs.attempts>0&&(<div style={{fontSize:10,color:"var(--txt-faint)",textAlign:"center",marginTop:8,letterSpacing:1}}>{cs.attempts} previous attempt{cs.attempts===1?"":"s"} · Last mood: {cs.lastMood||"—"}</div>)}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// Procedural conversation generator — builds a 3-step pitch tree from client data
// Used as fallback when a client has no hand-written `conv` array
// PROFESSION ARCHETYPES — drives conversation flavor for all 32 territorial clients
// Each archetype has: setting, openerHook, pitches, [probe, counter,] closeQ, [finalAsk]
// Probe/counter/finalAsk default to generic versions if not specified — see SHARED_BEATS below.
const SHARED_BEATS={
  // STEP 2 — They probe a specific concern after your opener
  probePrompt:`{first} leans forward. "Before I hear specifics — answer one thing. Where did you operate before this? Who taught you? Names, dates."`,
  probeOptions:[
    {label:`"I came up running corners in two zones. Learned operations from a man who's now inside. I won't name him."`,m:5,reply:`"Loyalty to a man inside. That's the only currency I trust here. Continue."`},
    {label:`"I built this myself. No mentor, no inheritance. Every lesson cost me."`,m:3,reply:`"Self-made. Either resilient or reckless. Time will tell which."`},
    {label:`"I'd rather not say. The less you know about my history, the safer we both are."`,m:4,reply:`"Smart answer. Most operators overshare. You don't."`},
    {label:`"I worked under a name you'd recognize. He vouched for me before he retired."`,m:6,reply:`"A name I'd recognize? Then you'll write it down — in confidence — before we close."`},
  ],
  // STEP 4 — They raise an objection mid-pitch
  counterPrompt:`{first} raises a hand. "All of this sounds rehearsed. Let me ask the harder question. What happens when there's a problem? When product doesn't arrive, or police kick a door, or one of YOUR people becomes a witness?"`,
  counterOptions:[
    {label:`"Then you walk. No questions, no consequences from my side. Reputation matters more than this contract."`,m:5,reply:`"Optionality. The right answer. Most operators trap their clients. Continue."`},
    {label:`"My fixer handles it. If a witness appears, they retract. If a door's kicked, the trail dies before it reaches you."`,m:6,reply:`"Operational maturity. Rare in this trade. I want to meet your fixer eventually."`,requires:"fixer"},
    {label:`"I take the loss. Refund. Replace product. Cover any heat that touches you. My problem, not yours."`,m:5,reply:`"You'd absorb the cost? That's the answer of someone playing long-term."`},
    {label:`"It won't happen. I've never had a problem reach a client."`,m:-3,reply:`"Everyone's had problems reach a client eventually. Saying you haven't tells me you're either lying or new. Which is it?"`},
  ],
  // STEP 6 — Final ask — what they want from you SPECIFICALLY
  finalPrompt:`{first} pauses, watching you closely. "Last thing. If we close this — I expect ONE specific thing from you. Tell me what YOU need from ME, beyond the obvious."`,
  finalOptions:[
    {label:`"Nothing beyond your business. Pay on time, take delivery on schedule. That's the relationship."`,m:5,reply:`"Clean transactional. The only kind that lasts. Acceptable."`},
    {label:`"Introductions. As trust grows, I want access to one or two of your peers."`,m:4,reply:`"Introductions cost me. But — once you've earned it, I'll consider."`},
    {label:`"Information. If you hear anything that affects my operation, you tell me first."`,m:6,reply:`"Information-sharing. That's a real partnership. Yes."`},
    {label:`"Loyalty. If a competitor approaches you with a better price, you tell me before you switch."`,m:5,reply:`"First refusal. Reasonable. I'll honor that."`},
  ],
};
