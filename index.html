function Game({initData,onReset,mpSession,onLeaveMp}){
  const region=REGIONS[initData.cityKey];
  const city=CITIES[initData.cityKey];
  const startZone=region.zones.find(z=>z.id===initData.zoneId);
  const crewMember=CREW_OPTIONS.find(c=>c.id===initData.crew);
  const supplyOpt=SUPPLY_OPTIONS.find(s=>s.id===initData.supply);
  const transportOpt=TRANSPORT_OPTIONS.find(t=>t.id===initData.transport);

  // Multiplayer state — populated from Firestore subscription
  const [mpWorld,setMpWorld]=useState(null);
  const [raidTarget,setRaidTarget]=useState(null);  // {player, zone} when launching a raid
  const [incomingRaid,setIncomingRaid]=useState(null);  // {raid} when being raided
  const [acknowledgedRaids,setAcknowledgedRaids]=useState(new Set()); // raids we've already shown a modal for

  // Subscribe to lobby updates
  useEffect(()=>{
    if(!mpSession)return;
    mpSubscribe((world)=>{setMpWorld({...world})});
    return()=>{mpLeave()};
  },[mpSession?.lobbyCode]);

  // RAID DETECTION — when mpWorld updates, check for incoming raids targeting us
  useEffect(()=>{
    if(!mpWorld||!mpSession)return;
    const raids=mpWorld.raids||{};
    // Find pending raids where we're the defender
    const incoming=Object.values(raids).find(r=>
      r.defender===MP.playerId&&
      r.status==="pending"&&
      !acknowledgedRaids.has(r.id)
    );
    if(incoming){
      setIncomingRaid(incoming);
      setAcknowledgedRaids(prev=>new Set([...prev,incoming.id]));
    }
    // RESOLUTION — check if any of our raids (attacker or defender) are due
    const now=Date.now();
    Object.values(raids).forEach(r=>{
      if(r.status!=="pending")return;
      if(r.resolvesAt>now)return;
      // We're involved AND it's time to resolve
      if(r.attacker===MP.playerId||r.defender===MP.playerId){
        // Only the attacker triggers resolution to avoid double-resolves
        if(r.attacker===MP.playerId){
          mpResolveRaid(r).then(result=>{
            if(!result)return;
            const wonAsAttacker=result.winner==="attacker"&&r.attacker===MP.playerId;
            const lostAsAttacker=result.winner==="defender"&&r.attacker===MP.playerId;
            if(wonAsAttacker){
              // Apply gains: take the zone
              setG(p=>({
                ...p,
                zones:{...p.zones,[r.zone]:{takenDay:p.day,takenFrom:r.defender}},
                rep:p.rep+5,
                heat:Math.min(100,p.heat+RAID_TYPES[r.type].heatGenerated),
                log:[{day:p.day,msg:`✓ RAID SUCCESS: Took ${r.zone} from ${mpWorld.players?.[r.defender]?.handle||"opponent"}. Rep +5. Heat +${RAID_TYPES[r.type].heatGenerated}.`,cls:"good"},...p.log].slice(0,80),
              }));
            }else if(lostAsAttacker){
              setG(p=>({
                ...p,
                rep:Math.max(0,p.rep-3),
                heat:Math.min(100,p.heat+RAID_TYPES[r.type].heatGenerated),
                cash:Math.max(0,p.cash-Math.round(p.cash*0.05)),
                log:[{day:p.day,msg:`✗ RAID FAILED: ${mpWorld.players?.[r.defender]?.handle||"target"} repelled your ${RAID_TYPES[r.type].name}. Rep -3. Heat +${RAID_TYPES[r.type].heatGenerated}.`,cls:"bad"},...p.log].slice(0,80),
              }));
            }
          });
        }else if(r.defender===MP.playerId&&result?.winner==="attacker"){
          // We were defender and lost — happens via resolveRaid being called by attacker's client
          // The zoneOwnership in firestore will be updated; we lose the zone locally too
          setG(p=>{
            const newZones={...p.zones};
            delete newZones[r.zone];
            return{...p,zones:newZones,rep:Math.max(0,p.rep-2),log:[{day:p.day,msg:`✗ LOST ${r.zone} to ${r.attackerHandle} in a raid. Rep -2.`,cls:"bad"},...p.log].slice(0,80)};
          });
        }
      }
    });
  },[mpWorld,mpSession,acknowledgedRaids]);

  // ENEMY ZONES — derive from mpWorld.zoneOwnership
  const enemyZones=useMemo(()=>{
    if(!mpWorld||!mpSession)return{};
    const ownership=mpWorld.zoneOwnership?.[initData.cityKey]||{};
    const out={};
    Object.entries(ownership).forEach(([zoneId,playerId])=>{
      if(playerId!==MP.playerId&&mpWorld.players?.[playerId]){
        out[zoneId]={playerId,handle:mpWorld.players[playerId].handle};
      }
    });
    return out;
  },[mpWorld,mpSession,initData.cityKey]);

  const [g,setG]=useState(()=>{
    const saved=loadSave();
    if(saved&&saved.alias===initData.alias&&saved.cityKey===initData.cityKey)return saved;
    return{
      alias:initData.alias,cityKey:initData.cityKey,
      day:1,
      cash:5000,dirty:5000,clean:0,heat:5,rep:10,
      zones:{[startZone.id]:{takenDay:1}},
      contested:{},rivals:{},
      crew:[crewMember.id],
      crewSkills:crewMember.skills,
      hiredCrew:[crewMember.id],
      crewState:{[crewMember.id]:{trust:7,deployedTo:null,deployedSince:null,weeksWorked:0}},
      supply:initData.supply,transport:initData.transport,
      inventory:25, // legacy — total cocaine units (kept for back-compat)
      stash:{cocaine:25,weed:0,mdma:0,shrooms:0,ketamine:0}, // per-drug stash
      inventoryCostBasis:25*Math.round(80*supplyOpt.cost),
      lastRestock:1,
      marketValue:baseMVFor(initData.cityKey), // legacy — cocaine MV
      marketValues:(()=>{
        const baseCity=PRODUCT_MV[initData.cityKey]||80;
        const out={};
        Object.values(PRODUCTS).forEach(p=>{out[p.id]=Math.round(baseCity*p.baseMVMod)});
        return out;
      })(),
      mvHistory:[baseMVFor(initData.cityKey)],
      activeStrategies:[],
      strategyFlags:{},
      clients:{},
      fronts:[],
      frontAllocation:{},                    // { frontId: pct (0-100) of dirty cash to wash through this front per day }
      npcs:{},npcRel:{},
      // Cop / police system
      zonePressure:{[startZone.id]:0},      // per-zone police-attention 0-100
      zoneSales:{[startZone.id]:0},          // running unit count for client unlocks
      laylowUntil:0,                         // game day until forced lay-low ends
      arrestState:null,                      // { day, releaseDay, lostZones, lostClients } when arrested
      arrestHistory:[],                      // record of past arrests
      // ACTIVITY TRACKING — used for cop-raid trigger (high activity + high heat = raid)
      activityLog:{
        sellDays:[],                         // recent days with high stash burn (>=10u sold)
        collectDays:[],                      // recent days locked clients paid (every day they pay)
        lastSellSpike:null,                  // day of last "sold all stash within 3 days" event
        lastCollectSpike:null,               // day of last "collected from all locked within 3 days" event
        lastRaidDay:null,                    // last day a raid was triggered (cooldown)
      },

    // Sell / deal / move product — must consume inventory

        const plain=lower.match(/(?:sell|move|push|deal|unload|distribut)\s+(\d+)(?!\s*%)/);

      // Parse price percentage

      // FILL RATE — what fraction of "want" actually moves

      const isFocusedAndOwned=focusedName&&Object.keys(gs.zones).some(zid=>{const zf=zid;return zf&&focusedName});
      // Approximation: if focused, check if focused id is owned. We don't have zone object here, so use heuristic from gs.zones:

    const recentCollects=al.collectDays.filter(d=>todayDay-d<=3).length;
    const sellSpike=recentSells>=3;
    const collectSpike=recentCollects>=3;
    if(sellSpike)al.lastSellSpike=todayDay;
    if(collectSpike)al.lastCollectSpike=todayDay;
    result.activityLog=al;
    // RAID TRIGGER: max zone pressure ≥85% AND (sell spike OR collect spike) AND no recent raid (14-day cooldown)
    const maxPressure=Math.max(0,...Object.values(newZonePressure));
    const raidCooldown=al.lastRaidDay?(todayDay-al.lastRaidDay):999;
    if(!result.pendingRaid&&!result.arrestState&&maxPressure>=85&&(sellSpike||collectSpike)&&raidCooldown>=14){
      result.pendingRaid={
        day:todayDay,
        triggerReason:sellSpike&&collectSpike?"Volume + collection spike":sellSpike?"Sales velocity spike":"Collection velocity spike",
        maxPressure:Math.round(maxPressure),
        severity:maxPressure>=95?"critical":maxPressure>=90?"high":"moderate",
      };
      al.lastRaidDay=todayDay;
      result.log=[{day:todayDay,msg:`🚨 COP RAID TRIGGERED. Activity spiked while heat was at ${Math.round(maxPressure)}%. They're at the door — RUN or STAY?`,cls:"bad"},...result.log].slice(0,80);
    }

    // ====================================================================
    // ZONE SALES TRACKING — drives client unlocks per area
    // ====================================================================
    const newZoneSales={...(result.zoneSales||{})};
    Object.keys(zoneSalesDelta).forEach(zid=>{
      newZoneSales[zid]=(newZoneSales[zid]||0)+zoneSalesDelta[zid];
    });
    result.zoneSales=newZoneSales;

    // CLIENT UNLOCKS — when sales in a zone cross thresholds, unlock the next territorial client
    const newClientUnlocks={...(result.clientUnlocks||{})};
    let unlockNotices=[];
    Object.keys(newZoneSales).forEach(zid=>{
      const sales=newZoneSales[zid];
      const zClients=getZoneClients(result.cityKey,zid);
      ZONE_UNLOCK_THRESHOLDS.forEach((threshold,idx)=>{
        if(sales>=threshold&&zClients[idx]&&!newClientUnlocks[zClients[idx].id]){
          newClientUnlocks[zClients[idx].id]={day:result.day,zoneId:zid};
          unlockNotices.push({client:zClients[idx],zone:zid,sales,threshold});
        }
      });
    });
    result.clientUnlocks=newClientUnlocks;
    if(unlockNotices.length>0){
      const last=unlockNotices[unlockNotices.length-1];
      const zName=region.zones.find(z=>z.id===last.zone)?.name||last.zone;
      result.log=[{day:result.day,msg:`📞 NEW CLIENT AVAILABLE: ${last.client.name} in ${zName} (${last.sales}u sold).`,cls:"good"},...result.log].slice(0,80);
      setTimeout(()=>setReveal({action:`📞 NEW CLIENT UNLOCKED · ${zName.toUpperCase()}`,summary:`✓ ${last.client.name} now contactable in ${zName}.`,text:`Word travels. Your activity in ${zName} reached ${last.client.name} (${last.client.profession}). They're willing to take a meeting. Find them in the People tab → Client Base.`,outcome:"good",deltas:{rep:2}}),300);
    }

    // ====================================================================
    // PRESSURE WARNINGS + ARREST
    // ====================================================================
    if(!result.arrestState){
      // Check arrest at any zone with 100% pressure
      const arrestZone=Object.keys(newZonePressure).find(zid=>newZonePressure[zid]>=100);
      if(arrestZone){
        const cooldown=10+Math.floor(Math.random()*11); // 10-20 days
        const releaseDay=result.day+cooldown;
        // Lose territory: drop arrest zone + 30% chance to lose other zones
        const lostZones=[arrestZone];
        Object.keys(result.zones).forEach(zid=>{if(zid!==arrestZone&&Math.random()<0.3)lostZones.push(zid)});
        const remainingZones={...result.zones};
        lostZones.forEach(zid=>{delete remainingZones[zid]});
        // Lose 1-3 locked clients (rivals poach)
        const lockedClients=Object.keys(result.clients||{}).filter(cid=>result.clients[cid]?.locked);
        const numLost=Math.min(lockedClients.length,1+Math.floor(Math.random()*3));
        const lostClients=lockedClients.sort(()=>Math.random()-0.5).slice(0,numLost);
        const updatedClientsState={...result.clients};
        lostClients.forEach(cid=>{updatedClientsState[cid]={...updatedClientsState[cid],locked:false,lostToArrest:true}});
        // Lose 50% of cash + all dirty
        const lostCash=Math.floor(result.cash*0.5);
        result={
          ...result,
          arrestState:{day:result.day,releaseDay,lostZones:lostZones.map(zid=>region.zones.find(z=>z.id===zid)?.name).filter(Boolean),lostClients:lostClients.map(cid=>cityClients.find(c=>c.id===cid)?.name).filter(Boolean),lostCash},
          zones:remainingZones,
          clients:updatedClientsState,
          cash:result.cash-lostCash,
          dirty:0, // dirty cash seized
          inventory:0, // stash seized
          heat:Math.max(50,result.heat),
          zonePressure:Object.fromEntries(Object.keys(newZonePressure).map(zid=>[zid,Math.max(20,newZonePressure[zid]*0.5)])),
          log:[{day:result.day,msg:`🚔 ARRESTED in ${region.zones.find(z=>z.id===arrestZone)?.name||arrestZone}. ${cooldown}-day incarceration. Lost ${lostZones.length} zones, ${numLost} clients, $${fmt(lostCash)} cash + all dirty + all stash.`,cls:"bad"},...result.log].slice(0,80),
        };
        setTimeout(()=>setReveal({action:`🚔 ARRESTED · ${region.zones.find(z=>z.id===arrestZone)?.name||arrestZone}`,summary:`✗ Pressure hit 100. ${cooldown}-day hold. Empire collapsed.`,text:`The Met rolled hard. Two unmarked vans, a SCO19 standby, your front door at 4:47am. Stash gone, dirty cash gone, ${lostZones.length} zones lost to rivals overnight, ${numLost} client${numLost===1?"":"s"} lost. ${cooldown} days inside before bail. Click END DAY to fast-forward to release.`,outcome:"bad",deltas:{cash:-lostCash,heat:0,rep:-15}}),200);
      }else{
        // Lay-low warnings — fire ONCE per zone when crossing into a new threshold
        const lastWarnings=result._lastPressureWarnings||{};
        const newWarnings={...lastWarnings};
        let warned=null;
        Object.keys(newZonePressure).forEach(zid=>{
          const lvl=pressureLevel(newZonePressure[zid]);
          const lastLvl=lastWarnings[zid];
          if(lvl.level!==lastLvl&&lvl.level!=="GREEN"&&lvl.level!=="ARREST"){
            newWarnings[zid]=lvl.level;
            warned={zid,lvl,pressure:Math.round(newZonePressure[zid])};
          }else if(lvl.level==="GREEN"){
            newWarnings[zid]="GREEN";
          }
        });
        result._lastPressureWarnings=newWarnings;
        if(warned&&!isLayingLow){
          const zName=region.zones.find(z=>z.id===warned.zid)?.name||warned.zid;
          result.laylowUntil=Math.max(result.laylowUntil||0,result.day+warned.lvl.laylow);
          result.log=[{day:result.day,msg:`🚨 ${warned.lvl.label} in ${zName} (${warned.pressure}%). Lay low for ${warned.lvl.laylow} days. No street sales.`,cls:warned.lvl.level==="CRITICAL"||warned.lvl.level==="RED"?"bad":"warn"},...result.log].slice(0,80);
          setTimeout(()=>setReveal({action:`🚨 ${warned.lvl.label} · ${zName.toUpperCase()}`,summary:`⚠ Police pressure at ${warned.pressure}% — laying low for ${warned.lvl.laylow} days.`,text:`${zName} is hot. Surveillance vans, increased foot patrols, possible CI activity. Your operatives stand down. ${warned.lvl.laylow} days no street sales — locked clients still pay (they're discreet). Click END DAY repeatedly to ride it out.`,outcome:warned.lvl.level==="CRITICAL"?"bad":"warn",deltas:{}}),250);
        }
      }
    }

    // Release narrative if we just got out
    if(releaseEvent){
      setTimeout(()=>setReveal({action:`🆓 RELEASED · BACK ON THE STREET`,summary:`Out after ${releaseEvent.releaseDay-releaseEvent.day} days. Empire to rebuild.`,text:`Bail granted. You walk out into a London that moved on without you. ${releaseEvent.lostZones?.length||0} zones already taken by rivals. ${releaseEvent.lostClients?.length||0} clients quietly switched suppliers. The work begins again — but you know the system better now.`,outcome:"warn",deltas:{rep:-5}}),100);
    }

    return result;
  };
  const advanceDay=()=>setG(computeDayAdvance);
  const fastForwardTo=(targetDay)=>{
    setG(p=>{
      let state=p;
      let safety=0;
      while(state.day<targetDay&&safety<60){
        state=computeDayAdvance(state);
        safety++;
        // Stop if we hit a queued event during fast-forward (the useEffect will handle the reveal)
        if(state.queuedEvent&&state.queuedEvent.day<=state.day)break;
      }
      return state;
    });
  };

  const handleNpcChoice=(npc,opt)=>{
    setG(p=>{
      const e=opt.effect||{};
      const newCash=clamp(p.cash+(e.cash||0),0,99999999);
      const newRel=(p.npcRel[npc.id]||0)+(e.rel||0);
      const newHeat=clamp(p.heat+(e.heat||0),0,100);
      return{...p,cash:newCash,heat:newHeat,npcRel:{...p.npcRel,[npc.id]:newRel},npcs:{...p.npcs,[npc.id]:{met:true,lastDay:p.day}},log:[{day:p.day,msg:`Met ${npc.name}: ${opt.label}.`,cls:"info"},...p.log].slice(0,80)};
    });
  };

  const buyFront=(template)=>{
    if(g.cash<template.cost){setToast({type:"bad",title:"INSUFFICIENT FUNDS",msg:"Need $"+fmt(template.cost)+" to acquire."});return}
    setG(p=>({...p,cash:p.cash-template.cost,fronts:[...p.fronts,{...template,id:Date.now()+"_"+template.type,acquired:p.day}],log:[{day:p.day,msg:`Acquired ${template.name}. Front #${p.fronts.length+1}.`,cls:"good"},...p.log].slice(0,80)}));
    setToast({type:"good",title:"FRONT ACQUIRED",msg:template.name+" — $"+fmt(template.monthly)+"/mo capacity."});
  };

  // CREW HANDLERS
  const [selCrew,setSelCrew]=useState(null);

  // DIRECT TERRITORY CLAIM — when you have 3+ locked clients in a zone, you can claim it without strategy
  const claimZoneDirect=(zoneId)=>{
    const z=region.zones.find(zz=>zz.id===zoneId);
    if(!z)return;
    if(g.zones[zoneId]){setToast({type:"warn",title:"ALREADY YOURS",msg:`${z.name} is already in your territory.`});return}
    const lockedHere=getZoneClients(g.cityKey,zoneId).filter(cl=>g.clients?.[cl.id]?.locked).length;
    if(lockedHere<3){setToast({type:"bad",title:"NOT ENOUGH INFLUENCE",msg:`You need 3 locked clients in ${z.name} (you have ${lockedHere}).`});return}
    const cost=15000;
    if(g.cash<cost){setToast({type:"bad",title:"INSUFFICIENT FUNDS",msg:`Direct claim costs $${fmt(cost)} (legal/cleanup work). You have $${fmt(g.cash)}.`});return}
    if(!confirm(`Claim ${z.name} as your territory?\n\n${lockedHere}/4 clients locked here = enough influence to take it without violence.\n\nCost: $${fmt(cost)} (cleanup, lawyer fees)\nHeat: +5\n\nThis gives you daily revenue from the zone + unlocks 1-2 new clients in OTHER zones via regional rep.`))return;
    // Cross-zone unlocks (regional reputation effect)
    const otherZones=Object.keys(CLIENT_BANK[g.cityKey]||{}).filter(zid=>zid!==zoneId&&!g.zones[zid]);
    const newUnlocks={...(g.clientUnlocks||{})};
    let crossUnlocked=[];
    for(let i=0;i<2&&otherZones.length>0;i++){
      const targetZone=otherZones[Math.floor(Math.random()*otherZones.length)];
      const candidates=getZoneClients(g.cityKey,targetZone).filter(cl=>!newUnlocks[cl.id]);
      if(candidates.length>0){
        const pick=candidates[0];
        newUnlocks[pick.id]={day:g.day,zoneId:targetZone,viaTakeover:zoneId};
        crossUnlocked.push(pick);
      }
    }
    setG(p=>({...p,
      cash:p.cash-cost,
      heat:clamp(p.heat+5,0,100),
      zones:{...p.zones,[zoneId]:{takenDay:p.day,viaInfluence:true}},
      clientUnlocks:newUnlocks,
      log:[{day:p.day,msg:`✓ CLAIMED ${z.name} via client influence (${lockedHere}/4 locked). Cost $${fmt(cost)}.`,cls:"good"},...p.log].slice(0,80),
    }));
    setReveal({action:`✓ TERRITORY CLAIMED · ${z.name.toUpperCase()}`,summary:`✓ ${z.name} is yours. ${lockedHere}/4 clients made it possible.`,text:`${lockedHere} locked clients in ${z.name} gave you the inside line. No violence needed — Park (your fixer) handled paperwork, your locked clients vouched for you, the few rivals who'd have resisted got the message and folded. ${z.name} now adds to your daily revenue stream.${crossUnlocked.length>0?` Word travelled — ${crossUnlocked.map(c=>c.name.split(" ")[0]).join(" and ")} now contactable in other zones.`:""}`,outcome:"good",deltas:{cash:-cost,heat:5,rep:8+lockedHere}});
  };

  // DEAL CONFIRMATION
  const handleDealConfirm=({qty,pricePerUnit,total,offsetLabel})=>{
    const d=deal;
    setDeal(null);
    // Bump zone pressure + zone sales for the focused zone (or NPC's zone)
    const dealZone=focusedZone||d.npc.zone;
    if(d.side==="we_sell"){
      if((g.inventory||0)<qty){setToast({type:"bad",title:"INSUFFICIENT STASH",msg:`You have ${g.inventory||0} units, need ${qty}.`});return}
      setG(p=>{
        const newPressure={...(p.zonePressure||{})};
        const newSales={...(p.zoneSales||{})};
        if(dealZone){
          newPressure[dealZone]=Math.min(100,(newPressure[dealZone]||0)+qty*0.6);
          newSales[dealZone]=(newSales[dealZone]||0)+qty;
        }
        return{...p,inventory:p.inventory-qty,cash:p.cash+total,dirty:p.dirty+total,heat:clamp(p.heat+Math.max(0,Math.floor(qty/15)),0,100),zonePressure:newPressure,zoneSales:newSales,npcRel:{...p.npcRel,[d.npc.id]:(p.npcRel[d.npc.id]||0)+1},npcs:{...p.npcs,[d.npc.id]:{met:true,lastDay:p.day}},log:[{day:p.day,msg:`Closed deal w/ ${d.npc.name}: SOLD ${qty}u @ $${pricePerUnit}/u (${offsetLabel}) = $${fmt(total)}`,cls:"good"},...p.log].slice(0,80)};
      });
      setReveal({action:`DEAL CLOSED · ${d.npc.name}`,summary:`✓ Sold ${qty} units at $${pricePerUnit}/u (${offsetLabel})`,text:`${d.npc.name} took ${qty} units off your hands. Cash flowed both ways. Both walked out clean.${dealZone?` Pressure rises in ${region.zones.find(z=>z.id===dealZone)?.name||dealZone}.`:""}`,outcome:"good",deltas:{cash:total,dirty:total,heat:1+Math.floor(qty/10),inventory:-qty,rep:1}});
    }else{
      if(g.cash<total){setToast({type:"bad",title:"INSUFFICIENT CASH",msg:`Need $${fmt(total)}, you have $${fmt(g.cash)}.`});return}
      const cap=stashCapFor(g.transport);
      if((g.inventory||0)+qty>cap){setToast({type:"bad",title:"OVER STASH CAPACITY",msg:`Stash holds max ${cap} units. You'd need to upgrade transport.`});return}
      setG(p=>({...p,inventory:(p.inventory||0)+qty,cash:p.cash-total,heat:clamp(p.heat+2,0,100),npcRel:{...p.npcRel,[d.npc.id]:(p.npcRel[d.npc.id]||0)+1},npcs:{...p.npcs,[d.npc.id]:{met:true,lastDay:p.day}},log:[{day:p.day,msg:`Closed deal w/ ${d.npc.name}: BOUGHT ${qty}u @ $${pricePerUnit}/u (${offsetLabel}) = $${fmt(total)}`,cls:"good"},...p.log].slice(0,80)}));
      setReveal({action:`DEAL CLOSED · ${d.npc.name}`,summary:`✓ Bought ${qty} units at $${pricePerUnit}/u (${offsetLabel})`,text:`${d.npc.name} delivered ${qty} units. Cash exchanged. Stash up. Heat ticks — supply moves leave traces.`,outcome:"good",deltas:{cash:-total,heat:2,inventory:qty,rep:1}});
    }
  };
  // STRATEGIES
  const [pendingStrategy,setPendingStrategy]=useState(null);
  const [selClient,setSelClient]=useState(null);
  const [speakClient,setSpeakClient]=useState(null);
  const [convClient,setConvClient]=useState(null);
  const [poachOffer,setPoachOffer]=useState(null);
  const [supplierDeal,setSupplierDeal]=useState(null);

  // Resolve a supplier negotiation — buy units of a specific drug at a negotiated price
  const closeSupplierDeal=({qty,pricePerUnit,total,product})=>{
    const cap=stashCapFor(g.transport);
    if(g.cash<total){setToast({type:"bad",title:"INSUFFICIENT CASH",msg:`Need $${fmt(total)}, you have $${fmt(g.cash)}.`});return}
    if(totalStash(g)+qty>cap){setToast({type:"bad",title:"OVER STASH CAPACITY",msg:`Stash holds max ${cap} units total. You'd need to upgrade transport.`});return}
    setG(p=>{
      const newStash={...(p.stash||{cocaine:p.inventory||0,weed:0,mdma:0,shrooms:0,ketamine:0})};
      newStash[product.id]=(newStash[product.id]||0)+qty;
      const inventoryNow=newStash.cocaine||0; // legacy field tracks cocaine
      return{...p,
        cash:p.cash-total,
        stash:newStash,
        inventory:inventoryNow,
        inventoryCostBasis:(p.inventoryCostBasis||0)+total,
        heat:clamp(p.heat+Math.max(0,Math.floor(qty/30)),0,100),
        lastRestock:p.day,
        log:[{day:p.day,msg:`✓ Bought ${qty}u of ${product.name} @ $${pricePerUnit}/u (negotiated) = $${fmt(total)}`,cls:"good"},...p.log].slice(0,80),
      };
    });
    setSupplierDeal(null);
    setReveal({action:`SUPPLY DEAL CLOSED · ${product.name.toUpperCase()}`,summary:`✓ ${qty} units of ${product.name} restocked at $${pricePerUnit}/u`,text:`Supplier handed over ${qty}u of ${product.name.toLowerCase()}. Cash exchanged. Stash up. Heat ticks — supply moves leave traces.`,outcome:"good",deltas:{cash:-total,heat:1+Math.floor(qty/15),rep:0}});
  };

  // Poach resolution
  const resolvePoach=(action,details)=>{
    const{client,poach}=poachOffer;
    setPoachOffer(null);
    const cl=client;
    if(action==="walk_away"){
      // They take the rival's offer. Locked → unlocked. Lose the client.
      setG(p=>({...p,
        clients:{...p.clients,[cl.id]:{...(p.clients?.[cl.id]||{}),locked:false,lostToRival:poach.rivalName,lostDay:p.day}},
        pendingPoach:null,
        rep:clamp(p.rep-3,-100,200),
        log:[{day:p.day,msg:`✗ ${cl.name} switched to ${poach.rivalName}. Lost recurring revenue.`,cls:"bad"},...p.log].slice(0,80),
      }));
      setReveal({action:`✗ CLIENT LOST · ${cl.name}`,summary:`${cl.name} took ${poach.rivalName}'s offer. -3 rep.`,text:`The phone goes quiet. ${cl.name.split(" ")[0]} took the rival deal. Word will travel — letting a client walk without a counter signals weakness. Lock 2-3 more clients in their zone before this happens again or you'll lose the territory's influence too.`,outcome:"bad",deltas:{rep:-3}});
      return;
    }
    // counter — roll acceptance
    const{newPremium,loyaltyBonus,acceptChance}=details;
    const accepted=Math.random()<acceptChance;
    if(accepted){
      // Update client's pricePremium going forward (apply via a per-client override)
      setG(p=>({...p,
        cash:p.cash-loyaltyBonus,
        clients:{...p.clients,[cl.id]:{...(p.clients?.[cl.id]||{}),pricePremiumOverride:newPremium/100,lastRenegotiated:p.day}},
        pendingPoach:null,
        rep:clamp(p.rep+2,-100,200),
        log:[{day:p.day,msg:`✓ ${cl.name} stays — counter accepted at ${newPremium>=0?"+":""}${newPremium}%${loyaltyBonus>0?` + $${fmt(loyaltyBonus)} bonus`:""}.`,cls:"good"},...p.log].slice(0,80),
      }));
      setReveal({action:`✓ CLIENT RETAINED · ${cl.name}`,summary:`${cl.name} stays. New pricing locked at ${newPremium>=0?"+":""}${newPremium}% vs market.`,text:`${cl.name.split(" ")[0]} accepts the counter. ${loyaltyBonus>0?`The $${fmt(loyaltyBonus)} bonus tipped the scales.`:"They valued reliability over the discount."} Pricing rebases at ${newPremium>=0?"+":""}${newPremium}% from this month forward. ${poach.rivalName} got the message: this client isn't available.`,outcome:"good",deltas:{cash:-loyaltyBonus,rep:2}});
    }else{
      // Walked despite counter
      setG(p=>({...p,
        cash:p.cash-loyaltyBonus,
        clients:{...p.clients,[cl.id]:{...(p.clients?.[cl.id]||{}),locked:false,lostToRival:poach.rivalName,lostDay:p.day}},
        pendingPoach:null,
        rep:clamp(p.rep-2,-100,200),
        log:[{day:p.day,msg:`✗ ${cl.name} walked despite counter. -$${fmt(loyaltyBonus)} burned.`,cls:"bad"},...p.log].slice(0,80),
      }));
      setReveal({action:`✗ COUNTER REJECTED · ${cl.name}`,summary:`${cl.name} took ${poach.rivalName}'s offer. Bonus burned.`,text:`Your counter wasn't enough. ${cl.name.split(" ")[0]} took the rival deal anyway, and the $${fmt(loyaltyBonus)} you offered as bonus walked out the door with them. Burn lesson: counter aggressively or not at all.`,outcome:"bad",deltas:{cash:-loyaltyBonus,rep:-2}});
    }
  };

  // Client conversation handlers
  const startConversation=(client)=>{
    setSelClient(null);
    setConvClient(client);
  };
  const concludeConversation=(outcome,finalMood)=>{
    const client=convClient;
    setConvClient(null);
    if(!client)return;
    const cooldown=outcome==="reject"?14:outcome==="maybe"?7:0;
    setG(p=>{
      const cs=p.clients?.[client.id]||{};
      const newCS={
        met:true,
        attempts:(cs.attempts||0)+1,
        lastMood:finalMood,
        lastAttemptDay:p.day,
        cooldownUntil:p.day+cooldown,
        locked:outcome==="accept"||cs.locked,
        lockedDay:outcome==="accept"?p.day:cs.lockedDay,
      };
      const updates={...p,clients:{...p.clients,[client.id]:newCS}};
      // Apply lock benefits
      if(outcome==="accept"&&!cs.locked){
        const lb=client.lockBenefits||{};
        if(lb.heatPermanent)updates.heat=clamp(p.heat+lb.heatPermanent,0,100);
        updates.rep=clamp(p.rep+(client.smart>=9?12:client.smart>=7?8:5),-100,200);
        updates.log=[{day:p.day,msg:`✓ CLIENT LOCKED: ${client.name}. ${client.lockBenefit}`,cls:"good"},...p.log].slice(0,80);
      }else if(outcome==="reject"){
        updates.log=[{day:p.day,msg:`✗ Meeting failed with ${client.name.split(" ")[0]}. Cooldown ${cooldown} days.`,cls:"warn"},...p.log].slice(0,80);
      }else{
        updates.log=[{day:p.day,msg:`~ ${client.name.split(" ")[0]} considering — try again in ${cooldown} days.`,cls:"info"},...p.log].slice(0,80);
      }
      return updates;
    });
    if(outcome==="accept"){
      setReveal({action:`CLIENT LOCKED · ${client.name}`,summary:`✓ ${client.name} on the book. Recurring revenue active.`,text:`${client.lockBenefit} — effective immediately. They want delivery via established channels and zero attribution.`,outcome:"good",deltas:{rep:client.smart>=9?12:client.smart>=7?8:5}});
    }
  };
  // Strategy slots: 1 base + 1 each for Strategist (Elena), Hacker (Ghost)
  const strategySlots=1+((g.hiredCrew||[]).includes("strategist")?1:0)+((g.hiredCrew||[]).includes("hacker")?1:0);
  const launchStrategy=(strat,executor,directive)=>{
    if(g.cash<strat.upfrontCost){setToast({type:"bad",title:"INSUFFICIENT FUNDS",msg:`${strat.name} costs $${fmt(strat.upfrontCost)} upfront. You have $${fmt(g.cash)}.`});return}
    const id=`strat_${Date.now()}`;
    setG(p=>({...p,
      cash:p.cash-strat.upfrontCost,
      activeStrategies:[...(p.activeStrategies||[]),{id,stratId:strat.id,execId:executor.id,directive,startDay:p.day,endDay:p.day+strat.duration}],
      log:[{day:p.day,msg:`STRATEGY LAUNCHED: ${strat.name} via ${executor.name}. ${strat.duration}d operation. -$${fmt(strat.upfrontCost)}.`,cls:"good"},...p.log].slice(0,80),
    }));
    setPendingStrategy(null);
    setToast({type:"good",title:"STRATEGY ACTIVE",msg:`${strat.name} runs for ${strat.duration} days. ${executor.name} on point.`});
  };
  const cancelActiveStrategy=(asId)=>{
    if(!confirm("Abort this strategy? You forfeit the upfront cost. Operative is recalled."))return;
    setG(p=>({...p,activeStrategies:(p.activeStrategies||[]).filter(a=>a.id!==asId),log:[{day:p.day,msg:`Strategy aborted. Operative recalled. Upfront forfeited.`,cls:"warn"},...p.log].slice(0,80)}));
  };
  // Resolve a strategy that has completed its duration
  const resolveStrategy=(p,as)=>{
    const strat=STRATEGIES.find(s=>s.id===as.stratId);
    if(!strat)return p;
    const exec=as.execId==="self"?{name:p.alias.toUpperCase(),skills:{muscle:5,brain:6,charm:6,connect:6}}:CREW_ROSTER.find(c=>c.id===as.execId);
    if(!exec)return p;
    const skillKey=strat.bestSkillKey;
    const primarySkill=skillKey==="connect"?(exec.skills.charm+exec.skills.connect)/2:exec.skills[skillKey];
    const success=primarySkill/10; // 0 to 1
    let updates={...p,activeStrategies:p.activeStrategies.filter(a=>a.id!==as.id)};
    let summary,narrative,outcome,deltas={};
    // Strategy-specific resolution
    if(strat.id==="volume_push"){
      const baseTarget=strat.targetUnits;
      const actualSold=Math.min(p.inventory||0,Math.floor(baseTarget*Math.max(0.3,success)));
      const unsold=baseTarget-actualSold;
      const pricePerUnit=Math.round((p.marketValue||baseMVFor(p.cityKey))*(1+strat.priceOffset));
      const proceeds=actualSold*pricePerUnit;
      updates.inventory=Math.max(0,(p.inventory||0)-actualSold);
      updates.cash=p.cash+proceeds;
      updates.dirty=p.dirty+proceeds;
      updates.heat=clamp(p.heat+10,0,100);
      summary=unsold>5?`⚠ Sold ${actualSold}/${baseTarget}. ${unsold} units left over.`:`✓ Volume push complete: ${actualSold} units moved. +$${fmt(proceeds)}.`;
      narrative=unsold>5?`${exec.name} pushed hard but the operatives couldn't move all of it. ${unsold} units back in the stash. Selling power was the bottleneck — needed more charm or connect.`:`The volume play landed. ${exec.name} kept product moving for ${strat.duration} days straight. Streets are saturated; rivals noticed.`;
      outcome=unsold>5?"warn":"good";
      deltas={cash:proceeds,dirty:proceeds,heat:10,inventory:-actualSold,rep:unsold>5?0:2};
    }else if(strat.id==="premium_lock"){
      const baseTarget=strat.targetUnits;
      const charmFactor=exec.skills.charm/10;
      const repFactor=Math.min(1,p.rep/15);
      const successRate=charmFactor*0.6+repFactor*0.4;
      const actualSold=Math.min(p.inventory||0,Math.floor(baseTarget*Math.max(0.2,successRate)));
      const pricePerUnit=Math.round((p.marketValue||baseMVFor(p.cityKey))*(1+strat.priceOffset));
      const proceeds=actualSold*pricePerUnit;
      updates.inventory=Math.max(0,(p.inventory||0)-actualSold);
      updates.cash=p.cash+proceeds;
      updates.dirty=p.dirty+proceeds;
      updates.heat=clamp(p.heat+4,0,100);
      summary=actualSold<baseTarget*0.6?`⚠ Premium lock partial: ${actualSold}/${baseTarget} units moved. The clientele is picky.`:`✓ Premium lock: ${actualSold} units at +20%. +$${fmt(proceeds)}.`;
      narrative=actualSold<baseTarget*0.6?`${exec.name} worked the high-end clientele. Some bought. Most passed — they don't deal with operators they don't know. Reputation matters more than product up here.`:`${exec.name} closed the room. Premium pricing held. The clientele will remember.`;
      outcome=actualSold<baseTarget*0.6?"warn":"good";
      deltas={cash:proceeds,dirty:proceeds,heat:4,inventory:-actualSold,rep:actualSold>=baseTarget*0.6?5:1};
    }else if(strat.id==="territorial_takeover"){
      const muscleFactor=exec.skills.muscle/10;
      // PREFER zones where you have 3+ locked clients (territorial influence)
      const eligibleZones=region.zones.filter(z=>!p.zones[z.id]);
      const sortedZones=eligibleZones.sort((a,b)=>{
        const aLocks=getZoneClients(p.cityKey,a.id).filter(cl=>p.clients?.[cl.id]?.locked).length;
        const bLocks=getZoneClients(p.cityKey,b.id).filter(cl=>p.clients?.[cl.id]?.locked).length;
        return bLocks-aLocks;
      });
      const newZone=sortedZones[0];
      const targetLocks=newZone?getZoneClients(p.cityKey,newZone.id).filter(cl=>p.clients?.[cl.id]?.locked).length:0;
      // Bonus to muscle factor when client influence is strong (3+ locked = +25%)
      const influenceBonus=targetLocks>=3?0.25:targetLocks>=2?0.10:0;
      const ok=(muscleFactor+influenceBonus)>=0.7||((muscleFactor+influenceBonus)>=0.5&&Math.random()>0.4);
      if(ok&&newZone){
        updates.zones={...p.zones,[newZone.id]:{takenDay:p.day}};
        updates.heat=clamp(p.heat+15,0,100);
        // Owning territory unlocks 1-2 clients in OTHER zones (regional rep effect)
        const otherZones=Object.keys(CLIENT_BANK[p.cityKey]||{}).filter(zid=>zid!==newZone.id);
        const newUnlocks={...(p.clientUnlocks||{})};
        let crossUnlocked=[];
        for(let i=0;i<2&&otherZones.length>0;i++){
          const targetZone=otherZones[Math.floor(Math.random()*otherZones.length)];
          const candidates=getZoneClients(p.cityKey,targetZone).filter(cl=>!newUnlocks[cl.id]);
          if(candidates.length>0){
            const pick=candidates[0];
            newUnlocks[pick.id]={day:p.day,zoneId:targetZone,viaTakeover:newZone.id};
            crossUnlocked.push(pick);
          }
        }
        updates.clientUnlocks=newUnlocks;
        summary=`✓ Territorial takeover: ${newZone.name} is yours.${targetLocks>=3?" (Client influence carried.)":""}`;
        narrative=`${exec.name} ran the play.${targetLocks>=3?` ${targetLocks} locked clients gave you the inside line — half the resistance folded before the muscle even arrived.`:" Muscle in front, product behind. The street capitulated."} ${newZone.name} now adds to your daily revenue.${crossUnlocked.length>0?` Word travelled — ${crossUnlocked.map(c=>c.name.split(" ")[0]).join(" and ")} now contactable in other zones.`:""}`;
        outcome="good";deltas={heat:15,rep:8+targetLocks};
      }else if(!newZone){summary="✓ No new zones available to take.";narrative="The map is yours already.";outcome="neutral";deltas={};
      }else{
        updates.heat=clamp(p.heat+12,0,100);
        summary=`✗ Takeover failed. ${exec.name} got pushed back.`;
        narrative=`Not enough muscle on the move. The locals saw weakness and rallied. Cash gone, no zone, heat up. ${targetLocks<3?"Hint: Lock 3+ clients in a zone before taking over — they soften the resistance.":"Bring more force next time."}`;
        outcome="bad";deltas={heat:12,rep:-3};
      }
    }else if(strat.id==="whale_hunt"){
      const charmConn=(exec.skills.charm+exec.skills.connect)/20;
      const fed=Math.random()<0.20;
      if(fed){
        updates.heat=clamp(p.heat+20,0,100);
        summary=`✗ One whale was a fed. Cover blown.`;
        narrative=`${exec.name} ran due diligence on five targets. Four were real. One was a federal informant playing wealthy. Now the feds know your face. Heat surge.`;
        outcome="bad";deltas={heat:20,rep:-5};
      }else{
        const locked=Math.floor(5*Math.max(0.4,charmConn));
        updates.strategyFlags={...p.strategyFlags,whale_clients:{day:p.day+30,count:locked}};
        summary=`✓ Whale hunt: ${locked}/5 locked. Premium income for 30 days.`;
        narrative=`${exec.name} cultivated the targets across two weeks. ${locked} are locked — they'll buy from you and only you. Cash flow upgrade.`;
        outcome="good";deltas={heat:5,rep:locked*2};
        updates.heat=clamp(p.heat+5,0,100);
      }
    }else if(strat.id==="cook_premium"){
      const raidRoll=Math.random();
      if(raidRoll<0.08*strat.duration){
        updates.inventory=0;
        updates.heat=clamp(p.heat+25,0,100);
        summary=`✗ LAB RAIDED. Stash lost. Heat surged.`;
        narrative=`Day three of the cook. Sirens. Vera barely made it out a back window. All product gone. Heat through the roof.`;
        outcome="bad";deltas={heat:25,inventory:-(p.inventory||0),rep:-3};
      }else{
        updates.strategyFlags={...p.strategyFlags,premium_product:{day:p.day+14}};
        updates.marketValue=Math.round((p.marketValue||baseMVFor(p.cityKey))*1.25);
        summary=`✓ Premium cook complete. MV +25% for 14 days.`;
        narrative=`Vera delivered. Higher purity, cleaner cut. Market price jumps as word spreads. The clientele upgrades.`;
        outcome="good";deltas={rep:6};
      }
    }else if(strat.id==="runner_network"){
      updates.strategyFlags={...p.strategyFlags,runner_network:{day:p.day+30}};
      summary=`✓ Runner network active. +50% sell-through for 30 days.`;
      narrative=`Four runners trained, deployed, paid. Daily zone burn rate jumps 50%. The corners run themselves now — you take the cut.`;
      outcome="good";deltas={rep:4,heat:6};
      updates.heat=clamp(p.heat+6,0,100);
    }else{
      summary=`✓ Strategy resolved.`;narrative=`${strat.name} concluded.`;outcome="neutral";
    }
    // Apply directive flavour to narrative if present
    if(as.directive)narrative+=` Directive note: "${as.directive.slice(0,120)}" — applied where possible.`;
    // Schedule reveal
    setTimeout(()=>setReveal({action:`STRATEGY RESOLVED · ${strat.name}`,summary,text:narrative,outcome,deltas}),200);
    return updates;
  };
  const restockUnits=(qty)=>{
    const supplyData=SUPPLY_OPTIONS.find(s=>s.id===g.supply);
    if(!supplyData)return;
    const costPerUnit=Math.round(80*supplyData.cost);
    const totalCost=qty*costPerUnit;
    const cap=stashCapFor(g.transport);
    if(g.cash<totalCost){setToast({type:"bad",title:"INSUFFICIENT FUNDS",msg:`Need $${fmt(totalCost)} for ${qty} units.`});return}
    if((g.inventory||0)+qty>cap){setToast({type:"bad",title:"OVER CAPACITY",msg:`Stash holds max ${cap} units. You have ${g.inventory||0}, can fit ${cap-(g.inventory||0)} more.`});return}
    const heatBump=qty>=50?3:qty>=25?2:qty>=10?1:0;
    setG(p=>({...p,
      cash:p.cash-totalCost,
      inventory:(p.inventory||0)+qty,
      inventoryCostBasis:(p.inventoryCostBasis||0)+totalCost,
      heat:clamp(p.heat+heatBump,0,100),
      lastRestock:p.day,
      log:[{day:p.day,msg:`Restocked ${qty} units from ${supplyData.name} for $${fmt(totalCost)} ($${costPerUnit}/u). ${heatBump>0?"+"+heatBump+" heat.":""}`,cls:"good"},...p.log].slice(0,80)
    }));
    setToast({type:"good",title:"PRODUCT IN STASH",msg:`${qty} units · $${fmt(totalCost)} · stash now ${(g.inventory||0)+qty}/${cap}.`});
  };
  const hireCrew=(crew)=>{
    if(g.cash<crew.hireCost){setToast({type:"bad",title:"INSUFFICIENT FUNDS",msg:"Hiring "+crew.name+" requires $"+fmt(crew.hireCost)+"."});return}
    setG(p=>({...p,cash:p.cash-crew.hireCost,hiredCrew:[...(p.hiredCrew||[]),crew.id],crewState:{...(p.crewState||{}),[crew.id]:{trust:5,deployedTo:null,deployedSince:null,weeksWorked:0}},log:[{day:p.day,msg:`Hired ${crew.name} (${crew.role}). Signing fee $${fmt(crew.hireCost)}.`,cls:"good"},...p.log].slice(0,80)}));
    setToast({type:"good",title:"CREW EXPANDED",msg:crew.name+" is on the books. Trust starts at 5/10."});
  };
  const speakCrew=(crew,action)=>{
    const e=action.effect||{};
    setG(p=>{
      const cs={...(p.crewState||{})};
      const cur=cs[crew.id]||{trust:5};
      cs[crew.id]={...cur,trust:clamp(cur.trust+(e.trust||0),0,10)};
      return{...p,
        cash:clamp(p.cash+(e.cash||0),0,99999999),
        heat:clamp(p.heat+(e.heat||0),0,100),
        rep:clamp(p.rep+(e.rep||0),-100,200),
        crewState:cs,
        log:[{day:p.day,msg:`${crew.name}: ${action.label}`,cls:e.heat&&e.heat<0?"good":e.heat&&e.heat>0?"warn":"info"},...p.log].slice(0,80)
      };
    });
  };
  const deployCrew=(crew,zoneId)=>{
    const z=region.zones.find(zz=>zz.id===zoneId);
    setG(p=>({...p,crewState:{...(p.crewState||{}),[crew.id]:{...(p.crewState?.[crew.id]||{trust:5}),deployedTo:zoneId,deployedSince:p.day}},log:[{day:p.day,msg:`Deployed ${crew.name} to ${z?.name||"zone"}.`,cls:"info"},...p.log].slice(0,80)}));
    setToast({type:"info",title:"DEPLOYED",msg:crew.name+" is now active in "+(z?.name||"zone")+"."});
  };
  const recallCrew=(crew)=>{
    setG(p=>({...p,crewState:{...(p.crewState||{}),[crew.id]:{...(p.crewState?.[crew.id]||{}),deployedTo:null,deployedSince:null}},log:[{day:p.day,msg:`Recalled ${crew.name} to standby.`,cls:"info"},...p.log].slice(0,80)}));
  };
  const fireCrew=(crew)=>{
    setG(p=>{
      const newHired=(p.hiredCrew||[]).filter(id=>id!==crew.id);
      const newCs={...(p.crewState||{})};delete newCs[crew.id];
      return{...p,hiredCrew:newHired,crewState:newCs,log:[{day:p.day,msg:`Fired ${crew.name}. Loyalty unwinds quickly in this game.`,cls:"warn"},...p.log].slice(0,80)};
    });
    setSelCrew(null);
    setToast({type:"warn",title:"CREW DISMISSED",msg:crew.name+" is gone. They know things now."});
  };

  const zoneStatuses=useMemo(()=>{
    const s={};
    region.zones.forEach(z=>{s[z.id]=getZoneStatus(g,z.id)});
    return s;
  },[g.zones,g.rivals,g.contested]);

  const heatPct=g.heat;
  const rank=g.heat>=80?"MARKED":g.heat>=60?"WATCHED":g.heat>=40?"KNOWN":g.heat>=20?"RUMOURED":"GHOST";
  const tier=Object.keys(g.zones).length>=7?"EMPIRE":Object.keys(g.zones).length>=4?"BOSS":Object.keys(g.zones).length>=2?"OPERATOR":"ROOKIE";

  return(
    <div>
      <div className="bar">
        <div className="logo">STREET <span className="king">KING</span> · {g.alias.toUpperCase()}{mpSession&&<span style={{marginLeft:14,fontSize:11,fontFamily:"'JetBrains Mono',monospace",color:"var(--cyan)",letterSpacing:1.5,verticalAlign:"middle"}}>· LOBBY <b style={{color:"var(--green)"}}>{mpSession.lobbyCode}</b> · {mpOtherPlayers().length+1}P</span>}</div>
        <div className="stats-bar">
          <div className="s-item"><span className="s-lbl">Cash</span><span className="s-val green">${fmt(g.cash)}</span></div>
          <div className="s-item"><span className="s-lbl">Stash</span><span className="s-val cyan">{g.inventory||0}u</span></div>
          <div className="s-item"><span className="s-lbl">Market</span><span className="s-val amber">${g.marketValue||baseMVFor(g.cityKey)}/u</span></div>
          <div className="s-item"><span className="s-lbl">Dirty</span><span className="s-val amber">${fmt(g.dirty)}</span></div>
          <div className="s-item"><span className="s-lbl">Clean</span><span className="s-val cyan">${fmt(g.clean)}</span></div>
          <div className="s-item"><span className="s-lbl">Heat</span><div className="heat-meter"><div className="heat-fill" style={{width:heatPct+"%"}}/></div><span className="s-val red">{g.heat}</span></div>
          {(()=>{const mp=maxZonePressure(g);const lvl=pressureLevel(mp);return(
            <div className="s-item" title={`Highest zone pressure: ${mp}% (${lvl.label})`}><span className="s-lbl">Cops</span><div className="heat-meter"><div className="heat-fill" style={{width:mp+"%",background:lvl.color}}/></div><span className="s-val" style={{color:lvl.color}}>{Math.round(mp)}%</span></div>
          )})()}
          <div className="s-item"><span className="s-lbl">Rep</span><span className="s-val amber">{g.rep}</span></div>
          <div className="s-item"><span className="s-lbl">Zones</span><span className="s-val green">{Object.keys(g.zones).length}</span></div>
        </div>
        <div className="day-display"><span className="dot"/>DAY {g.day} · {tier} · {rank}{g.arrestState?<span style={{color:"var(--red)",marginLeft:8,letterSpacing:2}}>· 🚔 INCARCERATED ({g.arrestState.releaseDay-g.day}d)</span>:g.laylowUntil>g.day?<span style={{color:"var(--amber)",marginLeft:8,letterSpacing:2}}>· 🤫 LYING LOW ({g.laylowUntil-g.day}d)</span>:""}</div>
      </div>
      <div className="nav">
        {["overview","map","crew","people","strategies","product","business","playbook"].map(t=>(
          <button key={t} className={tab===t?"on":""} onClick={()=>setTab(t)}>{t}</button>
        ))}
        <button onClick={()=>{if(confirm("Reset entire game? This cannot be undone."))onReset()}} style={{marginLeft:"auto",color:"var(--red-dim)"}}>↺ RESET</button>
      </div>

      <div className="main">
        {tab==="overview"&&(
          <>
            <h1 className="hdr">SITUATION ROOM</h1>
            <div className="sub">{city.flag} {city.name} · DAY {g.day}</div>
            <div className="kpi-grid">
              <div className="kpi"><div className="kpi-l">Cash on Hand</div><div className="kpi-v" style={{color:"var(--green)"}}>${fmt(g.cash)}</div><div className="kpi-d">Operating capital</div></div>
              <div className="kpi"><div className="kpi-l">Dirty / Clean</div><div className="kpi-v" style={{color:"var(--amber)"}}>${fmt(g.dirty)}</div><div className="kpi-d">${fmt(g.clean)} cleaned (laundered)</div></div>
              <div className="kpi"><div className="kpi-l">Heat</div><div className="kpi-v" style={{color:g.heat>=80?"var(--red)":g.heat>=50?"var(--amber)":"var(--green)"}}>{g.heat}/100</div><div className="kpi-d">{rank}</div></div>
              <div className="kpi"><div className="kpi-l">Territory</div><div className="kpi-v" style={{color:"var(--green)"}}>{Object.keys(g.zones).length}/{region.zones.length}</div><div className="kpi-d">{tier} TIER</div></div>
            </div>

            {/* HEAT REDUCTION PANEL — visible always, urgent styling at high heat */}
            {(()=>{
              const layLowActive=g.laylowUntil&&g.day<g.laylowUntil;
              const lastBribe=g.lastBribeDay||-99;
              const bribeCooldown=g.day-lastBribe;
              const lastDisappear=g.lastDisappearDay||-99;
              const disappearCooldown=g.day-lastDisappear;
              return(
                <div className="panel" style={{marginTop:18,borderColor:g.heat>=80?"var(--red-dim)":g.heat>=50?"var(--amber-dim)":"var(--line)",borderLeft:"3px solid "+(g.heat>=80?"var(--red)":g.heat>=50?"var(--amber)":"var(--cyan-dim)")}}>
                  <div className="panel-title">{g.heat>=80?"🔥 REDUCE HEAT · CRITICAL":g.heat>=50?"⚠ REDUCE HEAT":"► HEAT MANAGEMENT"}</div>
                  <p style={{fontSize:11.5,color:"var(--txt-dim)",lineHeight:1.6,marginBottom:14,letterSpacing:.3}}>{g.heat>=85?<><b style={{color:"var(--red)"}}>Cop raids fire on activity spikes at this heat level.</b> Slow your operation OR pay to cool things down.</>:g.heat>=50?"Police attention is real. Use these levers before things get critical.":"Heat is manageable. Save these tools for emergencies."}</p>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:10}}>
                    {/* LAY LOW */}
                    <div style={{padding:"12px 14px",background:layLowActive?"rgba(62,200,255,.08)":"rgba(0,0,0,.20)",border:"1px solid "+(layLowActive?"var(--cyan)":"var(--line)")}}>
                      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:13,letterSpacing:2,color:"var(--cyan)",marginBottom:4}}>🤫 LAY LOW · 5 DAYS</div>
                      <div style={{fontSize:10.5,color:"var(--txt-dim)",lineHeight:1.5,marginBottom:8}}>No street sales. Locked clients still pay. <b style={{color:"var(--green)"}}>-8 heat/day</b> + zone pressure cools fast. Free.</div>
                      {layLowActive?(
                        <div style={{fontSize:10,color:"var(--cyan)",letterSpacing:.5,fontStyle:"italic"}}>Active · {g.laylowUntil-g.day} days remaining</div>
                      ):(
                        <button className="btn btn-sm" style={{width:"100%",padding:"6px 8px",fontSize:11}} onClick={()=>setG(p=>({...p,laylowUntil:p.day+5,log:[{day:p.day,msg:`🤫 Going dark for 5 days. Street operations frozen. Heat decay accelerated.`,cls:"info"},...p.log].slice(0,80)}))}>► START LAY LOW</button>
                      )}
                    </div>

                    {/* BRIBE COPS */}
                    <div style={{padding:"12px 14px",background:"rgba(0,0,0,.20)",border:"1px solid var(--line)"}}>
                      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:13,letterSpacing:2,color:"var(--amber)",marginBottom:4}}>💵 BRIBE LOCAL COPS · $12K</div>
                      <div style={{fontSize:10.5,color:"var(--txt-dim)",lineHeight:1.5,marginBottom:8}}>Pay off the precinct sergeant. <b style={{color:"var(--green)"}}>-25 heat instantly.</b> Cooldown: 5 days.</div>
                      {bribeCooldown<5?(
                        <div style={{fontSize:10,color:"var(--txt-faint)",letterSpacing:.5,fontStyle:"italic"}}>Cooldown · {5-bribeCooldown}d remaining</div>
                      ):(
                        <button className="btn btn-sm" style={{width:"100%",padding:"6px 8px",fontSize:11}} disabled={g.cash<12000} onClick={()=>setG(p=>({...p,cash:p.cash-12000,heat:Math.max(0,p.heat-25),lastBribeDay:p.day,log:[{day:p.day,msg:`💵 Bribed local cops $12K. Heat -25.`,cls:"good"},...p.log].slice(0,80)}))}>{g.cash>=12000?"► PAY $12K":"NO CASH"}</button>
                      )}
                    </div>

                    {/* DIRTY COP ON PAYROLL — passive heat reduction */}
                    <div style={{padding:"12px 14px",background:g.dirtyCopHired?"rgba(0,255,107,.06)":"rgba(0,0,0,.20)",border:"1px solid "+(g.dirtyCopHired?"var(--green)":"var(--line)")}}>
                      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:13,letterSpacing:2,color:g.dirtyCopHired?"var(--green)":"var(--cyan)",marginBottom:4}}>👮 DIRTY COP · PAYROLL</div>
                      {g.dirtyCopHired?(
                        <>
                          <div style={{fontSize:10.5,color:"var(--txt-dim)",lineHeight:1.5,marginBottom:8}}>✓ DI Bashie on retainer. <b style={{color:"var(--green)"}}>-2 heat/day</b> permanent. $4K/month auto-deducted.</div>

                  <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:14,letterSpacing:2,color:"var(--green)",marginBottom:4}}>✓ ARI 'COUNSELLOR' WEXLER · ON RETAINER</div>
                  <div style={{fontSize:11.5,color:"var(--txt-dim)",lineHeight:1.6}}>Boutique law firm specialising in 'creative business structures.' Available for raids and arrests — gives you <b style={{color:"var(--green)"}}>+30% interrogation success</b> when cops show up. $5,000/month retainer auto-deducted.</div>
                </div>
              ):(
                <>
                  <p style={{fontSize:12,color:"var(--txt-dim)",lineHeight:1.6,marginBottom:12}}>Without a lawyer on retainer, cop raids and interrogations get harder. Hiring Wexler gives you <b style={{color:"var(--green)"}}>+30% success on the interrogation roll</b> when raids hit. Don't wait until they're at the door.</p>
                  <div style={{padding:"14px 16px",border:"1px solid var(--line)",background:"rgba(255,184,0,.04)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:14,letterSpacing:2,color:"var(--amber)",marginBottom:4}}>📜 HIRE WEXLER · $25K SIGNING + $5K/MO</div>
                      <div style={{fontSize:11,color:"var(--txt-faint)",letterSpacing:.5}}>Defence attorney. +30% interrogation. Critical at high heat.</div>
                    </div>
                    <button className="btn btn-sm" disabled={g.cash<25000} onClick={()=>setG(p=>({...p,cash:p.cash-25000,lawyerHired:true,log:[{day:p.day,msg:`✓ Hired Counsellor Wexler. Lawyer on retainer. +30% interrogation success.`,cls:"good"},...p.log].slice(0,80)}))}>{g.cash>=25000?"HIRE":"NO CASH"}</button>
                  </div>
                </>
              )}
            </div>

            {/* OWNED FRONTS WITH FULL SIM VIEW */}
            <div className="panel" style={{marginTop:18}}>
              <div className="panel-title">► YOUR FRONTS · ALLOCATION + PERFORMANCE</div>
              {g.fronts.length===0?(
                <div style={{color:"var(--txt-faint)",textAlign:"center",padding:18}}>No fronts yet. Acquire one below to begin laundering. Without a front, dirty cash just sits — unusable, traceable, dangerous.</div>
              ):(
                <>
                  <p style={{fontSize:11,color:"var(--txt-dim)",lineHeight:1.6,marginBottom:14,letterSpacing:.3}}>Set what % of each front's daily wash capacity to use. Higher utilization washes more cash, but a steady high % across many fronts is more visible to FinCEN. Each front shows its weekly revenue (cash washed THROUGH it) and weekly profit (cleaned − upkeep).</p>
                  <div style={{display:"flex",flexDirection:"column",gap:14}}>
                    {g.fronts.map(f=>{
                      const alloc=g.frontAllocation?.[f.id]??50;
                      const dailyCap=Math.round(f.monthly/30);
                      const dailyDirtyFlow=Math.round(dailyCap*(alloc/100));
                      const dirtyAvailable=Math.min(dailyDirtyFlow,g.dirty);
                      const dailyUpkeep=Math.round(f.monthly*0.03/30);
                      const weeklyCleanedFront=(f.weeklyClean||[]).reduce((a,b)=>a+b,0);
                      const weeklyRevenueFront=Math.round(weeklyCleanedFront/0.92); // gross dirty cash through
                      const weeklyUpkeepFront=dailyUpkeep*7;
                      const weeklyProfitFront=weeklyCleanedFront-weeklyUpkeepFront;
                      const totalCleaned=f.totalCleaned||0;
                      const daysOperating=g.day-f.acquired;
                      return(
                        <div key={f.id} style={{padding:"14px 16px",background:"rgba(0,0,0,.20)",border:"1px solid var(--line)",borderLeft:"3px solid var(--cyan-dim)"}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                            <div style={{flex:1}}>
                              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:15,letterSpacing:2,color:"var(--txt)",lineHeight:1.1}}>{f.icon} {f.name}</div>
                              <div style={{fontSize:10,color:"var(--txt-faint)",letterSpacing:1,fontFamily:"'JetBrains Mono',monospace",marginTop:2}}>{f.type.toUpperCase()} · DAY {daysOperating} · CAP ${fmt(dailyCap)}/D</div>
                            </div>
                            <div style={{textAlign:"right",marginLeft:14}}>
                              <div style={{fontSize:18,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:2,color:"var(--cyan)"}}>{alloc}%</div>
                              <div style={{fontSize:9.5,color:"var(--txt-faint)",letterSpacing:.5,fontFamily:"'JetBrains Mono',monospace"}}>capacity used</div>
                            </div>
                          </div>

                          {/* Per-front sim metrics */}
                          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,padding:"10px 0",borderTop:"1px solid var(--line)",borderBottom:"1px solid var(--line)",margin:"8px 0"}}>
                            <div>
                              <div style={{fontSize:9,color:"var(--txt-faint)",letterSpacing:1,fontFamily:"'JetBrains Mono',monospace",marginBottom:2}}>WEEKLY REV</div>
                              <div style={{fontSize:13,color:"var(--amber)",fontFamily:"'Bebas Neue',sans-serif",letterSpacing:1}}>${fmt(weeklyRevenueFront)}</div>
                            </div>
                            <div>
                              <div style={{fontSize:9,color:"var(--txt-faint)",letterSpacing:1,fontFamily:"'JetBrains Mono',monospace",marginBottom:2}}>WEEKLY CLEAN</div>
                              <div style={{fontSize:13,color:"var(--cyan)",fontFamily:"'Bebas Neue',sans-serif",letterSpacing:1}}>${fmt(weeklyCleanedFront)}</div>
                            </div>
                            <div>
                              <div style={{fontSize:9,color:"var(--txt-faint)",letterSpacing:1,fontFamily:"'JetBrains Mono',monospace",marginBottom:2}}>WEEKLY UPKEEP</div>
                              <div style={{fontSize:13,color:"var(--red)",fontFamily:"'Bebas Neue',sans-serif",letterSpacing:1}}>−${fmt(weeklyUpkeepFront)}</div>
                            </div>
                            <div>
                              <div style={{fontSize:9,color:"var(--txt-faint)",letterSpacing:1,fontFamily:"'JetBrains Mono',monospace",marginBottom:2}}>NET PROFIT</div>
                              <div style={{fontSize:13,color:weeklyProfitFront>0?"var(--green)":"var(--red)",fontFamily:"'Bebas Neue',sans-serif",letterSpacing:1}}>${fmt(weeklyProfitFront)}</div>
                            </div>
                          </div>
                          <div style={{fontSize:10,color:"var(--txt-faint)",letterSpacing:.3,fontFamily:"'JetBrains Mono',monospace",marginBottom:10}}>Lifetime cleaned through this front: <b style={{color:"var(--cyan)"}}>${fmt(totalCleaned)}</b></div>

                          {/* Allocation slider */}
                          <input type="range" min="0" max="100" step="5" value={alloc} onChange={e=>setG(p=>({...p,frontAllocation:{...(p.frontAllocation||{}),[f.id]:parseInt(e.target.value)}}))} style={{width:"100%",accentColor:"var(--cyan)"}}/>
                          <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"var(--txt-faint)",fontFamily:"'JetBrains Mono',monospace",marginTop:6,letterSpacing:.3}}>
                            <span>Today's wash: <b style={{color:"var(--green)"}}>${fmt(dirtyAvailable)}</b></span>
                            <span>At 100% util: ${fmt(dailyCap)}/day</span>
                          </div>
                          {g.dirty<dailyDirtyFlow&&dailyDirtyFlow>0&&<div style={{fontSize:10,color:"var(--amber)",letterSpacing:.5,marginTop:6,fontStyle:"italic",lineHeight:1.4}}>ℹ Front under-utilized — only ${fmt(g.dirty)} dirty cash available to wash today.</div>}
                        </div>
                      );
                    })}
                  </div>
                </>
              )}
            </div>

            {/* ACQUIRE NEW FRONTS */}
            <div className="panel" style={{marginTop:18}}>
              <div className="panel-title">► ACQUIRE A FRONT</div>
              <div className="front-grid">
                {FRONT_TEMPLATES.map(t=>(
                  <div key={t.type} className="front" style={{cursor:g.cash>=t.cost?"pointer":"not-allowed",opacity:g.cash>=t.cost?1:0.5}} onClick={()=>{if(g.cash>=t.cost)buyFront(t)}}>
                    <div className="front-name">{t.icon} {t.name}</div>
                    <div className="front-type">{t.type}</div>
                    <div style={{fontSize:11,color:"var(--txt-dim)",lineHeight:1.5,margin:"8px 0"}}>{t.desc}</div>
                    <div className="front-stats"><span>COST <b style={{color:g.cash>=t.cost?"var(--cyan)":"var(--red)"}}>${fmt(t.cost)}</b></span><span>CAP <b style={{color:"var(--green)"}}>${fmt(t.monthly)}/mo</b></span></div>
                    <div style={{fontSize:10,color:"var(--txt-faint)",letterSpacing:.5,marginTop:6,fontFamily:"'JetBrains Mono',monospace"}}>Upkeep: ~${fmt(Math.round(t.monthly*0.03))}/mo · Profit: ~${fmt(Math.round(t.monthly*0.92-t.monthly*0.03))}/mo at 100% util</div>
                  </div>
                ))}
              </div>
            </div>
          </>
        )}
        {tab==="playbook"&&<Playbook/>}
      </div>

      {zone&&<ZoneModal zone={zone} city={region.name} status={zoneStatuses[zone.id]} onClose={()=>setZone(null)}/>}
      {npc&&<NpcModal npc={npc} onClose={()=>setNpc(null)} gameState={{...g,currentNpcId:npc.id}} onChoice={handleNpcChoice}/>}
      {selCrew&&!selCrew._browsing&&<CrewModal crew={selCrew} state={g.crewState?.[selCrew.id]} gameState={g} zones={region.zones} onClose={()=>setSelCrew(null)} onSpeak={speakCrew} onDeploy={deployCrew} onRecall={recallCrew} onFire={fireCrew}/>}
      {selCrew&&selCrew._browsing&&(
        <div className="ov" onClick={()=>setSelCrew(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-hdr">
              <div style={{display:"flex",gap:14,alignItems:"flex-start"}}>
                <div className="dialog-portrait">{selCrew.icon}</div>
                <div>
                  <div className="modal-tag neutral">{selCrew.role} · NOT YET HIRED</div>
                  <div className="modal-title">{selCrew.name}</div>
                  <div className="modal-sub">${fmt(selCrew.hireCost)} signing · ${fmt(selCrew.weekly)}/week</div>
                </div>
              </div>
              <button className="modal-x" onClick={()=>setSelCrew(null)}>×</button>
            </div>
            <div className="modal-body">
              <p style={{fontSize:12.5,color:"var(--txt-dim)",lineHeight:1.7,marginBottom:14}}>{selCrew.desc}</p>
              <div className="dossier-section">
                <div className="dossier-section-hdr"><span className="dossier-section-icon">📓</span><span className="dossier-section-title">BACKGROUND</span></div>
                <p style={{fontSize:12,color:"var(--txt-dim)",lineHeight:1.7,paddingLeft:16}}>{selCrew.bg}</p>
              </div>
              <div className="crew-skills" style={{margin:"16px 0"}}>
                <SkillBar label="MUSCLE" v={selCrew.skills.muscle}/>
                <SkillBar label="BRAIN" v={selCrew.skills.brain}/>
                <SkillBar label="CHARM" v={selCrew.skills.charm}/>
                <SkillBar label="CONNECT" v={selCrew.skills.connect}/>
              </div>
              <button className="btn" disabled={g.cash<selCrew.hireCost} onClick={()=>{hireCrew(selCrew);setSelCrew(null)}}>{g.cash>=selCrew.hireCost?`► RECRUIT FOR $${fmt(selCrew.hireCost)}`:"INSUFFICIENT FUNDS"}</button>
            </div>
          </div>
        </div>
      )}
      {reveal&&<NarrativeReveal reveal={reveal} onDismiss={()=>setReveal(null)} onFastForward={fastForwardTo}/>}
      {pendingAction&&<CandidateSelectModal order={pendingAction.text} candidates={pendingAction.candidates} onSelect={(c)=>{const t=pendingAction.text;setPendingAction(null);handleAction(t,c)}} onCancel={()=>setPendingAction(null)}/>}
      {deal&&<DealNegotiationModal deal={deal} marketValue={g.marketValue||baseMVFor(g.cityKey)} maxAvail={deal.side==="we_sell"?(g.inventory||0):stashCapFor(g.transport)-(g.inventory||0)} relationship={g.npcRel?.[deal.npc.id]||0} onConfirm={handleDealConfirm} onWalk={()=>setDeal(null)}/>}
      {pendingStrategy&&<StrategyLaunchModal strat={pendingStrategy} candidates={(()=>{const all=[{id:"self",name:g.alias.toUpperCase()+" (YOURSELF)",role:"Boss",icon:"👤",skills:{muscle:5,brain:6,charm:6,connect:6},type:"self",location:"personal handling"}];(g.hiredCrew||[]).forEach(cid=>{const c=CREW_ROSTER.find(cc=>cc.id===cid);if(c){const cs=g.crewState?.[c.id]||{};all.push({...c,type:"crew",trust:cs.trust||0,location:cs.deployedTo?"Deployed":"On standby"})}});const skillKey=pendingStrategy.bestSkillKey;const scored=all.map(c=>{const s=skillKey==="connect"?(c.skills.charm+c.skills.connect)/2:c.skills[skillKey];return{...c,score:s}});scored.sort((a,b)=>b.score-a.score);return scored})()} onLaunch={launchStrategy} onCancel={()=>setPendingStrategy(null)}/>}
      {selClient&&(()=>{
        // Determine unlock state for territorial clients
        const cs={...g.clients?.[selClient.id],currentDay:g.day};
        const isLocked=cs.locked;
        // Find which zone this client belongs to in the bank, get unlock threshold + current sales
        let unlockInfo=null;
        if(!isLocked&&CLIENT_BANK?.[g.cityKey]){
          const zoneEntry=Object.entries(CLIENT_BANK[g.cityKey]).find(([zid,clients])=>clients.some(c=>c.id===selClient.id));
          if(zoneEntry){
            const [zoneId,clientsInZone]=zoneEntry;
            const idx=clientsInZone.findIndex(c=>c.id===selClient.id);
            const threshold=ZONE_UNLOCK_THRESHOLDS?.[idx]||120;
            const sales=g.zoneSales?.[zoneId]||0;
            const isContactable=!!g.clientUnlocks?.[selClient.id];
            const zone=region.zones.find(zz=>zz.id===zoneId);
            unlockInfo={
              contactable:isContactable,
              zoneId,
              zoneName:zone?.name||zoneId,
              threshold,
              currentSales:sales,
              unitsToGo:Math.max(0,threshold-sales),
              tierIndex:idx, // 0..3
            };
          }
        }
        return<ClientDossier client={selClient} clientState={cs} alias={g.alias} onClose={()=>setSelClient(null)} onContact={startConversation} onTalk={(cl)=>{setSelClient(null);setSpeakClient(cl)}} onPoachOpen={(cl,poach)=>{setSelClient(null);setPoachOffer({client:cl,poach})}} pendingPoach={g.pendingPoach} unlockInfo={unlockInfo}/>;
      })()}
      {poachOffer&&<PoachOfferModal client={poachOffer.client} poach={poachOffer.poach} onResolve={resolvePoach} onCancel={()=>setPoachOffer(null)}/>}
      {supplierDeal&&<SupplierNegotiationModal product={supplierDeal.product} baseCost={supplierDeal.baseCost} marketValue={supplierDeal.marketValue} playerCash={g.cash} stashRemaining={Math.max(0,stashCapFor(g.transport)-totalStash(g))} onConfirm={closeSupplierDeal} onCancel={()=>setSupplierDeal(null)}/>}
      {g.pendingRaid&&<CopRaidModal raid={g.pendingRaid} gameState={g} onResolve={(changes)=>setG(p=>({...p,...changes}))}/>}
      {raidTarget&&<RaidLaunchModal target={raidTarget.player} zone={raidTarget.zone} city={initData.cityKey} gameState={g} onResolve={(result)=>{setG(p=>({...p,heat:Math.min(100,p.heat+result.heat),log:[{day:p.day,msg:`⚔ Launched ${RAID_TYPES[result.type].name} on ${raidTarget.player.handle}. Heat +${result.heat}.`,cls:"warn"},...p.log].slice(0,80)}));setRaidTarget(null)}} onCancel={()=>setRaidTarget(null)}/>}
      {incomingRaid&&<IncomingRaidModal raid={incomingRaid} gameState={g} onDefend={(cost,bonus)=>{setG(p=>({...p,cash:p.cash-cost,log:[{day:p.day,msg:`💪 Reinforced defense for ${incomingRaid.zone}: -$${fmt(cost)}, +${bonus} defense power.`,cls:"good"},...p.log].slice(0,80)}));mpReinforceDefense(incomingRaid.id,bonus);setIncomingRaid(null)}} onSurrender={()=>setIncomingRaid(null)}/>}
      {speakClient&&<SpeakClientModal client={speakClient} gameState={g} onClose={()=>setSpeakClient(null)} onResolve={(cl,outcome)=>{
        if(outcome.type==="reject")return;
        setG(p=>{
          let updates={...p};
          if(outcome.type==="instant_cash"||outcome.type==="partial_cash"){
            updates.cash=clamp(p.cash+outcome.amount,0,99999999);
            updates.dirty=clamp(p.dirty+outcome.amount,0,99999999);
            updates.log=[{day:p.day,msg:`✓ ${cl.name.split(" ")[0]} paid $${fmt(outcome.amount)} cash on the spot.`,cls:"good"},...p.log].slice(0,80);
          }else if(outcome.type==="schedule_next_day"){
            updates.pendingOutcomes=[...(p.pendingOutcomes||[]),{day:p.day+(outcome.delay||1),type:"cash",amount:outcome.amount,label:outcome.label||`${cl.name.split(" ")[0]}'s drop`,narrative:outcome.narrative}];
            updates.log=[{day:p.day,msg:`📅 ${cl.name.split(" ")[0]} promised drop on Day ${p.day+(outcome.delay||1)}: $${fmt(outcome.amount)}.`,cls:"info"},...p.log].slice(0,80);
          }else if(outcome.type==="launder"){
            updates.dirty=clamp(p.dirty-outcome.amount,0,99999999);
            updates.clean=clamp(p.clean+outcome.clean,0,99999999);
            updates.log=[{day:p.day,msg:`✓ Laundered $${fmt(outcome.amount)} via ${cl.name.split(" ")[0]}: $${fmt(outcome.clean)} clean back.`,cls:"good"},...p.log].slice(0,80);
          }else if(outcome.type==="info_heat_reduce"){
            updates.heat=clamp(p.heat-outcome.amount,0,100);
            updates.log=[{day:p.day,msg:`✓ ${cl.name.split(" ")[0]} flagged a heat warning. Heat -${outcome.amount}.`,cls:"good"},...p.log].slice(0,80);
          }else if(outcome.type==="force_intro"){
            updates.cash=clamp(p.cash-outcome.fee,0,99999999);
            // Force a same-day intro for tomorrow's day-advance
            const pool=getIntroPool(p.cityKey,cl.id);
            const introducedIds=Object.keys(p.introducedClients||{});
            const next=pool.find(s=>!introducedIds.includes(s.id));
            if(next){
              updates.introducedClients={...(p.introducedClients||{}),[next.id]:{day:p.day+1,via:cl.id,forced:true}};
              updates.log=[{day:p.day,msg:`✓ Paid $${fmt(outcome.fee)} for priority intro. ${next.name} expects you in ${next.area}.`,cls:"good"},...p.log].slice(0,80);
            }else{
              updates.log=[{day:p.day,msg:`✗ Paid $${fmt(outcome.fee)} but ${cl.name.split(" ")[0]} has no more names left.`,cls:"warn"},...p.log].slice(0,80);
            }
          }else if(outcome.type==="monthly_boost"){
            updates.clients={...p.clients,[cl.id]:{...(p.clients?.[cl.id]||{}),monthlyBoost:(p.clients?.[cl.id]?.monthlyBoost||0)+outcome.pct}};
            updates.log=[{day:p.day,msg:`✓ ${cl.name.split(" ")[0]} agreed to +${Math.round(outcome.pct*100)}% volume.`,cls:"good"},...p.log].slice(0,80);
          }else if(outcome.type==="hold_cycle"){
            const days=outcome.days||30;
            updates.clients={...p.clients,[cl.id]:{...(p.clients?.[cl.id]||{}),holdUntil:p.day+days}};
            updates.log=[{day:p.day,msg:`✓ ${cl.name.split(" ")[0]} on hold for ${days} days. No drain, no income.`,cls:"info"},...p.log].slice(0,80);
          }
          return updates;
        });
      }}/>}
      {convClient&&<ConversationModal client={convClient} hiredCrew={g.hiredCrew||[]} onConclude={concludeConversation} onWalk={()=>setConvClient(null)}/>}
      {toast&&(<div className={"toast "+(toast.type||"")}><div className="toast-title">{toast.title}</div><div>{toast.msg}</div></div>)}

      <ActionInputBar onAction={(text)=>{const d=detectDeal(text);if(d){setDeal(d)}else{const candidates=suggestCandidates(text);setPendingAction({text,candidates})}}} onEndDay={advanceDay} busy={busy} disabled={false} focusedZoneName={focusedZone?region.zones.find(z=>z.id===focusedZone)?.name:null} placeholder={focusedZone?`Type your move in ${region.zones.find(z=>z.id===focusedZone)?.name||"this zone"} — 'Approach the boss here', 'Recruit a runner', 'Sell 30 units to Wexler at 5% below market'`:"Type your move — anything. Examples: 'Sell 30 units to Wexler at 5% below market', 'Buy 50 from Tony', 'Recruit a Hackney runner'"}/>
    </div>
  );
}

  return(
    <div className="crew-skill">
      <div className="crew-skill-l">{label}</div>
      <div className="crew-skill-bar"><div className="crew-skill-bar-fill" style={{width:(v*10)+"%"}}/></div>
      <div className="crew-skill-v">{v}</div>

    <div className={"crew-card"+(hired?" hired":"")+(state?.deployedTo?" deployed":"")} onClick={onClick} style={{position:"relative"}}>
      {crew.tier&&!hired&&<div style={{position:"absolute",top:10,right:10,fontSize:9,letterSpacing:1.5,padding:"3px 8px",border:"1px solid "+tierColor,color:tierColor,fontWeight:700,background:"rgba(0,0,0,.4)",fontFamily:"'JetBrains Mono',monospace"}}>{crew.tier.toUpperCase()}</div>}
      {state?.deployedTo&&<div className="crew-deployed-banner">📍 DEPLOYED · {deployedZoneName||"unknown"}</div>}

      <div className="crew-name">{crew.name}</div>
      <div className="crew-role">{crew.role}</div>
      <div className="crew-desc">{crew.desc}</div>
      <div className="crew-skills">

        </>
      )}
    </div>
  );
}

function CrewModal({crew,state,gameState,zones,onClose,onSpeak,onDeploy,onRecall,onFire}){
  const [view,setView]=useState("info");
  const [selZone,setSelZone]=useState("");
  const [result,setResult]=useState(null);
  if(!crew)return null;
  const trust=state?.trust||0;
  const dlg=CREW_DIALOGUE[crew.specialty]||{open:"They look up. 'What is it?'",actions:[]};
  const deployedZone=state?.deployedTo?zones.find(z=>z.id===state.deployedTo):null;

  const handleSpeak=(action)=>{

    if(trust<(action.trustReq||0)){setResult({err:`Trust too low. ${crew.name.split(" ")[0]} needs ${action.trustReq}+ trust before doing this.`});return}

            <>
              <p style={{fontSize:12.5,color:"var(--txt-dim)",lineHeight:1.7,marginBottom:14}}>{crew.desc}</p>
              <div className="dossier-section">
                <div className="dossier-section-hdr"><span className="dossier-section-icon">📓</span><span className="dossier-section-title">BACKGROUND</span></div>
                <p style={{fontSize:12,color:"var(--txt-dim)",lineHeight:1.7,paddingLeft:16}}>{crew.bg}</p>
              </div>
              <div className="crew-skills" style={{margin:"16px 0"}}>
                <SkillBar label="MUSCLE" v={crew.skills.muscle}/>
                <SkillBar label="BRAIN" v={crew.skills.brain}/>
                <SkillBar label="CHARM" v={crew.skills.charm}/>
                <SkillBar label="CONNECT" v={crew.skills.connect}/>

              {crew.bonuses&&crew.bonuses.length>0&&(
                <div className="dossier-section" style={{marginTop:16}}>
                  <div className="dossier-section-hdr"><span className="dossier-section-icon">⚡</span><span className="dossier-section-title">WHAT THEY UNLOCK FOR YOU</span></div>
                  <div className="crew-bonus-list">
                    {crew.bonuses.map((b,i)=>(<div key={i} className="crew-bonus">{b}</div>))}
                  </div>
                </div>
              )}
              <div className="crew-trust" style={{marginTop:14}}>
                <span className="crew-trust-l">TRUST LEVEL</span>
                <div className="crew-trust-bar"><div className="crew-trust-fill" style={{width:(trust*10)+"%"}}/></div>
                <span className="crew-trust-v">{trust}/10</span>
              </div>
              <div style={{marginTop:18,paddingTop:14,borderTop:"1px solid var(--line)",display:"flex",gap:8}}>
                <button className="btn btn-danger btn-sm" onClick={()=>{if(confirm(`Fire ${crew.name}? You lose them and their weekly cost stops.`))onFire(crew)}}>► FIRE</button>
              </div>
            </>
          )}

          {view==="speak"&&(
            <>
              <div className="dialog-line">{result?(result.err||result.text):dlg.open}</div>
              {!result&&(
                <div className="action-list">
                  {dlg.actions.map((a,i)=>{
                    const canAfford=gameState.cash>=a.cost;
                    const trustOk=trust>=(a.trustReq||0);
                    return(
                      <button key={i} className="action" disabled={!canAfford||!trustOk} onClick={()=>handleSpeak(a)}>
                        <div className="action-name">{a.label}</div>
                        <div className="action-cost">
                          <span className="neg">${fmt(a.cost)}</span>
                          {a.trustReq>0&&<span style={{color:trustOk?"var(--cyan)":"var(--red)"}}>Req trust {a.trustReq}+</span>}
                        </div>
                      </button>
                    );
                  })}
                </div>
              )}
            </>
          )}

          {view==="deploy"&&(
            <>
              <p style={{fontSize:12,color:"var(--txt-dim)",lineHeight:1.7,marginBottom:14}}>Deploying a crew member to a zone applies a passive effect (income boost, heat reduction, intel gathering) based on their specialty. They earn their weekly while deployed.</p>
              {deployedZone?(
                <div>
                  <div className="dossier-section">
                    <div className="dossier-section-hdr"><span className="dossier-section-icon">📍</span><span className="dossier-section-title green">CURRENTLY DEPLOYED</span></div>
                    <p style={{fontSize:13,color:"var(--green)",paddingLeft:16,marginBottom:10}}>Active in <strong>{deployedZone.name}</strong> since day {state.deployedSince}.</p>
                  </div>

      </div>
    </div>
  );
}
